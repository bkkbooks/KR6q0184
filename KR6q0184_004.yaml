body:
  text: 北天目道人蕅益智旭著上經之四震下離上噬嗑亨利用獄約世道則大觀在上萬國朝宗有不順者噬而嗑之舜伐有苗禹戮防風之類是也約佛法則僧輪光顯之時有犯戒者治之約觀心則妙觀現前隨其所發煩惱業病魔禪慢見等境即以妙觀治之皆所謂亨而利用獄也彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也王道以正法養天下佛法以正教養僧伽觀心以妙慧養法身皆頤之象也頑民梗化而須治比丘破戒而須治止觀境發而須觀皆有物之象也剛柔分則定慧平等動而明則振作而智照不昏雷電合而章則説默互資雷如説法電如入定放光也二五皆柔故柔得中即中道妙定也上行者震有奮發之象離有麗天之象雖不當位者六五以陰居陽如未入菩薩正位之象然觀行中定慧得所故于所發之境善用不思議觀以治之也象曰雷電噬嗑先王以明罰敕法明罰即所以敕法如破境即所以顯德也初九屨校滅趾無咎象曰屨校滅趾不行也夫噬嗑者不論世法佛法自噬噬他皆須制之于早不可釀至于深又須得剛克柔克之宜不可重輕失準今初九在卦之下其過未深以陽居陽又得其正故但如屨校滅趾即能懲惡不行而無咎也滅趾謂校掩其趾六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也陰柔中正其過易改故如噬膚下乘初九之剛故如滅鼻滅鼻謂膚掩其鼻六三噬臘肉遇毒小吝無咎象曰遇毒位不當也在下之上過漸深矣以陰居陽又有邪慧如毒吝可知也然當噬嗑之時決不至于怙終故得無咎九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也田獵射獸矢鋒入骨而未拔出今噬乾胏時方乃得之亦可畏矣此喻積過已久也然剛而不過必能自克故利于艱貞則吉六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也柔雖如肉而過成已久如肉已乾矣賴有中德可貴如得黃金守此中德之貞兢兢惕厲庶可復于無過耳上九何校滅耳凶象曰何校滅耳聰不明也過惡既盈不可復救如荷厚枷掩滅其耳蓋由聰聽不明不知悔過遷善以至此也觀心釋者初九境界一發即以正慧治之如滅趾而令其不行六二境發未深即以正定治之所噬雖不堅硬未免打失巴鼻六三境發漸甚定慧又不純正未免為境擾亂但不至于墮落九四境發夾雜善惡定慧亦不純正縱得小小法利未證深法六五純發善境所得法利亦大然猶未入正位仍須貞厲乃得無咎上九境發極深似有定慧實則不中不正反取邪事而作聖解永墮無聞之禍也離下艮上賁亨小利有攸往約世道則所噬既嗑之後偃武修文約佛法則治罰惡僧之後增設規約約觀心則境發觀成之後定慧莊嚴凡此皆亨道也然世法佛法當此之時皆不必大有作為但須小加整飾而已彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁則必亨以其下卦本乾而六二以柔來文之則是質有其文亦是慧有其定故亨也上卦本坤而上九分剛以文之則是文有其質亦是定有其慧故小利有攸往也文質互資定慧相濟性德固然非屬強設名為天文體其有定之慧寂而常照為文明體其有慧之定照而常寂為止是謂以修合性名為人文性德則具造十界故觀之可察時變修德則十界全歸一心故觀之可化成天下象曰山下有火賁君子以明庶政無敢折獄賁非折獄之時也庶政苟明則可以使民無訟矣佛法釋者山下有火外止內明故于三千性相之庶政一一明之了知一切法正一切法邪終不妄于其中判斷一是一非而生取捨情見如無敢折獄也初九賁其趾舍車而徒象曰舍車而徒義弗乘也卦雖以剛柔相文得名為賁而實非有事于矯飾也故六爻皆取本色自賁而終極于白賁正猶詩所謂素以為絢蓋天下之真色固莫有勝于白者今初九抱德隱居晚食以當肉安步以當車乃以義自賁者也六二賁其須象曰賁其須與上興也柔順中正虛心以取益乎上下之賢乃以師友自賁者也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也剛正而居明體之上足以潤及于六二六四而使之同為聖賢乃以師道自賁者也六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也柔而得正知白賁之可貴故求賢無厭倦心近則親乎九三俯則應乎初九仰則宗乎上九無一非我明師良友即六二六五亦皆我同德相輔之朋見賢思齊見不賢而自省安有寇哉蓋由居上卦之下則是上而能下不敢自信自專乃以虛心自賁者也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也柔中而有陽剛之志能知道德之樂而不以勢位自驕視天位之尊與丘園等如大禹之菲飲食惡衣服卑宮室為束帛戔戔吝惜之象實則吾無間然而終吉蓋以盛德自賁者也上九白賁無咎象曰白賁無咎上得志也以剛居艮止之極又在卦終而居陰位則非過剛年彌高德彌邵純淨無疵如武公之盛德至善以自賁者也佛法釋者初九以施自賁六二以戒自賁九三以忍自賁六四以進自賁六五以定自賁上九以慧自賁又初九為理賁不以性德濫修德故六二為名字賁從此發心向上故九三為觀行賁不可暫忘故六四為相似賁不住法愛故六五為分證賁于三諦不漏失故上九為究竟賁復于本性無纖瑕故坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也約世道則偃武修文之後人情侈樂國家元氣必從此剝約佛法則規約繁興之後真修必從此剝約觀心有二義一約得邊則定慧莊嚴之後皮膚脫盡真實獨存名之為剝一約失邊則世間相似定慧能發世間辨才文彩而于真修之要反受剝矣約得別是一途今且約失而論則世出世法皆不利有攸往所謂不利有攸往者非謂坐聽其剝正示挽回之妙用也往必受剝不往則順而止之所以挽回其消息盈虛之數而合于天行也象曰山附于地剝上以厚下安宅山附于地所謂得乎丘民而為天子也百姓足君孰與不足故厚下乃可安宅此救剝之妙策也觀心釋者向上事須從腳跟下會取正是此意六爻約世道則朝野無非陰柔小人惟一君子高居塵外約佛化則在家出家皆以名利相縻惟一聖賢遠在蘭若約觀心則修善斷盡惟一性善從來不斷初六剝床以足蔑貞凶象曰剝床以足以滅下也床者所以棲身剝床則身無所棲矣初在最下故如剝足于世法為惡民于佛法為惡伽藍民于觀心為剝損戒足也別約得者是剝去四惡趣因然設無四惡趣則大悲無所緣境故誡以蔑貞凶六二剝床以辨蔑貞凶象曰剝床以辨未有與也于世法為惡臣于佛法為惡檀越于觀心為剝損禪定無定則散亂不能辨理故未有與別約得者是剝去人天散善然設無人天散善則無以攝化衆生故亦誡以蔑貞凶六三剝之無咎象曰剝之無咎失上下也于世法為混迹小人之君子于佛法為有正見之外護于觀心為剝損智慧剝慧則不著于慧故能因敗致功坐斷兩頭而失上下又別約得者是剝去色無色界味禪暗定故得無咎六四剝床以膚凶象曰剝床以膚切近災也下卦如床上卦如身今剝及身膚不可救矣于世法為惡宰輔于佛法為惡比丘于觀心為剝無一切因果別約得者是剝去二乘入真法門然設無真諦則無以出生死而不染世間過患故誡以切近于災所謂毫釐有差天地懸隔也六五貫魚以宮人寵無不利象曰以宮人寵終無尤也于世法為柔君以在君位又居陽而得中能師事上九高賢挽回天下之亂如文王之師呂尚于佛法為福德比丘作叢林主率衆僧以師事聖賢于觀心為即修惡以達性惡性惡融通任運攝得佛地性善功德故無不利又別約得者從空入假剝二邊以歸中道故須達中道統一切法如貫魚以宮人寵使法法皆成摩訶衍道則無不利上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也于世法為事外高賢如呂尚箕子之類于佛法為出世高流人間福田于觀心為性善終不可剝故如碩果不食君子悟之以成道小人恃之而生濫聖之慢者也別約得者亦指性德從來不變不壞能悟性德則當下滿足一切佛法故君子得輿執性廢修則墮落惡趣故小人剝廬震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往約世道則衰剝之後必有明主中興而為復約佛化則淪替之後必有聖賢應現重振作之而為復約觀心又二義一者承上卦約失言之剝而必復如平旦之氣好惡與人相近又如調達得無根信也二者承上卦約得言之剝是蕩一切情執復是立一切法體也若次第三觀則從假入空名剝從空入假名復若一心三觀則以修吻性名剝稱性垂化名復復則必亨陽剛之德為主故出入可以無疾以善化惡故朋來可以無咎一復便當使之永復故反復其道至于七日之久則有始有終可以自利利他而有攸往也彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎觀心釋者佛性名為天地之心雖闡提終不能斷但被惡所覆而不能自見耳苦海無邊回頭是岸一念菩提心能動無邊生死大海復之所以得亨者以剛德稱性而發遂有逆反生死之勢故也此菩提心一動則是順修依此行去則出入皆無疾朋來皆無咎矣然必反復其道七日來復者體天行之健而為自強不息之功當如是也充此一念菩提之心則便利有攸往以剛雖至微而增長之勢已自不可禦也故從此可以見吾本具之佛性矣又出謂從空出假入謂從假入空既順中道法性則不住生死不住涅槃而能遊戲于生死涅槃故無疾也朋謂九界性相開九界之性相咸成佛界性相故無咎也象曰雷在地中復先王以至日閉關商旅不行后不省方楊慈湖曰舜禹十有一月朔巡狩但于冬至日則不行耳觀心釋者復雖有剛長之勢而利有攸往然必靜以養其機故觀行即佛之先王既大悟藏性之至日必關閉六根脫粘內伏暫止六度萬行商旅之事但觀現前一念之心而未可遍歷陰界入等諸境以省觀也初九不遠復無祇悔元吉象曰不遠之復以修身也此如顏子約佛法者正慧了了頓見佛性頓具諸行所以元吉如圓教初住又約六度即是般若正道六二休復吉象曰休復之吉以下仁也此如曾子約佛法者正定得中鄰真近聖如圓教十信又約六度即是正定與慧相連六三頻復厲無咎象曰頻復之厲義無咎也此如子路約佛法者有定有慧而不中正故須先空次假後中名為頻復勤勞修證而得無咎又約六度即是精進勤策相續六四中行獨復象曰中行獨復以從道也此如蘧伯玉約佛法者正定而與初應如通教利根接入于圓又約六度即是忍辱由與初應則生法二忍便成第一義忍六五敦復無悔象曰敦復無悔中以自考也此如周宣漢文宋仁約佛法者定慧調勻亦且得中但與陽太遠故必斷惑證真之後俟開顯而會入圓位如藏通二乘又約六度即是持戒雖遠于初但自考三業無失自然合理而得無悔上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也此如王安石方孝孺等生今反古名為迷復非昏迷不復之謂約佛法者不中不正恃世間小定小慧以為極則因復成迷故不惟凶且有災眚若以此設化教人必大敗法門損如來之正法至于十年而弗克征以其似佛法而實非佛法反于圓頓大乘之君道如今世高談圓頓向上者是也又約六度即是布施而遠于智慧著相著果報起慢起愛亦能起見故雖是善因反招惡果良由不達佛法之君道故耳震下乾上無妄元亨利貞其匪正有眚不利有攸往約世道則中興之治合于天道而無妄約佛法則中興之化同于正法而無妄約觀心則復其本性真窮惑盡而無妄皆元亨而利于正者也然世出世法自利利他皆須深自省察不可夾一念之邪不可有一言一行之眚倘內匪正而外有眚則決不可行矣聖人持滿之戒如此彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉震之初爻全攬乾德為體故曰自外來為主于內也性德雖人人本具然在迷情反為分外今從性起修了知性德是我固有故名為主于內夫既稱性起修必須事事隨順法性倘三業未純縱有妙悟不可自利利他既不合于性德則十方諸佛不護念之安能有所行哉象曰天下雷行物與無妄先王以茂對時育萬物佛法釋者師子奮迅三世益物名茂對時番番種熟脫使三草二木任運增長而歸一實名育萬物初九無妄往吉象曰無妄之往得志也彖云無妄之往何之矣乃指匪正有眚出于無妄而往于妄也此云無妄往吉乃依此真誠無妄而往應一切事也所以得志而吉六二不耕穫不災畬則利有攸往象曰不耕穫未富也田一歲曰災三歲曰畬世未有不耕而穫不災而畬者夫不耕不災此絶無望于穫畬者也然能穫能畬此何以致之乎孔子云隱居以求其志行義以達其道又云耕也餒在其中矣學也祿在其中矣六二以陰柔中正上應九五陽剛中正之君惟以求志達道為心而毫不以富貴利祿為念乃利有攸往而不變其塞耳六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也不中不正居震之上此執無妄之理而成災者也夫行人得牛何乃執理而求償于邑人豈非禍及無辜者乎吳幼清曰無妄之善有三剛也當位也無應也剛者實也當位者正也無應者無私纍也諸爻或有其三或有其二或有其一初九三皆全其最善也九五九四有其二九五剛而中正九四剛而無應是其次也六二上九有其一六二中正上九剛實是又其次也唯六三于三者咸無焉而亦得為無妄何也下比中正之六二上比剛實無私之九四譬如有人在己雖無一善而上有嚴師下有良友親近切磨夾持薰染亦不至于為惡此六三之所以亦得為無妄也陳旻昭曰世固有忠臣孝子遇不得已之時勢竟冒不忠不孝之名而萬古不能自白者因災而息其欲自陳白之妄心是為無妄之災如繫牛于邑而行人得之彼行人決不可查考而邑人決無以自白惟有吞聲忍氣陪償其牛而已忠臣孝子之蒙怨者亦復如是九四可貞無咎象曰可貞無咎固有之也以陽居陰不好剛以自任蓋其德性然也九五無妄之疾勿藥有喜象曰無妄之藥不可試也剛健中正此無妄之至者也夫立身于無過之地者未免責人太過所謂執藥反成病矣故勿藥而有喜蓋以己律人則天下孰能從之上九無妄行有眚無攸利象曰無妄之行窮之災也以陽居陰雖非過剛而居無妄之極則是守常而不知變通者也既無善權方便其何以行之哉佛法釋者六爻皆悟無妄之理而為修證者也初九正慧直進故現生克果而得志六二正定治習故須于禪法不取不證則可以借路還家六三不中不正雖有小小定慧能開示人令其得道得果如行人得牛而自己反成減損久滯凡地如邑人之災九四慧而有定自利有餘乃是達其性具定慧非是修而後有九五剛健中正自利已圓為衆生故示現病行豈更須對治之藥即初心修觀亦復如是一切境界無非性德體障即德無可對治也上九不中不正恃性德而不事修德躬行多眚何利之有蓋由一味高談向上以至于窮故成災也乾下艮上大畜利貞不家食吉利涉大川畜蓄積也蓄積其無妄之道以養育天下者也約世道則中興之主復于無妄之道而厚蓄國家元氣約佛化則四依大士復其正法之統而深養法門龍象約觀心則從迷得悟復于無妄之性而廣積菩提資糧皆所謂大畜也世出世法弘化進修皆必以正為利以物我同養為公以歷境練心為要故不家食吉而利涉大川也彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也乾之剛健艮之篤實皆有輝光之義焉以此日新其德則蓄積深厚廣大故名大畜然所謂利貞不家食吉利涉大川者非是性外別立修德乃稱性所起之修全修在性者也試觀乾德之剛上行居卦之終而六五能尊尚之且卦體外止內健豈非本性大正之道乎六五以柔中之德上則養賢師以風天下下則養賢士以儲國用豈非不家食吉之正道乎且以柔中之德應九二天德之剛剛柔相濟何遠不通豈非利涉大川之正道乎象曰天在山中大畜君子以多識前言往行以畜其德一山之中具有天之全體一念心中具攝十世古今攬五時八教之前言該六度萬德之往行以成我自心之德以此自畜即以此畜天下矣吳幼清曰識謂記之于心德大于前言往行猶天之大于山也以外之所聞所見而涵養其中至大之德猶山在外而藏畜至大之天于中也前言往行象山中寶藏之多德象天之大初九有厲利己象曰有厲利己不犯災也六爻皆具剛健篤實輝光之義而自新新民者也初九陽剛在下正宜隱居求志故有惕厲之功而先利自己己利既成任運可以利人若己躬下事未辦而先欲度人則犯災矣九二輿説輹象曰輿説輹中無尤也剛而得中專修定慧似無意于得時行道者然自利正是利他之本故中無尤九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也剛而得正居乾之上不患不能度生也患其欲速喜進失于防間耳故必利于艱貞間其輿衛乃利攸往亦以上有六四之良友六五之賢君上九之明師與之合志必能互相警勵故可往也六四童牛之牿元吉象曰六四元吉有喜也柔而得正下則應初九剛正之良友親九三剛正之畏友上則近六五柔中之聖君過端未形而潛消默化如童牛未角先施以牿更無抵觸之患以此自養以此為天下式大善而吉悅而且樂者矣六五豶豕之牙吉象曰六五之吉有慶也豶犗也犗則不暴而牙仍堅利也柔得中位尊上賢而應下乾性德既無偏頗所養又復周足自利成就可以君臨天下舉天下之善惡衆庶無不入吾陶冶故如豶豕之牙上九何天之衢亨象曰何天之衢道大行也以剛柔相濟之德當聖君師保之任隱居所求之志至此大行無壅蓋不啻行于天衢也震下艮上頤貞吉觀頤自求口實約世道則畜德以養天下約佛化則畜德以利群生約觀心則菩提資糧既積而長養聖胎也自利利他皆正則吉皆須視從來聖賢之所為頤者何如皆須自視其所以為口實者何如彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉養正則吉明養而非正正而不養皆非吉道也不觀聖賢之所養則無以取法思齊不觀自養之口實則無以匹休媲美且如天地全體太極之德以自養即能普養萬物聖人養賢輔成己德即可以及萬民誰謂養正之外別有利人之方故正自養時即全具位育功能而稱大也象曰山下有雷頤君子以慎言語節飲食言語飲食皆動之象也慎之節之不失其止也故知養正莫善于知止初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也陽剛為自養養他之具知止為自養養他之貞初九陽剛足以自養如靈龜服氣可不求食而居動體上應六四觀彼口實反為朵頤失其貴而凶矣此如躁進之君子于佛法中則如乾慧外凡不宜利物六二顛頤拂經于丘頤征凶象曰六二征凶行失類也以上養下乃理之常六二陰柔反藉初九之養拂其經矣又居動體恐或不肯自安將求頤于六五之丘五雖與二為應然亦陰柔不能自養何能養人征則徒得凶耳兩陰無相濟之功故為失類此如無用之庸臣于佛法中則如暗證盲禪進退失措六三拂頤貞凶十年勿用無攸利象曰十年勿用道大悖也陰柔不能自養又不中正以居動極拂于頤矣雖有上九正應何能救之終于無用而已此如邪僻之宰官于佛法中則如六群亂衆大失軌範六四顛頤吉虎視耽耽其欲逐逐無咎象曰顛頤之吉上施光也陰柔得正而居止體雖無養具得養之貞者也下應初九賴其養以自養養人此如休休有容之大臣吉之道也初方觀我而朵頤我隨其視之耽耽欲之逐逐以禮而優待之在初則不足貴在我則養賢以及萬民可謂上施光矣于佛法中則如賢良營事善為外護六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也陰柔無養人之具空居君位故名拂經居止之中順從上九此亦養賢以及萬民為得其正者也但可處常不可處變宜守成不宜創業耳此如虛己之賢君于佛法中則如柔和同行互相勉勗上九由頤厲吉利涉大川象曰由頤厲吉大有慶也以陽剛居止極卦之所以為頤者此也此如望隆之師保可以拯濟天下者矣于佛法中則如證道教授宰任玄綱巽下兌上大過棟撓利有攸往亨約世道則賢君以道養天下而治平日久約佛化則四依以道化群生而佛法大行約觀心則功夫勝進而將破無明也夫治平既久則亂階必萌所宜防微杜漸化道既盛則有漏易生所宜陳規立矩功夫既進則無明將破所宜善巧用心也彖曰大過大者過也棟撓本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉大者既過所以必當思患豫防初上皆弱所以剛中不宜恃勢令撓剛雖過而得中又以巽順而悅行之所以猶有挽回匡濟之術乃得亨也永保無虞亦在此時盛極忽衰亦在此時其關係豈不大哉象曰澤滅木大過君子以獨立不懼遁世無悶澤本養木而反滅木大過之象也惟以獨立不懼遁世無悶之力持之庶學有本而養有素可以砥柱中流耳初六藉用白茅無咎象曰藉用白茅柔在下也世法佛法當大過時皆以剛柔相濟為得過剛過柔為失今初六以柔居巽體之下而在陽位無功名富貴以纍其心唯庸德庸言下學上達以為其務者也約佛法者定有其慧兼以戒德精嚴故無咎九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也剛而得中又居陰位陽得陰助如枯楊生稊老夫女妻之象蓋過于下賢者也約佛法者慧與定俱如先見道後修事禪故無不利九三棟撓凶象曰棟撓之凶不可以有輔也過剛不中任其剛愎以此自修則德必敗以此治世則亂必生故棟撓而凶約佛法者純用邪慧故不可有輔九四棟隆吉有它吝象曰棟隆之吉不撓乎下也剛而不過足以自立立人但居悅體恐其好大喜功而不安守故誡以有它則吝約佛法者亦是慧與定俱但恐夾雜名利之心則自利利他未必究竟故誡以有它則吝九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也雖云陽剛中正然在大過之時則是恃其聰明才智者也享成平之樂不知民事艱難且不知下用賢臣惟與上六陰柔無用之老臣相得何能久哉約佛法者慧力太過無禪定以持之何能發生勝果上六過涉滅頂凶無咎象曰過涉之凶不可咎也居過極之地惟有柔正之德而無濟難之才故不免于凶而實非其咎也約佛法者正定無慧終為頂墮坎下坎上習坎有孚維心亨行有尚約世道則太平久而放逸生放逸生而患難洊至約佛法則從化多而有漏起有漏起而魔事必作約觀心則慧力勝而夙習動夙習動而境發必強皆習坎之象也然世出世法不患有重沓之險難但患無出險之良圖誠能如此卦之中實有孚深信一切境界皆唯心所現則亨而行有尚矣又何險之不可濟哉彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉善觀心者每即塞以成通夫習坎雖云重險然流而不盈潮不失限何非吾人修道之要術所貴深信維心之亨猶如坎卦之剛中一般則以此而往必有功矣且險之名雖似不美而險之義實未嘗不美天不可升天非險乎山川丘陵地不險乎城池之險以守其國王公何嘗不用險乎惟在吾人善用險而不為險所用則以此治世以此出世以此觀心無不可矣象曰水洊至習坎君子以常德行習教事常德行即學而不厭也習教事即誨人不倦也習坎之象乃萬古聖賢心法奚險之可畏哉此正合台宗善識通塞即塞成通之法亦是巧用性惡法門初六習坎入于坎窞凶象曰習坎入坎失道凶也在險之時不論自利利他唯貴有孚而定慧相濟今初六以陰居下毫無孚信之德乃汩沒于惡習而不能自出者也九二坎有險求小得象曰求小得未出中也剛中有孚但居下卦則夙習尚深未能頓達聖境僅可小得而已六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也不中不正柔而志剛自謂出險不知前險之正來此如邪見增上慢人故終無功六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也柔而得正與九五之中正剛德相與所謂因定發慧正出險之妙道也正觀如酒助道如簋誠朴如缶方便道如牖從此可發真而無咎矣九五坎不盈祇既平無咎象曰坎不盈中未大也陽剛中正已得出世真慧現前如坎之不盈而風恬浪靜也但初破無明餘惑未盡故中未大此勉其速趣極聖而已上六繫用徽纆置于叢棘三歲不得凶象曰上六失道凶三歲也陰居險極有定無慧如凡外癡定極至非想終不脫三界繫縛而見取既深猶如置于叢棘永不得免離也離下離上離利貞亨畜牝牛吉火性無我麗附草木而後可見故名為離約世道則重險之時必麗正法以御世約佛法則魔擾之時必麗正教以除邪約觀心則境發之時必麗正觀以銷陰故皆利貞則亨也牝牛柔順而多力又能生育犢子喻正定能生妙慧彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也如日月必麗天如百穀草木必麗土吾人重明智慧亦必麗乎性德之正則自利既成便可以化天下矣夫智慧光明必依禪定而發禪定又依理性而成今六五六二麗乎中正之位故有亨道如牝牛能生智慧犢子而吉也吳幼清曰上卦為重明下卦三爻皆麗乎正象曰明兩作離大人以繼明照于四方明而又明相續不息自既克明其德便足以照四方矣初九履錯然敬之無咎象曰履錯之敬以辟咎也用觀之始雖有正慧而行履未純故常若錯然之象惟競競業業不敢自安則德日進而習日除可辟咎矣豈俟咎之生而後除哉六二黃離元吉象曰黃離元吉得中道也中正妙定稱性所成以此照一切法使一切法皆成中道乃絶待圓融之妙止也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也過用其慧而無定以濟之有時歡喜太甚則鼓缶而歌有時憂慮太切則大耋之嗟悲歡亂其衷曲乾慧不能自持其退失也必矣九四突如其來如焚如死如棄如象曰突如其來如無所容也雖似有慧有定而實不中不正不能調適道品故時或精進則失于太速而突如其來如時或懈怠則置諸罔覺而焚如死如棄如也夫進鋭者退必速其來既突則決無所容矣又何俟于焚死棄而後知其非善終之道哉六五出涕沱若戚嗟若吉象曰六五之吉離王公也得中之定能發實慧進德固無疑矣然堯舜其猶病諸文王望道未見伯玉寡過未能孔子聖仁豈敢從來聖賢之學皆如是也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也剛而不過又居明極自利已成化他有術人自歸慕而折首非有醜惡而須伐也身正則邦正邦正則六合歸心重譯奉命矣是之謂王用出征豈以奮武揚威為出征哉弟子悟偉照本同捐資刻
