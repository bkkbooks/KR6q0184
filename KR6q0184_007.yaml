body:
  text: 北天目道人蕅益智旭著下經之三離下震上豐亨王假之勿憂宜日中家有妻妾則豐國有多士則豐觀心有事禪助道則豐豐則必亨然非王不足以致豐豐則可憂而勿徒憂但宜如日之明照萬彙可也彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎明而不動動不以明皆非王者之道皆不可以致豐故惟王乃能尚大耳所謂勿憂宜日中者亦非止之令其不昃正宜用其明以照天下則不為豐所蔽也至于昃食盈虛雖天地不能違時徒憂何益象曰雷電皆至豐君子以折獄致刑折獄如電之照致刑如雷之威天之雷電偶一至焉常至則物必壞君子之用刑獄不得已爾輕用則民必傷天之雷電必在盛夏君子之用刑獄必于豐樂康阜之時初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也他卦六爻每以陰陽相應為得所謂沉潛剛克高明柔克也惟豐六爻則陽與陽相得陰與陰相得所謂強弗友剛克燮友柔克也初九剛正遇九四為其配主互相砥礪故雖旬無咎而往有尚若不速往至于過旬不免日中則昃而有災矣六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也六二為離之主至明者也上與六五柔中合德可以互相資益而六五為九四所隔如豐其蔀而日中見斗者焉夫六五燮友可以誠感而不可以急應故往則反得疑疾惟有孚發若則吉蓋信以除疑發以撤蔀也蔀本無實因疑故有志發則疑除疑除則蔀撤而見九二之日矣五本賢君故其志可發九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也以剛正而居離體可以照天下者也應于上六陰陽交而霈然大雨故于日中但見水沫紛飛失王假尚大之事終不可以有為矣明莫若左動莫若右上六居震之極妄動自傷故在九三如折右肱此上之咎非三咎也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也以陽剛為震之主興雲蔽日故為豐蔀見斗幸遇初九剛正如日方升而往有尚力能等我而為夷主相與摧散陰霾行照天下不失豐亨之義故吉也六二之豐蔀見斗乃指六五被九四所蔽今九四則自豐其蔀致使日中見斗故以位不當幽不明責之六五來章有慶譽吉象曰六五之吉有慶也柔中居尊而六二以信發之雖全賴彼離明之德亦實由我能來之也君臣合德天下胥蒙其慶矣上六豐其屋蔀其家窺其戶闃其無人三歲不覿凶象曰豐其屋天際翔也窺其戶闃其無人自藏也以陰居陰處震之極豐之上拒絶離明惟恐容光之或照及我也故豐其屋則堂高數仞飛簷斜桷若欲翔于天際者蔀其家則多設覆蔽深自藏隱縱窺戶而闃若無人者此乃從暗至暗雖至三歲猶不相覿凶何如哉三歲言其甚久亦以隔于九三共三爻故艮下離上旅小亨旅貞吉日中則昃月盈則食故次豐之後明旅也豐以尚大旅以小亨貞豈有大小哉在大則大在小則小要不失其貞而已不失其貞則無往而不吉矣彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉在外故名為旅處旅莫尚于柔用柔莫貴于得中得中則能順剛而天下無難處之境矣止故能隨寓而安麗明故能見機而作此旅之貞即乾之貞即坤之貞即大易之貞也從來大聖大賢自天子至于庶人無不全以乾坤大易之貞而處旅無不即于旅時而具見乾坤大易之貞者詎可以造次而忽其時義之大哉佛法釋者下三土無非旅泊于三土中作大佛事故時義大若以寂光法身視之仍名小亨象曰山上有火旅君子以明慎用刑而不留獄山如亭舍火如過客君子之省方巡狩也法離之明法艮之慎故刑可用而獄不可留蓋設使留獄不決則不惟失離之明亦且失艮之慎矣觀心釋者念起即覺覺即推破不墮掉悔也初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也陰柔在下不中不正旅而瑣瑣者也瑣瑣猶云屑屑由無高明遠大之志所以自取其災六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也當旅之時各以在上相近之爻為次為處為巢而陰宜依陽陽宜附陰今六二陰柔中正順乎九三之剛故為即次以陰居陰而在艮體為懷其資下有瑣瑣之初六而無二心于我為得童僕貞夫即次懷資猶屬外緣得童僕貞則由內德有德如是可謂旅貞吉矣故終無尤九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也三以四為其次而以陽遇陽又屬離體故焚其次而亦可傷矣又復過剛不中處此旅時猶不知所以善與其下致使童僕離心遠去此豈人之罪也哉九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也君子行役志元不在資斧九四近附六五聊可處矣以陽居陰陰為資斧猶云資糧可以致用故名資斧然五方在旅不能即大用我以行其志故雖獲于處而猶未得位也既未得位故雖得其資斧而于行道之心仍未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也此正所謂柔得中乎外而順乎剛者也虛心以招天下之賢以濟吾旅如射雉者雖或亡其一矢終必得雉故人譽之天命之矣蓋以人合天天必祐之名為上逮上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也處旅莫尚于柔今以剛不中正而在離極更無覆護之者如鳥焚其巢矣先則以處高為樂故笑後則以焚巢無歸故號咷離本有牝牛之德乃以任剛傲慢不覺喪之凶何如哉然巢之焚由其以旅在上乃是高亢加人故義能招之豈可歸咎于命數牛之喪由其不知內省驕矜自是故禍生于所忽而終莫之聞豈可怨尤于他人巽下巽上巽小亨利有攸往利見大人善處旅者無入而不自得不巽則無以自容矣巽以一陰入于二陽之下陰有能而順乎陽以致用故小亨而利有攸往利見大人也觀心釋者增上定學宜順于實慧以見理彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人君子之在旅也得乎丘民而為天子民有能而順乎君君則殷勤鄭重申吾命以撫綏之蓋由剛巽乎中正之德故其志得行故柔皆順之也剛不中正則不足以服柔柔不順剛則亦不得小亨矣利有攸往利見大人正所以成其小亨不往不見何以得亨也哉象曰隨風巽君子以申命行事風必相隨繼至乃可以鼓萬物君子必申明其命篤行其事乃可以感萬民故曰君子之德風初六進退利武人之貞象曰進退志疑也利武人之貞志治也初六巽之主也巽主于入而陰柔每患多疑故或進而且退夫天下事本無可疑特其志自疑耳決之以武人之貞則志治而天下事不難治矣此所云武人之貞即彖所云有攸往而見大人者也九二巽在床下用史巫紛若吉無咎象曰紛若之吉得中也九五陽剛中正為巽之主如坐床上則九二巽德之臣固宜在床下矣然以剛中得初六之順未免有僭竊之嫌故必用史以紀吾所行用巫以達吾誠悃紛若不敢稍疏乃得中而吉無咎也九三頻巽吝象曰頻巽之吝志窮也以剛居剛非能巽者勉強學巽時或失之蓋志窮則不止于志疑疑可治而窮則吝矣六四悔亡田獲三品象曰田獲三品有功也陰柔得正為巽之主順乎九五陽剛中正之君此休休有容之大臣天下賢才皆樂為用者也故如田獲三品而有功三品者除九五君位餘三陽皆受其羅網矣九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也雖有其德苟無其位則不敢變更雖有其位苟無其德則不能變更九五蓋德位相稱者也故得其巽之貞而亦吉亦悔亡亦無不利然事既變更則是無初變更得正所以有終又必丁寧于未更三日之先且豫揆度于既更三日之後則吉也盤庚以之上九巽在床下喪其資斧貞凶象曰巽在床下上窮也喪其資斧正乎凶也以陽剛居卦上舉凡九五九二之能巽者皆在我床下矣而我方上窮而不知故初六六四之資斧皆為二五所用而不為我用其凶也是其正也何所逃乎佛法釋六爻者初是世間事禪有進有退二是空慧宜史巫以通實相三是乾慧不能固守四是出世間禪多諸功德五是中道正慧接別入圓故無初有終上是邪慧滅絶功德兌下兌上兌亨利貞入則自得自得則説自得則人亦得之人得之則人亦説之矣説安得不亨哉然説之不以正君子不説故利貞焉書云無拂民以從己之欲罔違道以干百姓之譽彖曰兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉剛中則無情欲偏倚之私柔外則無暴戾粗浮之氣此説之至正天地同此一德者也以此德而先民民自忘勞以此德而犯難民自忘死即此是説之大民自勸而胥化于善非以我勸民也象曰麗澤兌君子以朋友講習澤相麗則不枯竭學有朋則不孤陋以文會友講也以友輔仁習也講而不習則罔習而不講則殆講則有言不背于無言習則無言證契于有言又講則即無言為有言習則即有言成無言矣初九和兌吉象曰和兌之吉行未疑也剛正無應和而不同得兌之貞者也無私故未有疑九二孚兌吉悔亡象曰孚兌之吉信志也剛中則誠內形外自信其志亦足以取信于天下矣六三來兌凶象曰來兌之凶位不當也六三為兌之主何以凶哉乾得坤之上爻而為兌以陽為體以陰為用者也若內無其體徒欲外襲其用以來取悅于人則亂義必矣君子所以惡夫佞者九四商兌未寧介疾有喜象曰九四之喜有慶也兌不可以不利貞也三之來兌何足戀惜乃不忍絶而商之心必未寧惟介然自斷速疾勿遲則有喜矣大臣不為諂媚所惑天下且受其慶不止一身有喜而已九五孚于剝有厲象曰孚于剝位正當也陽剛中正誠內形外之至者也故不惟可孚于君子亦可孚于剝正之小人使彼改惡從善反邪歸正而有厲焉蓋既有其德又有其位故化道如此之盛耳上六引兌象曰上六引兌未光也上六亦為兌主然既無其體惟思以悅引人則心事亦曖昧矣三欲來四上欲引五其情態同而三不當位故凶上猶得正故不言凶坎下巽上渙亨王假有廟利涉大川利貞悅而後散之謂公其悅于天下而不獨樂其樂故亨也既能與民同樂則上可以悅祖考故王假有廟遠可以悅四夷故利涉大川而悅不可以不正也故誡之以利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也九二剛來而不窮六四柔得位乎外而上順于九五此能擴充兌卦剛中柔外之德而渙其悅于天下者也安得不亨又九五居上卦之中此王假有廟以悅祖考之象乘巽木而涉坎水此遠悅四夷決定有功之象而貞在其中矣象曰風行水上渙先王以享于帝立廟風行水上不勞力而波濤普遍先王享帝以事天立廟以事先盡其一念誠孝即足以感通天下恩波亦無不遍矣故曰明乎郊社之禮禘嘗之義治國其如視諸掌乎初六用拯馬壯吉象曰初六之吉順也初居坎下受四之風而用拯拯則出水而登陸矣坎于馬為美脊今初六順于九二故為馬壯而吉九二渙奔其杌悔亡象曰渙奔其杌得願也此正彖傳所謂剛來而不窮者也當渙時而來奔據于杌卓然安處中流得其自悅悅他之願故悔亡六三渙其躬無悔象曰渙其躬志在外也陰居坎體之上六四上同上九之風而渙之舉體散作波濤以潤于物志在外而不在躬故無悔也六四渙其群元吉渙有丘匪夷所思象曰渙其群元吉光大也此正彖所謂柔得位乎外而上同者也陰柔得正為巽之主上同九五下無應與盡渙其群以合于大公此則天下一家萬物一體名雖為渙而實乃有丘矣聖人無己無所不己光明正大之道豈平常思慮所能及哉九五渙汗其大號渙王居無咎象曰王居無咎正位也發大號以與民同悅如汗之發于中而浹于四體蓋四之渙群由五為王而居于正位四乃得上同之是故大號如汗渙于外王居正位常在中故無咎也上九渙其血去逖出無咎象曰渙其血遠害也血者坎之象逖者遠也人有大患為其有身常情執之保為己躬正理觀之乃膿血聚毒害本耳上九用六四之風以渙六三之躬六三可謂忘身為國故志在外而無悔然非上九為其遠害則六三何能興利乎合六爻言之九二如賢良民牧承流宣化六四如名世大臣至公無私九五如治世聖王與民同樂上九如保傅司徒教民除害初因此而出險既拔苦必得樂故吉三因此而忘我既遠害必興利故無悔也兌下坎上節亨苦節不可貞水以風而渙以澤而節節則不潰不涸而可以常潤故亨夫過于渙必竭故受之以節然過于節則苦又豈可常守乎彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民得中則不苦苦則窮窮則不可以處常不苦則説説則并可以行險惟節而當位斯為中正惟中正故通而不窮天有四時王有制度皆所謂中正以通者也象曰澤上有水節君子以制數度議德行若冕旒若宗廟若樂舞若階陛若蓍龜若爵祿等皆有其數以為度制使各得其節則無過與不及而不奢不儉若見君若事親若接賓若居喪等皆根乎德以成行議使各當其節則無過與不及而可繼可傳如澤節水稱其大小淺深要使不潰不涸而已初九不出戶庭無咎象曰不出戶庭知通塞也節之義亦多矣或時節或裁節或品節或名節或樽節或符節或節制或節文或節限或節操今且以時節言之剛正而居下位九二塞于其前故順時而止不出戶庭既知裁節則品節名節皆善矣復以節制言之上應六四水積尚淺故宜塞使不流也九二不出門庭凶象曰不出門庭凶失時極也若以時節言之既在可為之位又有剛中之德六三已闢其門而乃上無應與固守小節豈非大失復以節制言之上對九五水積漸深便宜通之使流胡須阻塞以致洪泛豈非失時之極六三不節若則嗟若無咎象曰不節之嗟又誰咎也若以時節言之陰不中正居下之上又為悅主故始則恣情適意而不知節若後則憂患洊至而徒有嗟若自取其咎無可以咎誰也復以節制言之上對上六水已泛濫而澤口不能節之徒有嗟若而已將誰咎乎六四安節亨象曰安節之亨承上道也若以時節言之柔而得正居大臣位以承聖君故為安節所謂太平宰相也復以節制言之下應初九塞而不流任九五上六之波及于物而我獨享其安故亨九五甘節吉往有尚象曰甘節之吉居位中也陽剛中正居于尊位所謂當位以節者也無過不及故甘而吉行之無敝故往有尚自居位中故非失時極之九二所能阻礙上六苦節貞凶悔亡象曰苦節貞凶其道窮也若以時節言之純陰而居節之極固守不通故其道既窮雖正亦凶彼執為正實非正也惟悔而改之則不窮不窮則凶可亡矣復以節制言之水以流下為其節操六三兌口上缺不能節制故上六盡其流下之節而不稍留遂至枯竭而為苦節故曰其道窮也兌下巽上中孚豚魚吉利涉大川利貞四時有節故萬物信之而各獲生成數度德行有節故天下信之而成其感應孚者感應契合之謂中者感應契合之源也由中而感故由中而應如豚魚之拜風彼豈有安排布置思議測度也哉中孚而能若豚魚拜風則吉矣然欲致此道則利涉大川而又利貞蓋不涉川不足以盡天下之至變不利貞不足以操天下之至恆不涉川則不能以境鍊心而致用不利貞則不能以理融事而立本也彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也合全卦而觀之二柔在內則虛心善順毫無暴戾之私分上下而觀之兩剛得中則篤實真誠毫無情欲之雜兌悅則感人以和巽順則入人必洽故邦不祈化而自化也信及豚魚猶言信若豚魚蓋人心巧智多而機械熟失無心之感應不及豚魚之拜風者多矣故必信若豚魚而後可稱中孚也巽為木為舟浮于澤上內虛而木堅故能無物不載無遠不達人之柔在內如虛舟剛得中如堅木斯可歷萬變而無敗也夫中孚即天下之至貞惟利貞乃成中孚此豈勉強造作所成乃應乎天然之性德耳試觀颶風將作豚魚躍波魚何心于感風風何心于應魚蓋其機則至虛其理則至實矣吾人現在一念心性亦復如是不在內不在外不在中間不在過去不在現在不在未來覓之了不可得可謂至虛天非此無以為覆地非此無以為載日月非此無以為明鬼神非此無以為靈萬物非此無以生育聖賢非此無以為道體物而不可遺可謂至實夫十方三世之情執本虛而心體真實決不可謂之虛天地萬物之理體本實而相同幻夢決不可謂之實是故柔與剛非二物內與中非二處也知乎此者方可名貞方可涉川方信及豚魚而吉矣象曰澤上有風中孚君子以議獄緩死澤感而風應風施而澤受隨感隨應隨施隨受此中孚之至也君子知民之為惡也蓋有出于不得已者焉如得其情則哀矜而勿喜故于獄則議之功疑惟重罪疑惟輕也于死則緩之與其殺不辜寧失不經也如此則殺一人而天下服雖死不怨殺者矣初九虞吉有他不燕象曰初九虞吉志未變也君子戒慎乎其所不睹恐懼乎其所不聞皆是向一念未生前下手即本體即功夫即功夫即本體故能遁世不見知而不悔而天地位焉萬物育焉所謂暗然而日章者也才起一念則名為他則志變而不燕矣小人而無忌憚行險徼幸皆從此一念構出可不虞之于初也哉中孚以天地萬物為公若專應六四便名有他九二鳴鶴在陰其子和之吾有好爵吾與爾靡之象曰其子和之中心願也剛得中而居二陰之下此正暗然日章者也鶴鳴子和感應並出于天然豈有安排勉強故曰中心願也子無專指但取同德相孚之人六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也若以卦體合觀則三與四皆所謂柔在內者也今以諸爻各論則六三陰不中正為兌之主本應上九而彼方登天獨鳴不來相顧近得六四敵體同類故有時欣其所得則或鼓有時怨其所應則或罷有時遙憶上九則或泣有時且娛六四則或歌皆由無德不能當位故也六四月幾望馬匹亡無咎象曰馬匹亡絶類上也柔而得正陰德之盛者也故如月幾望焉六三妄欲得我為匹我必亡其匹絶其類乃上合于天地萬物為公之中孚而無咎也九五有孚攣如無咎象曰有孚攣如位正當也陽剛中正居于尊位德位相稱天下信之攣如而不可移奪者也然亦止盡中孚之道而已豈有加哉故但曰無咎亦猶圓滿菩提歸無所得之旨歟上九翰音登于天貞凶象曰翰音登于天何可長也剛不中正居巽之上卦之終自信其好名好高情見而不知柔內得中之道者也如雄雞捨其牝而登鳴于屋已為不祥況欲登天天不可登人必以為怪而殺之矣何可長也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉君子之制數度議德行也使其節如天地四時則豚魚亦信之矣夫豈有過也哉自其不能應乎天者以有他而不燕故過或生焉然過從求信而生過則小矣過生而聖賢為之補偏救弊如行過乎恭喪過乎哀用過乎儉之類未免矯枉過正此亦所謂小過也夫求信而成小過其過可改也故亨矯枉而為小過其過可取也故亨然必要于得正而已矣貞則小過便成無過不貞則小過將成大過是故當小過時但可為小事以祈復于無過之地不可更為大事以致釀成不測之虞譬如飛鳥已過遺我以音不宜上而宜下上則音啞而我不得聞下則音揚而我得聞之得聞鳥音以喻得聞我過而速改焉則復于無過之地過小而吉乃大矣彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小者即小事小事有過故仍不失其亨設大者過則必利有攸往乃亨矣惟與時行故雖過不失其貞彖但言貞傳特點出時行二字正顯時當有過則過乃所以為貞倘不與時行雖強欲藏身于無過之地亦不名為貞也且人有剛柔二德任大事則宜用剛處小事則宜用柔今此卦柔得其中得中則能與時行故小事吉剛失位而不中不中則不能與時行故不可以大事且卦體中二陽爻如鳥之背外各二陰如舒二翼有似飛鳥之象鳥若上飛則風逆而音啞鳥若下飛則風順而音揚也錢啓新曰大過大者過也曰剛過而中小過小者過也曰柔得中其所謂過皆有餘之謂大成其大如獨立遁世等事小成其小如過恭過哀過儉等事初不是過剛過柔更不是過中故大過之後受之以坎離之中小過之後受之以既濟未濟之中君子以天下與世論須是大過以家與身論須是小過大過以剛大有餘為用剛中之能事小過以柔小有餘為用柔中之能事剛中又巽兌二柔之用柔中又震艮二剛之用都不是過中之過又匪專以坎為剛中離為柔中故隨小大而皆亨象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉吳草廬曰恭以救傲哀以救易儉以救奢救其過以補其不足趣于平而已所謂時中也項氏曰曰行曰喪曰用皆見于動以象震也曰恭曰哀曰儉皆當止之節以象艮也初六飛鳥以凶象曰飛鳥以凶不可如何也陰不中正上應九四宜下而反上者也凶決不可救矣六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也設欲上進則必過九四之祖遇六五之妣然兩陰不相應而六二陰柔中正居于止體故不復上及六五之君但遇其九四之臣以知九四雖臣而實有德決不可過故也二與四同功而異位故有相遇之理太公避紂而遇文王此爻似之九三弗過防之從或戕之凶象曰從或戕之凶如何也重剛不中而應上六如鳥身不能為主反隨翼而高飛既弗肯過防間之必有從而戕之者矣其凶何如九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也九三信其剛正自以為無咎者也乃弗防而致戕九四居位不當自知其有咎者也乃周公許其無咎何哉蓋人惟自見有不足處方能過于省察堯舜其猶病諸文王望道未見孔子五十學易伯玉寡過未能皆此意耳四與初應故弗過而遇之但使初來聽命于四則四為主而無咎設使四往聽命于初則初反為主喜上而不喜下初得凶而四亦甚厲矣故必戒而勿用須是永守其不宜上宜下之貞乃可長也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也陰柔不正下無應與雖為天下共主膏澤不下于民如雲自西郊雖密不雨者焉乃使九四之公坐收下位群賢如弋彼在穴而不費力蓋由六五之已上違于不宜上宜下之貞故也此如紂不能用太公反使文王取之上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也下應九三而陰居動體卦極方與初六鼓翰奮飛故弗遇九三而竟過之一切飛鳥皆悉離之遺群獨上身死羽落而後已其凶也蓋天擊之故曰災眚其災也實自取之故曰已亢桀紂亡國亦僅失其不宜上宜下之貞所致而已豈有他哉設肯行過乎恭喪過乎哀用過乎儉何以至此離下坎上既濟亨小利貞初吉終亂君子之于事也恭以濟傲哀以濟易儉以濟奢凡事適得其中則無不濟者矣無不濟故亨不惟在大而亦及小蓋無所不亨者也然安不忘危存不忘亡治不忘亂乃萬古之正理試觀舟不覆于龍門而覆于溝渠馬不蹶于羊腸而蹶于平地豈謂溝渠平地反險于龍門羊腸哉禍每生于不測患莫甚于無備故也故必利貞以持之不然方其初得既濟皆以為吉終必以此致亂不可救矣如水得火濟而可飲可用然設不為之防間則火炎而水枯水決而火滅不反至于兩傷乎彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也小者尚亨則大者不待言矣六十四卦惟此卦剛柔皆當其位故貞六二柔得其中為離之主以此濟水水方成用故初吉然設以為既無不濟便可終止則必致水決火滅火炎水枯之亂或任其火燼水竭故曰其道窮也象曰水在火上既濟君子以思患而豫防之方其既濟似未有患患必隨至故君子深思而豫防即彖所謂利貞者也説統云體火上之水以制火而防其溢體水下之火以濟水而防其烈初九曳其輪濡其尾無咎象曰曳其輪義無咎也六爻皆思患豫防之旨也既濟則初已濟矣輪猶曳而若欲行尾猶濡而若欲渡無事不忘有事防之于初則不至于終亂故義無咎六二婦喪其茀勿逐七日得象曰七日得以中道也九五陽剛中正而居君位二以陰柔中正應之必有小人欲為離間而竊其茀者二得中道故安然不尋逐之惟勿逐乃七日自得逐則失中道而弗得矣勿逐二字即思患豫防之妙九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也以重剛居明極高宗伐鬼方之象也然且三年克之困憊甚矣況剛明未必如高宗者乎況可用小人以窮兵黷武殃民賊國乎奈何不思患而豫防之也六四繻有衣袽終日戒象曰終日戒有所疑也美帛曰繻敝絮曰袽繻必轉而為袽可無戒乎潘雪松云四居三之後離明盡而坎月方升時也在三已稱日昃之離在四何可忘終日之戒蕅益曰疑即是思患豫防之思九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也離東坎西下卦盡離明之用以致濟猶如殺牛九五以坎中剛正之實德而享受之曾不費力猶如禴祭蓋雖有其德苟無其時不能致此雖有其時苟無實德亦不能致此也而思患豫防之旨則在以誠不以物中見之上六濡其首厲象曰濡其首厲何可久也以陰柔居險之極在濟之終所謂終止則亂不能思患豫防者也如渡水而濡其首不亦危乎坎下離上未濟亨小狐汔濟濡其尾無攸利既有既濟必有未濟以物本不可窮盡故也既有未濟必當既濟以先之既濟原從未濟而濟故也是以有亨道焉然未濟而欲求濟須老成須決斷須首尾一致倘如小狐之汔濟而濡其尾則無所利矣彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也六五之柔得中所謂老成決斷而能首尾一致者也未出中言尚未出險中此時正賴老成決斷之才識首尾一致之精神而可不續終如小狐乎然雖不當位而剛柔相應則是未濟所可以可亨之由象曰火在水上未濟君子以慎辨物居方物之性不可不辨方之宜不可不居故君子必慎之也如火性炎上水性潤下此物之不可不辨者也炎上而又居于上不已亢乎是宜居下以濟水潤下而又居于下將安底乎是宜居上以濟火此方之不可不居者也如水能制火亦能滅火火能濟水亦能竭水又水火皆能養人亦皆能殺人以例一切諸物無不皆然辨之可弗詳明居之可弗斟酌耶初六濡其尾吝象曰濡其尾亦不知極也陰柔居下無濟世才將終于不濟而可羞矣豈知時勢已極固易為力者哉九二曳其輪貞吉象曰九二貞吉中以行正也剛而不過以此曳輪而行得濟時之正道者也由其在中故能行正可見中與正不是二理六三未濟征凶利涉大川象曰未濟征凶位不當也陰不中正才德俱劣故往必得凶然時則將出險矣若能乘舟以涉大川不徒自恃其力則險可濟也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也剛而不過如日方升得濟時之德之才之位者也故貞吉而悔亡于以震其大明之用伐彼幽暗鬼方三年功成必有賞于大國矣濟時本隱居所求之志今得行之六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也柔中離主以居天位本得其正本無有悔此君子之光也又虛己以孚九二而其暉交映天下仰之吉可知矣上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也六五之有孚吉天下已既濟矣故上九守其成而有孚于飲酒乃與民同樂無咎之道也然君子之于天下也安不忘危存不忘亡治不忘亂苟一任享太平樂而無競業惕厲之心如飲酒而濡其首吾信其必失今日此樂以彼不知節故節者如天地之四時必不可過亦謂之極初六柔疑太過故云亦不知極上九剛信太過故云亦不知節知極知節則未濟者得濟已濟者可長保矣弟子崇存大弘同募刻
