body:
  text: 北天目道人蕅益智旭著繫辭上傳伏羲設六十四卦令人觀其象而已矣夏商各于卦爻之下繫辭焉以斷吉凶如所謂連山歸藏者是也周之文王則繫辭于每卦之下名之曰彖逮乎周公復繫辭于每爻之下名之曰象孔子既為彖傳象傳以釋之今又統論伏羲所以設卦文周所以繫辭其旨趣綱領體度凡例徹乎性修之源通乎天人之會極乎巨細之事貫乎日用之微故名為繫辭之傳而自分上下焉隨緣不變不變隨緣之易理天地萬物所從建立也卦爻陰陽之易書法天地萬物而為之者也易知簡能之易學玩卦爻陰陽而成之者也由易理方有天地萬物此義在下文明之今先明由天地萬物而為易書由易書而成易學由易學而契易理天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以群分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相盪鼓之以雷霆潤之以風雨日月運行一寒一暑此先明由天地萬物而為易書也易之乾坤即象天地易之貴賤即法高卑易之剛柔即法動靜易之吉凶即法方物易之變化即法形象是故易之有剛柔相摩八卦相盪而變化無窮猶天地之有雷霆風雨日月寒暑而萬物皆備蓋無有一文一字是聖人所杜撰也乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此明由易書而成易學由易學而契易理也萬物雖多不外天地易卦雖多不出乾坤聖人體乾道而為智慧智慧如男體坤道而為禪定禪定如女智如金聲始條理定如玉振終條理智則直心正念真如故易知而無委曲之相定則持心常在一緣故簡能而無作輟之岐正念真如故吾無隱乎爾而易知持心一緣故無入不自得而易從易知故了知生佛體同而有親易從故決能原始要終而有功有親不惟可大而又可久即慧之定也有功不惟可久而又可大即定之慧也德業俱備以修顯性故得理而成位矣易理本在天地之先亦貫徹于天地萬物之始終今言天下之理者以既依理而有天地則此理即渾然在天下也亦以孔子既示為世間聖人故且就六合內言之聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利惟其易理全現乎天地之間而人莫能知也故伏羲設卦以詮顯之文周又觀其象繫辭焉而明吉凶以昭告之順理者吉逆理者凶也夫易理本具剛柔之用而剛柔各有善惡之能剛能倡始而過剛則折柔能承順而過柔則靡然剛柔又本互具剛柔之理故悟理者能達其相推而生變化是故吉凶者即失理得理之象也悔吝者乃憂于未然慮于事先之象也知吉凶之象則必為之進退而勿守其窮故變化者明示人以進退之象也知悔吝之方則必通乎晝夜而善達其用故剛柔者明示人以晝夜之象也然則六爻之動一唯詮顯三極之道而已三極之道即先天易理非進非退而能進能退非晝非夜而能晝能夜天得之以立極于上地得之以立極于下人得之以立極于中故名三極之道乃即一而三即三而一之極理也夫易理既在天而天在地而地在人而人是故隨所居處無非易之次序秖須隨位而安只此所安之位雖僅六十四卦中之一位便是全體三極全體易理不須更向外求而就此一位中具足無量無邊變化統攝三百八十四種爻辭無有不盡是可樂而玩也平日善能樂玩故隨動皆與理合縱遇變故神恒不亂自能就吉遠凶此乃自心合于天理故為理之所祐豈徼倖于術數哉彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之承上居則觀其象而言象者莫若彖也動則觀其變而言變者莫若爻也彼彖爻所言吉凶者乃示人以失得之致使人趣得而避失也所言悔吝者乃示人以小疵使勿成大失也所言無咎者乃示人以善補其過使還歸于得也是故位以列其貴賤使人居上不驕為下不倍也卦以齊其小大使人善能用陰用陽不被陰陽所用也辭以辯其吉凶使人知吉之可趣凶之可避也此其辯別之端甚微非觀象玩占者不能憂之此其挽回之力須猛非觀變玩占者不能震之是故卦有小大辭有險易蓋明明指人以所趨之理矣所趨之理即吉道也自非全體合理決不能有吉無凶易與天地準故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之說精氣為物游魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體夫觀象玩辭觀變玩占者正以辭能指示究竟所趨之理故也易辭所以能指示極理者以聖人作易本自與天地準故能彌合經綸天地之道也聖人之作易也仰觀天文俯察地理知天文地理之可見者皆是形下之器其事甚明而天文地理所以然之故皆不出于自心一念之妄動妄靜動靜無性即是形上之道其理甚幽此幽明事理不二而二二而不二惟深觀細察乃知之也原其所自始則六十四始于八八始于四四始于二二始于一一何始乎一既無始則二乃至六十四皆無始也無始之始假名為生反其所以終則六十四終只是八八終是四四終是二二終是一一終是無無何終乎無既無終則一乃至六十四亦無終也無終之終假名為死由迷此終始死生無性之理故妄于天地間攬精氣以為物游魂靈以輪迴六道而為變是故知鬼神之情狀也聖人既如此仰觀俯察乃至鬼神之情狀皆備知已然後作易所以易則與天地相似故不違也依易起知知乃周乎萬物而道濟天下故不過也依易起行行乃旁行而不流樂天知命故不憂也知行具足則安土敦仁廣度含識故能愛也是以橫則範圍天地之化而不過曲成萬物而不遺豎則通乎晝夜之道而知橫遍豎窮安有方所既無方所寧有體相哉神指聖人易指理性非無體之易理不足以發無方之神知非無方之神知不足以證無體之易理旁行者普現色身三昧現形六道也不流者不隨六道惑業所牽也樂天者恒觀第一義天也知命者善達十界緣起也安土者三塗八難皆常寂光也敦仁者於一切處修大慈大悲三昧也晝者涅槃夜者生死了知涅槃生死無二致故三世一照名為通乎晝夜之道而知一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事陰陽不測之謂神夫易雖無體無所不體非離陰陽形體而別有道也一陰一陽則便是全體大道矣然非善稱理以起修者不能繼陰陽以立極而即彼成位于中者全是本性功能乃世之重力行者往往昧其本性是仁者見之謂之仁也世之重慧解者往往不尚修持是知者見之謂之知也百姓又日用而不自知故君子全性起修全修顯性之道鮮矣然仁者雖但見仁而仁何嘗不從知以顯知者雖但見知而用何嘗不隨仁以藏仁體至微而恒顯知用至露而恒藏此即一陰一陽之道法爾鼓舞萬物而不與聖人同憂者也不與聖人同憂且指易之理體而言其實聖人之憂亦不在理體外也且聖人全體易理則憂亦非憂矣包含天地萬物事理故為富有變化不可窮盡故為日新業業之中具盛德德德之中具大業故為生生凡德業之成乎法象者皆名為乾不止六陽一卦為乾凡效法而成其德業者皆名為坤不止六陰一卦為坤極陰陽之數而知數本無數從無數中建立諸數便能知來即謂之占非俟揲蓍而後為占既知來者數必有窮窮則必變變則通通則久即是學易之事非俟已亂而後治已危而求安之謂事終日在陰陽數中而能制造陰陽不被陰陽所測故謂之神自富有至謂神五句贊易理之無體極數三句贊聖神之無方也夫易廣矣大矣以言乎遠則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專一其動也直是以大生焉夫坤其靜也翕一其動也闢是以廣生焉廣大配天地變通配四時陰陽之義配日月易簡之善配至德上云生生之謂易指本性易理言也依易理作易書故易書則同理性之廣大矣言遠不禦雖六合之外可以一理而通知也邇靜而正曾不離我現前一念心性也天地之間則備所謂徹乎遠邇該乎事理統乎凡聖者也易書不出乾坤乾坤各有動靜動靜無非法界故得大生廣生而配于天地既有動靜便有變通以配四時隨其動靜便為陰陽以配日月乾易坤簡以配至德是知天人性修境觀因果無不具在易書中矣子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化夫聖人依易理而作易書易書之配天道人事也如此故孔子作傳至此不覺深為之歎賞曰易其至矣乎夫易乃聖人所以崇德而廣業也知則高高山頂立故崇禮則深深海底行故卑崇即效天卑即法地蓋自天地設位以來而易理已行于其中矣但隨順其本成之性而不使一念之或亡則道義皆從此出更非性外有少法可得也是故易象也者不過是聖人見天下之賾而擬其形容象其物宜者耳易爻也者不過是聖人見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶者耳夫天下之物雖至賾總不過陰陽所成則今雖言天下之至賾而安可惡若惡其賾則是惡陰陽惡陰陽則是惡太極惡太極則是惡吾自心本具之易理矣易理不可惡太極不可惡陰陽不可惡則天下之至賾亦安可惡乎夫天下之事雖至動總不出陰陽之動靜所為則今雖言天下之至動而何嘗亂若謂其亂則是陰陽有亂太極有亂吾心之易理有亂矣易理不亂太極不亂陰陽不亂則天下之至動亦何可亂乎是以君子當至賾至動中能善用其擬議擬議以成變化遂能操至賾至動之權蓋必先有中孚之德存于己而後可以同人孚德既深雖先或號咷後必歡笑況本無暌隔者乎然欲成孚德貴在錯地之一著譬如藉用白茅則始無不善又貴在究竟之不變譬如勞謙君子則終無不吉倘勞而不謙未免為亢龍之悔倘藉非白茅未免有不密之失而所謂不出戶庭者乃真實慎獨功夫非陽為君子陰為小人者所能竊取也鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭金雖至堅同心者尚能斷之此所謂金剛心也初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣苟誠也誠能從地穩放即禪門所謂腳跟穩當者也白茅潔淨而柔軟正是第一寂滅之忍勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也慎斯術也以往即始而見終也亦因該果海義致恭以存其位令終以全始也亦果徹因源義亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也事者心事器者象貌佛法所謂懷抱于結使不應著袈裟者也招字妙甚可見致魔之由皆由主人天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此明河圖之數即天地之數即所以成變化而行鬼神者也太極無極秖因無始不覺妄動強名為一一即屬天對動名靜靜即是二二即屬地二與一為三三仍屬天二與二為四四仍屬地四與一為五五仍屬天四與二為六六仍屬地六與一為七七仍屬天六與二為八八仍屬地八與一為九九仍屬天八與二為十十仍屬地十則數終而不可復加故河圖止有十數然此十數總不出于天地除天地外別無有數除數之外亦別無天地可見矣總而計之天數凡五所謂一三五七九也地數亦五所謂二四六八十也一得五而成六六遂與一合而居下二得五而成七七遂與二合而居上三得五而成八八遂與三合而居左四得五而成九九遂與四合而居右既言六七八九必各得五而成則五便在其中既言一二三四則便積而成十十遂與五合而居中積而數之天數一三五七九共成二十有五地數二四六八十共成三十凡天地之數五十有五而變化皆以此成鬼神皆以此行矣有陰陽乃有變化有變化乃有鬼神變化者水火木金土生成萬物也鬼神者能生所生能成所成各有精靈以為之主宰也變化即依正幻相鬼神即器世間主及眾生世間主耳大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸奇于扐以象閏五歲再閏故再扐而後掛衍乘也大衍謂乘此天五地五之數而演至于萬有一千五百二十也河圖中天地之數共計五十有五今以天五地五原非兩五是其定數以對于十亦是中數一得之以為六二得之以為七三得之以為八四得之為九復合一二三四以成于十故除中宮五數以表數即非數而惟取餘五十以為大衍之數以表從體起用及揲蓍時又于五十數中存其一而不用以表用中之體亦表無用之用與本體太極實非有二夫從體起用即不變隨緣義也用中之體即隨緣不變義也將此四十九策隨手分而為二安于左右象吾心之動靜即成天地兩儀次以左手取左策執之而以右手取右策之一掛于左手之大指間象人得天地合一之道而為三才次四四以揲之象天地間四時新新不息次歸其所奇之策扐于左手無名指間以象每年必有閏日又以右手取右策執之而以左手四四揲之歸其所奇之策扐于左手中指之間是名再扐以象五歲必有兩個閏月是為再閏已上分二掛一揲四歸奇共四營而為一變取其所掛所扐之策置之然後再取左右揲過之策而重合之重復分二掛一揲四歸奇故云再扐而後掛也是為二變又取所掛所扐之策置之然後更取左右揲過之策而重合之重復分二掛一揲四歸奇是為三變置彼三變所掛所扐之策但取所揲之策數之四九三十六則為四八三十二則為四七二十八則為四六二十四則為乂于是成爻為陽動動則變陰為陰靜為陽靜靜皆不變乂為陰動動則變陽故下文云四營成易三變成爻十八變成六爻則為卦也此蓍草之數及揲蓍之法乃全事表理全數表法示百姓以與知與能之事正所謂神道設教化度無疆者矣謂之大乘不亦宜乎若不以惟心識觀融之屈我羲文周孔四大聖人多矣乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也九七皆乾而爻言其變故占時用九不用七一爻三十六策則乾卦六爻共計二百一十六策也八六皆坤而占時用六不用八一爻二十四策則坤卦六爻共計一百四十四策也合成三百六十策可當期歲之日然一歲約立春至第二年春則三百六十五日有奇約十二月則三百五十四日而今云三百六十適取其中亦取大概言之不必拘拘也又合上下二篇六十四卦之策而總計之陽爻百九十二共六千九百一十二策陰爻百九十二共四千六百八策故可當萬物之數夫期歲之日萬物之數總惟大衍之數所表大衍不離河圖河圖不離吾人一念妄動則時劫萬物又豈離吾人一念妄動所幻現哉是故四營而成易十有八變而成卦一變必從四營而成以表一念一法之中必有生住異滅四相三變成爻以表爻爻各具三才之道六爻以表三才各有陰陽十八變以表三才各各互具而無差別八卦而小成三爻已可表三才九變已可表互具故名小成引而伸之觸類而長之天下之能事畢矣八可為六十四不過引而伸之也三百八十四爻以定天下之吉凶是在觸類而長之也至于觸類而長則一一卦一一爻皆可斷天下事而裁成輔相之能事無不盡矣顯道神德行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所為乎有一必有二有二必有四有四必有八有八必有六十四有六十四必有三百八十四然三百八十四爻秖是六十四卦六十四卦秖是八卦八卦秖是四象四象秖是兩儀兩儀秖是太極太極本不可得太極不可得則三百八十四皆不可得故即數可以顯道也陰可變陽陽可變陰一可為多多可為一故體此即數之道者可以神其德行也既即數而悟道悟道而神明其德則世間至賾至動皆可酬酢而鬼神所不能為之事聖人亦能祐之矣先天而天弗違此之謂也人但知揲蓍為變化之數耳若知變化之道則無方之神無體之易皆現于靈知寂照中矣故述傳至此特自加子曰二字以顯咨嗟詠嘆之思而史記自稱太史公曰乃本于此易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占前文云君子觀象玩辭觀變玩占今言此四即易所有聖人之道也夫玩辭則能言觀變則能動觀象則可以制器玩占則可以卜筮決疑言也動也制器也卜筮也聖人修身治人之事豈有外于此四者哉是以君子將有為也將有行也問焉而以言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與於此君子學聖人者也學聖人者必學易善學易者舉凡有為有行必玩辭而玩占果能玩辭玩占則易之至精遂為我之至精矣參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此參者彼此參合之謂伍者行伍定列之謂也雖彼此參合而不壞行伍之定列雖行伍定列而不壞彼此之參合故名參伍以變由彼此參合則其數相錯由行伍定列則其數可綜故云錯綜其數舉凡河圖洛書之成象揲蓍求卦之法式無不皆然非僅偏指一種也陰陽各有動靜故成天地之文六十四卦各具六十四卦故定天下之象誠能觀象以通變觀變以極數則易之至變遂為我之至變矣易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易雖至精至變豈有思慮作為于其間哉惟其寂然不動所以感而遂通誠能于觀象玩辭觀變玩占之中而契合其無思無為之妙則易之至神遂為我之至神矣夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也由此觀之則易之為書乃聖人所以極深而研幾者也苟極其深則至精者在我而能通天下之志苟研其幾則至變者在我而能成天下之務苟從極深研幾處悟其無思無為寂然不二之體則至神者在我故能不疾而速不行而至矣謂聖人之道不全寄詮于易書中可乎今有讀易而不知聖人之道者何異捨醇醲而味糟粕也子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與于此哉古之聰明睿知神武而不殺者夫此欲明易書之妙而先示易理之大也夫所謂易果何義哉蓋是開一切物成一切務包盡天下之道者也是故聖人依易理而成易書以通天下之志使人即物而悟理以定天下之業使人素位而務本以斷天下之疑使人不泣岐而徼倖是故蓍之德極其變化而不可測也卦之德有其定理而不可昧也爻之義盡其變通而未嘗隱也夫蓍圓而神卦方以知爻易以貢皆所謂寂然不動感而遂通者也聖人即以此洗心退藏于密所謂自明誠謂之教能盡其性則能盡人之性故吉凶與民同患神以知來知以藏往不俟問于蓍龜而後知吉凶也此惟古之聰明睿知斷惑而無惑可斷者乃能與于此耳是以明于天之道而察于民之故是興神物以前民用聖人以此齋戒以神明其德夫夫神以知來知以藏往則又何俟蓍龜之神物而後斷民之吉凶哉但聖人能之眾人不能不藉蓍龜以示則民不信也是以明于借物顯理乃天之道因占決疑乃民之習故藉此蓍龜以開民用之前而聖人亦示現齋戒然後卜筮者正欲以此倍神明其德也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也是故德既神明方知易理無所不在且如闔戶即謂之坤闢戶即謂之乾一闔一闢即是變往來不窮即是通見即是象形即是器隨所制用即是法隨其民用出入即是神則乾坤乃至神明何嘗不即在日用動靜間哉凡此皆易理之固然而易書所因作也是故易者無住之理也從無住本立一切法所以易即為一切事理本源有太極之義焉既云太極則決非凝然一法必有動靜相對之機而兩儀生焉既曰兩儀則動非偏動德兼動靜靜非偏靜亦兼動靜而四象生焉既曰四象則象象各有兩儀之全體全用而八卦生焉既曰八卦則備有動靜陰陽剛柔善惡之致而吉凶定焉既有吉凶則裁成輔相之道方為有用而大業生焉易理本自如此易書所以亦然也是故世間事事物物皆法象也皆變通也乃至皆深皆遠皆賾皆隱也而法象之大者莫若天地變通之大者莫若四時縣象著明之大者莫若日月崇高之大者莫若天位之富貴備物致用利天下者莫若天德之聖人探賾索隱鉤深致遠定吉凶令人知趨避成亹亹使人進德業者莫若蓍龜之神物是故天生神物聖人即從而則之天地變化聖人即從而效之天垂象現吉凶聖人即從而擬象之河出圖洛出書聖人即法而為八卦九疇然則易之有四象所以示人動靜進退之道也易有繫辭所以昭告以人合天之學也易有吉凶定判所以明斷合理之當為而悖理之不可為也故大有上九之辭曰自天祐之吉無不利吾深知其故也夫天無私情所助者不過順理而已人亦無私好所助者不過信自心本具之易理而已誠能真操實履信自心本具之易理思順乎上天所助則便真能崇尚聖賢之書矣安得不為天所祐而吉無不利哉子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之蘊耶乾坤成列而易立乎其中矣乾坤毀則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天地之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行上文發明易理易書及聖人作易吾人學易之旨亦既詳矣然苟非其人苟無其德則隨語生解亦何以深知易理易書之妙致乎故更設為問答而結歸其人其德行也夫書何能盡言言亦何能盡意然則聖人之意豈終不可見乎詎知聖意不盡于言而亦未嘗不寓于言聖言不盡于書而亦未嘗不備于書且如易書之中亦既立象以盡意聖意雖多而動靜二機足以該之故乾坤二象即可以盡聖人之意也又復設卦以盡情偽動靜雖只有二而其中變態或情或偽不一而足故六十四卦乃能盡萬物之情偽也又復繫辭焉以盡其言蓋舉天下事物一一言之則勞而難遍今借六十四卦而繫以辭則簡而可周也雖六十四卦已足收天下事物之大全而不知事事物物中又各互具一切事物也故變而通之每卦皆可為六十四而天下之利斯盡矣雖有三百八十四爻動靜陳設若不于中善用鼓舞使吾人隨處得見易理則亦不足以盡神而聖人又觸處指點以盡神矣雖復觸處指點然收彼三百八十四爻大綱總不出乾坤二法故乾坤即易之縕藏也夫本因易理而有乾坤既有乾坤易即立乎其中設毀此乾坤二法則易理亦不可見設不見易理本體則乾坤依何而有不幾至于息滅哉此甚言易外無乾坤乾坤之外亦無易也蓋易即吾人不思議之心體乾即照坤即寂乾即慧坤即定乾即觀坤即止若非止觀定慧不見心體若不見心體安有止觀定慧是故即形而非形者向上一著即謂之道無形而成形者向下施設即謂之器道可成器器可表道即謂之變從道垂器從器入道即謂之通自既悟道與器之一如以此化天下之民即謂之事業矣是故夫象也者不過是聖人見天下之賾而擬諸其形容象其物宜者也夫爻也者不過是聖人見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶者也是以卦可極天下之賾辭可鼓天下之動變可盡化裁之功通可極推行之妙此終非書之所能盡言亦非言之所能盡意也神而明之必存乎其人而默而成之不言而信又必存乎德行耳德行者體乾坤之道而修定慧由定慧而徹見自心之易理者也弟子顯喻募刻
