body:
  text: 北天目道人蕅益智旭著上經之三乾下坤上泰小往大來吉亨夫為下者每難于上達而為上者每難于下交今小往而達于上大來而交于下此所以為泰而吉亨也約世道則上下分定之後情得相通而天下泰寧約佛法則化道已行而法門通泰約觀心則深明六即不起上慢而修證可期又是安忍強軟二魔則魔退而道亨也強軟二魔不能為患是小往忍力成就是大來彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也約四時則如春天地之氣交而萬物咸通約世道如初治上下之情交而志同為善約體質則內陽而外陰陽剛為主約德性則內健而外順無私合理約取舍則內君子而外小人見賢思齊見惡自省故君子道長則六爻皆有君子之道小人道消則六爻皆有保泰防否之功也佛法釋者若得小往大來則性德之天與修德之地相交而萬行俱通也向上玄悟與向下操履相交而解行不分作兩橛也內具陽剛之德而外示陰柔之忍內具健行不息之力而外有隨順世間方便內合佛道之君子而外同流于九界之小人能化九界俱成佛界故君子道長而小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民佛法釋者天地之道即性具定慧天地之宜即定慧有適用之宜財成輔相即以修裨性也左右民者不被強軟二魔所壞則能用此二魔為侍者也初九拔茅茹以其彙征吉象曰拔茅征吉志在外也陽剛之德當泰之初豈應終其身于下位哉連彼同類以進志不在于身家故可保天下之終泰矣九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也剛中而應六五此得時行道之賢臣也故宜休休有容荒而無用者包之有才能馮河者用之遐者亦不遺之勿但以二陽為朋乃得尚合六五中正之道而光大耳九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也世固未有久泰而不否者顧所以持之者何如耳九三剛正故能艱貞而有福挽迴此天地之際六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也柔正之德處泰已過中之時雖無致治真實才力而賴有同志以防禍亂則不約而相信故猶可保持此泰也俞玉吾曰泰之時三陰陽皆應上下交而志同不獨二五也乾之初爻即拔茅連茹以上交四為坤之初爻亦翩然連類而下交三交乎上既勿恤其孚故四交于下亦不戒以孚上下一心陰陽調和此大道為公之盛所以為泰季彭己曰失實言三陰從陽而不為主也陽實則能為主陰虛則但順承乎陽而已不有其富之義也中心願者言其出于本心也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也柔中居尊下應九二虛心用賢而不以君道自專如帝乙歸妹盡其婦道而順乎夫子夫如是則賢人樂為之用而泰可永保矣上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰極必否時勢固然陰柔又無撥亂之才故誡以勿復用師上既失權下必擅命故有自邑告命者邑非出命之所而今妄自出命亦可羞矣然上六秖是無才而以陰居陰仍得其正非是全無德也但遇此時勢故命亂而出自邑人耳約佛法釋六爻者夫欲安忍強軟二魔須藉定慧之力初九剛正故內魔既降外魔亦伏似拔茅而連彙九二剛中故外魔既化內魔不起尚中行而光大九三過剛故須艱貞方得無咎以其本是正慧必能取定故為天地相際六四正定孚于正慧故雖不富而能以鄰知魔無實則魔反為吾侍而如鄰六五定有其慧故能即魔界為佛界具足福慧二種莊嚴如帝乙歸妹而有祉元吉上六守其劣定故魔發而成亂坤下乾上否之匪人不利君子貞大往小來約世道則承平日久君民逸德而氣運衰頹約佛法則化道流行出家者多而有漏法起約觀心則安忍二魔之後得相似證每每起于似道法愛而不前進若起法愛則非出世正忍正智法門故為匪人而不利君子貞以其背大乘道退墮權小境界故也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也佛法釋者若起似道法愛則修德不合性德之天而萬行俱不通也向上不與向下合一而不能從寂光垂三土之邦國也內證陰柔順忍而置陽剛佛性于分外內同二乘之小人而置佛果君子于分外自不成佛不能化他成佛故小人道長君子道消也強軟二魔人每畏懼故泰傳極慶快之辭以安慰之令無退怯順道法愛人每貪戀故否傳極嗟歎之辭以警策之令無取著象曰天地不交否君子以儉德辟難不可榮以祿佛法釋者觀此順道法愛猶如險坑之難而不取其味是謂不可榮以祿也初六拔茅茹以其彙貞吉亨象曰拔茅貞吉志在君也六爻皆有救否之任皆論救否之方不可以下三爻為匪人也初六柔順而居陽位且有同志可以相濟故拔茅連彙而吉亨但時當否初尤宜思患豫防故誡以貞也六二包承小人吉大人否亨象曰大人否亨不亂群也柔順中正上應九五陽剛中正之君惟以仁慈培植人心挽迴天運故小人得其包承而吉然在六二大人分中見天下之未平心猶否塞不安不安乃可以致亨而非小人所能亂矣六三包羞象曰包羞位不當也以陰居陽在下之上內剛外柔苟可以救否者無不為之豈顧小名小節諺云包羞忍恥是男兒時位使然何損于坤順之德哉易因曰此正處否之法所謂唾面自乾褫裘縱博者也九四有命無咎疇離祉象曰有命無咎志行也剛而不正以居上位宜有咎也但當否極泰來之時又得疇類共離于祉故救否之志得行離者附麗也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也陽剛中正居于君位下應柔順中正之臣故可以休否而吉然患每伏于未然亂每生于所忽故必念念安不忘危存不忘亡治不忘亂如繫物于苞桑之上使其堅不可拔此非大人其孰能之上九傾否先否後喜象曰否終則傾何可長也剛不中正居卦之外先有否也但否終則傾決無長否之理故得後有喜耳佛法釋者順道法愛非陽剛智德不能拔之初六法愛未深而居陽位若能從此一拔則一切俱拔故勉以貞則吉亨勸其志在于君君即指法身實證也六二法愛漸深故小人則吉大人正宜于此作否塞想乃得進道而亨六三法愛最深又具小慧妄認似道為真故名包羞九四剛而不正雖暫起法愛終能自拔而志行九五剛健中正故直入正位而吉然尚有四十一品無明未斷所以位位皆不肯住名其亡其亡從此心心流入薩婆若海證念不退名繫于苞桑上九陽居陰位始亦未免法愛後則智慧力強故能傾之離下乾上同人于野亨利涉大川利君子貞約世道則傾否必與人同心協力約佛法則因犯結制之後同法者同受持約觀心則既離順道法愛初入同生性上合諸佛慈力下同眾生悲仰故曰同人蘇眉山曰野者無求之地立于無求之地則凡從我者皆誠同也彼非誠同而能從我于野哉同人而不得其誠同可謂同人乎故天與火同人物之能同于天者蓋寡矣天非同于物非求不同于物也立乎上而能同者自至焉其不能者不至也至者非我援之不至者非我拒之不拒不援是以得其誠同而可以涉川也苟不得其誠同與之居安則合與之涉川則潰矣觀心釋者野是三界之外又寂光無障礙境也既出生死宜還涉生死大川以度眾生惟以佛知佛見示悟眾生名為利君子貞彖曰同人柔得位得中而應乎乾曰同人蘇眉山曰此專言二同人曰同人于野亨蘇眉山曰此言五也故別之利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志觀心釋者本在凡夫未證法身名之為柔今得入正位得證中道遂與諸佛法身乾健之體相應故曰同人此直以同證佛性為同人也既證佛體必行佛德以度眾生名為乾行文明以健中正而應如日月麗天清水則影自印現乃君子之正也惟君子已斷無明得法身中道應本具二十五王三昧故能通天下之志而下合一切眾生與諸眾生同悲仰耳象曰天與火同人君子以類族辨物不有其異安顯其同使異者不失其為異則同乃得安于大同矣佛法釋者如天之與火同而不同不同而同十法界各有其族各為一物而惟是一心一心具足十界十界互具便有百界千如之異而百界千如究竟元只一心此同而不同不同而同之極致也初九同人于門無咎象曰出門同人又誰咎也同人之道宜公而不宜私初九剛正上無繫應出門則可以至于野矣故無咎六二同人于宗吝象曰同人于宗吝道也六二得位得中以應乎乾卦之所以為同人者也然以陰柔不能遠達恐其近暱于初九九三之宗則吝矣九三伏戎于莽升其高陵三歲不興象曰伏戎于莽敵剛也三歲不興安行也夫二應于五非九三所得強同也三乃妄冀其同故伏戎以邀之升高陵以伺之然九五陽剛中正名義俱順豈九三非理之剛所能敵哉其即指三高陵指五五遠于三如高陵也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也離象為墉四亦妄冀同于六二故欲乘九三之墉以下攻之但以義揆知必取困故能反則而弗攻耳九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也六二陰柔中正為離之主應于九五此所謂不同而同乃其誠同者也誠同而為三四所隔能弗號咷而用大師相克哉中故與二相契而不疑其跡直故號咷用師而不以為諱鄭孩如曰大師之克非克三四也克吾心之三四也私意一起于中君子隔九閽矣甚矣克己之難也非用大師其將能乎楊誠齋曰師莫大于君心而兵革為小上九同人于郊無悔象曰同人于郊志未得也蘇眉山曰無所苟同故無悔莫與共立故志未得觀心釋者六爻皆重明欲證同人之功夫也夫欲證入同人法性須藉定慧之力又復不可以有心求不可以無心得所謂時節若到其理自彰此修心者勿忘勿助之要訣也初九正慧現前不勞功力便能出生死門六二雖有正定慧力太微未免被禪所牽不出三界舊宗九三偏用其慧雖云得正而居離之上毫無定水所資故如升于高陵而為頂墮菩薩三歲不興九四定慧均調始雖有期必之心後乃知期必之不能合道卒以無心契入而吉九五剛健中正而定力不足雖見佛性而不了了所以先須具修眾行積集菩提資糧藉萬善之力而後開發正道蓋是直緣中道佛性以為迥出二諦之外所以先號咷而後笑也上九定慧雖復平等而居乾體之上僅取涅槃空證不能入廛垂手故志未得乾下離上大有元亨約世道則同心傾否之後富有四海約佛法則結戒說戒之後化道大行約觀心則證入同體法性之後功德智慧以自莊嚴皆元亨之道也彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨佛法釋者從凡夫地直入佛果尊位證于統一切法之中道而十界皆應順之名為大有剛健文明聖行梵行皆已成也應乎天而時行證一心中五行以天行為體而起嬰兒行病行之用也象曰火在天上大有君子以遏惡揚善順天休命佛法釋者修惡須斷盡修善須滿足方是隨順法性第一義天之休命也休命者十界皆是性具性造但九界為咎佛界為休九界為逆佛界為順初九無交害匪咎艱則無咎象曰大有初九無交害也夫有大者患其多交而致害也艱則終亦如初矣九二大車以載有攸往無咎象曰大車以載積中不敗也大車謂六五虛而能容也雖有能容之聖君然非九二積中之賢臣以應之何能無敗九三公用亨于天子小人弗克象曰公用亨于天子小人害也剛正而居大臣之位可通于聖君矣豈小人所能哉九四匪其彭無咎象曰匪其彭無咎明辯晰也彭盛也壯也九四剛而不過又居離體明辯晰而匪彭可以事聖君矣六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也柔中居尊專信九二而天下信之不怒而民威于鈇鉞不俟安排造作以為威也蘇眉山曰以其無備知其有餘也夫備生于不足不足之形現于外則威削上九自天祐之吉無不利象曰大有上吉自天祐也蘇眉山曰曰祐曰吉曰無不利其為福也多矣而終不言其所以致福之由豈真無說也哉蓋其所以致福者遠矣孔子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利信也順也尚賢也此三者皆六五之德也易而無備六五之順也厥孚交如六五之信也群陽歸之六五之尚賢也上九特履之爾我之能履者能順且信又以尚賢則天人之助將安歸哉故曰聖人無功神人無名約佛法釋六爻又有二義一約果後垂化二約秉教進修一約果後垂化者初九垂形四惡趣中而不染四趣煩惱但是大悲與民同患故無交害而恒艱九二垂形人道能以大乘廣度一切故有攸往而不敗九三現行天道不染諸天欲樂及與禪定故非小人所能設小人而入天趣未有不被欲樂禪定所害者也九四現二乘相故匪其彭不與二乘同取涅槃偏證故明辯晰言有大乘智慧辯才也六五現菩薩相應攝受者而攝受之故厥孚交如應折伏者而折伏之故威如吉信以發志是接引善根眾生易而無備是折伏惡機眾生也上九現如來形故自天祐之吉無不利所謂依第一義天亦現為天人師也二約秉教進修者初九秉增上戒學故不與煩惱相交九二秉增上心學故于禪中具一切法而不敗九三秉增上慧學故能亨于天子然此慧學坐斷凡聖情解掃空蕩有每為惡取空者之所藉口所以毫釐有差天地懸隔小人弗克用之用則反為大害九四秉通教法但是大乘初門故匪其彭雖與二乘同觀無生而不與二乘同證故明辯晰六五秉別教法仰信中道故厥孚交如別修緣了故威如而吉上九秉圓教法全性起修全修在性故自天祐之吉無不利艮下坤上謙亨君子有終約世道則地平天成不自滿假約佛化則法道大行之後仍等視眾生先意問訊不輕一切約觀心則圓滿菩提歸無所得凡此皆亨道也君子以此而終如其始可謂果徹因源矣彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也儒則文王視民如傷堯舜其猶病諸佛則十種不可盡我願不可盡眾生度盡方證菩提地獄未空不取滅度所以世出世法從來無有盈滿之日苟有盈滿之心則天虧之地變之鬼神害之人惡之矣以此謙德現形十界則示居佛位之尊固有光縱示居地獄之卑亦無人能踰勝之也吳幼清曰謙者尊崇他人以居己上而己亦光顯卑抑自己以居人下而人亦不可踰越之此君子之所以有終也象曰地中有山謙君子以裒多益寡稱物平施山過乎高故多者裒之地過乎卑故寡者益之趣得其平皆所以為謙也佛法釋者裒佛果無邊功德之山以益眾生之地了知大地眾生皆具佛果功德山王稱物機宜而平等施以佛樂不令一人獨得滅度初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也蘇眉山曰此最處下是謙之過也是道也無所用之用于涉川而已有大難不深自屈折則不足以致其用牧者養之以待用云爾六二鳴謙貞吉象曰鳴謙貞吉中心得也蘇眉山曰謙之所以為謙者三也其謙也以勞故聞其風被其澤者莫不相從于謙六二其鄰也上六其配也故皆和之而鳴于謙而六二又以陰處內卦之中雖微九三其有不謙乎故曰鳴謙貞吉鳴以言其和于三貞以見其出于性也九三勞謙君子有終吉象曰勞謙君子萬民服也蘇眉山曰勞功也艮之制在三而三親以艮下坤其謙至矣勞而不伐有功而不德是得謙之全者也故彖曰君子有終而三亦云六四無不利撝謙象曰無不利撝謙不違則也雖居九三勞謙之上而柔順得正故無不利而為撝謙夫以謙撝謙此真不違其則者也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也蘇眉山曰直者曲之矯也謙者驕之反也皆非德之至也故兩直不相容兩謙不相使九三以勞謙而上下皆謙以應之內則鳴謙外則撝謙其甚者則謙謙相追于無窮相益不已則所謂裒多益寡稱物平施者將使誰為之若夫六五則不然以為謙乎則所據者剛也以為驕乎則所處者中也惟不可得而謂之謙不可得而謂之驕故五謙莫不為之使也求其所以能使此五謙者而無所有故曰不富以其鄰至于侵伐而不害為謙故曰利用侵伐莫不為之用者故曰無不利蕅益曰征不服正是裒多名謙上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也蘇眉山曰鳴謙一也六二自得于心而上六志未得者以其所居非安于謙者也特以其配之勞謙而強應焉貌謙而實不至則所服者寡矣故雖有邑國而猶叛之夫實雖不足而名在于謙則叛者不利叛者不利則征者利矣佛法釋此六爻者亦約二義一約佛果八相二約內外四眾一約佛果八相者初六即示現降神入胎及初生相久證無生復示更生故為卑以自牧六二即示現出家久度生死自言為生死故出家是為鳴謙九三即示現降魔成道久超魔界證大菩提而為眾生現此勞事使觀者心服六四即示現三七思惟久已鑒機而不違設化儀則六五即示現轉大法輪本無實法皆是善巧權現故為不富能令十方諸佛同為證明故為以鄰破眾生三惑令歸順于性具三德故為利用侵伐上六即示現滅度以眾生機盡應火云亡為志未得即以滅度而作佛事令諸眾生未種善根者得種已種者熟已熟者脫為征邑國也二約內外四眾者初六是沙彌小眾故為卑以自牧六二是守法比丘眾故為鳴謙貞吉九三是弘法比丘宰任玄綱故為勞謙君子六四是外護人中優婆塞等故恒謙讓一切出家大小乘眾而為撝謙乃不違則六五是護法欲界諸天故能摧邪以顯正而征不服上六是色無色天雖亦護正摧邪而禪定中無瞋恚相不能作大折伏法門故志未得坤下震上豫利建侯行師約世道則聖德之君以謙臨民而上下胥悅約佛化則道法流行而人天胥慶約觀心則證無相法受無相之法樂也世道既豫不可忘于文事武備故宜建侯以宣德化行師以備不虞道法既行不可失于訓導警策故宜建侯以主道化行師以防弊端自證法喜不可不行化導故宜建侯以攝受眾生行師以折伏眾生也又慧行如建侯行行如行師又生善如建侯滅惡如行師初得法喜樂者皆應為之彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉順以動雖豫之德實所以明保豫之道也夫六十四卦皆時耳時必有義義則必大何獨豫為然哉豫則易于怠忽故特言之佛法釋者惟順以動故動而恒順所謂稱性所起之修全修還在性也時義豈不大哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考佛法釋者作樂如經所謂梵唄詠歌自然敷奏也崇德以修嚴性也殷薦上帝即名本源自性為上帝祖考謂過去諸佛也初六鳴豫凶象曰初六鳴豫志窮凶也夫盛極必衰樂極必苦豫不可以不慎也故六爻多設警策之辭亦即彖中建侯行師之旨耳初六上和九四而為豫自無實德志在恃人而已能弗窮乎六二介于石不終日貞吉象曰不終日貞吉以中正也蘇眉山曰以陰居陰而處二陰之間晦之極靜之至也以晦觀明以靜觀動則凡吉凶禍福之至如長短黑白陳于吾前是以動靜如此之果也介于石果于靜也不終日果于動也是故孔子以為知機也六三盱豫悔遲有悔象曰盱豫有悔位不當也六三亦無實德上視四以為豫急改悔之可也若遲則有悔矣夫視人者豈能久哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也為豫之主故名由豫夫初與三與六皆由我而為豫矣二五各守其貞慎勿疑之不疑則吾朋益固結也六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也二五皆得中故皆不溺于豫而為貞也但二遠于四又得其正故動靜不失其宜五乘九五之剛又不得正安得不成疾乎然猶愈于中喪其守而外求豫者也上六冥豫成有渝無咎象曰冥豫在上何可長也豫至于冥時當息矣勢至于成必應變矣因其變而通之因其冥而息之庶可以免咎耳佛法釋者九四為代佛揚化之人餘皆法門弟子也初六不中不正恃大人福庇而忘修證之功故凶六二柔順中正能于介爾心中徹悟事造理具兩重三千其理決定不可變易頓悟頓觀不俟終日之久此善于修心得其真正法門者也故吉六三亦不中正但以近于嚴師故雖盱豫而稍知改悔但無決斷勇猛之心故誡以悔遲則必有悔九四為卦之主定慧和平自利利他法皆成就故朋堅信而志大行六五柔質不正反居明師良友之上可謂病入膏肓故名貞疾但以居中則一點信心猶在善根不斷故恒不死上六柔而得正處豫之終未免沉空取證但本有願力亦不畢竟入于涅槃終能迴小向大而有渝無咎死水不藏龍故曰何可長也若約位象人者初六是破戒僧六二是菩薩聖僧六三是凡夫僧九四是紹祖位人六五是生年上座上六是法性上座也震下兌上隨元亨利貞無咎約世道則上下相悅必相隨順約佛化則人天胥悅受化者多約觀心則既得法喜便能隨順諸法實相皆元亨之道也然必利于貞乃得無咎不然將為蠱矣彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉震為剛兌為柔今震反居兌下故名剛來下柔也內動外悅與時偕行故為天下隨時猶儒者所謂時習時中亦佛法中所謂時節若到其理自彰機感相合名為一時故隨時之義稱大象曰澤中有雷隨君子以嚮晦入宴息觀心釋者既合本源自性上同往古諸佛則必冥乎三德秘藏而入大涅槃也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也官者物之正主九五為六二正主則六二乃官物也而陰柔不能遠達乃變其節以隨初初宜守正不受其隨則吉蓋交六二于門內則得二而失五不如交九五于門外雖失二而有功君子以為不失也六二係小子失丈夫象曰係小子弗兼與也係初必失五安有兩全者哉所以為二誡也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也四為丈夫初為小子三近于四而遠于初然皆非正應也但從上則順係近則固故周公誡以居貞而孔子贊其志九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也六二欲往隨九五必歷四而後至四固可以獲之獲則得罪于五而凶矣惟深信隨之正道則心跡可明而無咎亦且同初九之有功也九五孚于嘉吉象曰孚于嘉吉位正中也六二陰柔中正五之嘉偶也近于初而歷于四跡甚可疑九五陽剛中正深信而不疑之得二之心亦得初與四之心而吉矣上六拘係之乃從維之王用亨于西山象曰拘係之上窮也陰柔得正居隨之極專信九五而固結不解者也故可亨于神明然窮極而不足以有為矣佛法釋者三陽皆為物所隨故明隨機之義三陰皆隨順乎陽故明隨師之道初九剛正居下始似不欲利生者故必有渝乃吉出門乃為有功九四剛而不正又居上位雖膺弘法之任有似夾帶名利之心故有獲而貞凶惟須篤信出世正道則心事終可明白九五剛健中正自利利他故孚于嘉而吉六二柔順中正而無慧力未免棄大取小六三不中不正而有慧力則能棄小從大然雖云棄小從大豈可藐視小簡而不居貞哉上六陰柔得正亦無慧力專修禪悅以自娛乃必窮之道也惟以此篤信之力回向西方則萬修萬人去耳巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱者器久不用而蟲生人久宴溺而疾生天下久安無為而弊生之謂也約世道則君臣悅隨而無違弼吁咈之風故成弊約佛法則天人胥悅舉世隨化必有邪因出家者貪圖利養混入緇林故成弊約觀心究竟隨者則示現病行而為蠱約觀心初得小隨順者既未斷惑或起順道法愛或于禪中發起夙習而為蠱然治既為亂階亂亦可以致治故有元亨之理但非發大勇猛如涉大川決不足以救弊而起衰也故須先甲三日以自新後甲三日以丁寧方可挽回積弊而終保其善圖耳彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也艮剛在上止于上而無下濟之光巽柔在下安于下而無上行之德上下互相偷安惟以目前無事為快曾不知遠憂之漸釀也惟知此積弊之漸則能設拯救之方而天下可治然豈當袖手無為而聽其治哉必須往有事如涉大川又必體天行之有終有始然後可耳世法佛法垂化觀心無不皆然象曰山下有風蠱君子以振民育德振民如風育德如山非育德不足以振民非振民不足以育德上求下化悲智雙運之謂也初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也蠱非一日之故必歷世而後見故諸爻皆以父子言之初六居蠱之始壞猶未深如有賢子則考可免咎也然必惕厲乃得終吉而幹蠱之道但可以意承考不可承考之事九二幹母之蠱不可貞象曰幹母之蠱得中道也蘇眉山曰陰性安無事而惡有為故母之蠱幹之尤難正之則傷愛不正則傷義非九二不能任也二以陽居陰有剛之實而無剛之跡可以免矣九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也蘇眉山曰九三之德與二無異特不知所以用之二用之以陰而三用之以陽故小有悔而無大咎六四裕父之蠱往見吝象曰裕父之蠱往未得也陰柔無德故能益父之蠱裕益也六五幹父之蠱用譽象曰幹父用譽承以德也柔中得位善于幹蠱此以中興之德而承先緒者也上九不事王侯高尚其事象曰不事王侯志可則也下五爻皆在事內如同室有鬥故以父子明之上爻獨在事外如鄉鄰有鬥故以王侯言之尚志即是士之實事可則即是廉頑起懦高節即所以挽回斯世之蠱者也統論六爻約世道則初如賢士二如文臣三如賢將四如便嬖近臣五如賢王六如夷齊之類約佛化則下三爻如外護上三爻如內護初六柔居下位竭檀施之力以承順三寶者也九二剛中以慈心法門屏翰正法者也九三過剛兼威折之用護持佛教者也六四柔正但能自守不能訓導于人六五柔中善能化導一切上九行頭陀遠離行似無意于化人然佛法全賴此人以作榜樣故志可則也約觀心則初六本是定勝為父之蠱但居陽位則仍有慧子而無咎然必精厲一番方使慧與定等而終吉九二本是慧勝為母之蠱但居陰位則仍有定然所以取定者為欲助慧而已豈可終守此定哉九三過剛不中慧反成蠱故小有悔然出世救弊之要終藉慧力故無大咎六四過于柔弱不能發慧以此而往未免隨味禪生上慢所以可羞六五柔而得中定有其慧必能見道上九慧有其定頓入無功用道故為不事王侯而高尚其事之象所謂佛祖位中留不住者故志可則兌下坤上臨元亨利貞至于八月有凶約世道則幹蠱之後可以臨民約佛法則弊端既革化道復行約觀心則去其禪病進斷諸惑故元亨也世法佛法觀心之法始終須利于貞若乘勢而不知返直至八月則盛極必衰決有凶矣八月為遯與臨相反謂不宜任其至于相反而不早為防閑也彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也剛浸而長故名為臨說而順剛中而應故為大亨以正與乾之元亨利貞同道此乃性德之本然也若一任其至于八月而不早為防閑則必有凶以有長有消乃自然之勢惟以修合性者乃能御天道而不被天道所消長耳象曰澤上有地臨君子以教思無窮容保民無疆澤謂四大海也地以載物海以載地此無窮之容保也佛法釋者教思無窮猶如澤故為三界大師容保無疆猶如地故為四生慈父初九咸臨貞吉象曰咸臨貞吉志行正也約世道則幹蠱貴剛勇臨民貴仁柔約佛法則除弊宜威折化導宜慈攝約觀心則去惡宜用慧力入理宜用定力初九剛浸而長故為咸臨恐其任剛過進故誡以貞則吉九二咸臨吉無不利象曰咸臨吉無不利未順命也二亦居陽剛浸長之勢然此時尚宜靜守不宜乘勢取進故必吉乃無不利若非吉便有不利矣蓋乘勢取進則未順于大亨以正之天命故也六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也柔而志剛味著取進以臨為甘而不知其無所利也然既有柔德又有慧性必能反觀憂改則無咎矣六四至臨無咎象曰至臨無咎位當也佛法釋者以正定而應初九之正慧故為至臨六五知臨大君之宜吉象曰大君之宜行中之謂也佛法釋者有慧之定而應九二有定之慧此所謂王三昧也中道統一切法名為大君之宜上六敦臨吉無咎象曰敦臨之吉志在內也柔順得正居臨之終如聖靈在天默祐子孫臣民者矣佛法釋者妙定既深自發真慧了知心外無法不于心外別求一法故為志在內而吉無咎坤下巽上觀盥而不薦有孚顒若約世道則以德臨民為民之所瞻仰約佛法則正化利物舉世之所歸憑約觀心則進修斷惑必假妙觀也但使吾之精神意志常如盥而不薦之時則世法佛法自利利他皆有孚而顒然可尊仰矣彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣陽剛在上示天下以中正之德順而不逆巽而不忤故如祭之盥手未薦物時孚誠積于中而形于外不言而人自喻之也聖而不可知之之謂神天何言哉四時行焉不可測知故名神道聖人設為綱常禮樂之教民皆由之而莫知其所以然獨非神道乎哉神者誠也誠者孚也孚者人之心也人心本順本巽本中本正以心印心所以不假薦物而自服矣佛法釋大觀者絕待妙觀也在上者高超九界也順者不與性相違也巽者遍于九界一切諸法也中者不墮生死涅槃二邊也正者雙照二諦無減缺也以觀天下者十界所朝宗也世法則臣民為下佛法則九界為下觀心則一切助道法門等為下天之神道即是性德性德具有常樂我淨四德而不忒以神道設教即為稱性圓教故十界同歸服也象曰風行地上觀先王以省方觀民設教佛法釋者古佛省四土之方觀十界之民設八教之網以羅之如風行地上無不周遍也初六童觀小人無咎君子吝象曰初六童觀小人道也陰柔居下不能遠觀故如童幼之無知也小人如童幼則不為惡君子如童幼則無以治國平天下矣六二闚觀利女貞象曰闚觀女貞亦可醜也柔順中正以應九五女之正位乎內從內而觀者也士則醜矣六三觀我生進退象曰觀我生進退未失道也進以行道退以修道能觀我生則進退咸不失道六四觀國之光利用賓于王象曰觀國之光尚賓也柔而得正密邇聖君無忝賓師之任矣九五觀我生君子無咎象曰觀我生觀民也修己以敬萬方有罪罪在朕躬此君子之道也上九觀其生君子無咎象曰觀其生志未平也處師保之位天下誰不觀之非君子能無咎乎既處天下人所觀則其為觀于天下之心亦自不能稍懈故志未平約佛法釋六爻者初是外道為童觀有邪慧故二是凡夫為闚觀耽味禪故三是藏教之機進為事度退為二乘四是通教大乘初門可以接入別圓故利用賓于王五是圓教之機故觀我即是觀民所謂心佛眾生三無差別上是別教之機以中道出二諦外真如高居果頭不達平等法性故志未平又約觀心釋六爻者初是理即如童無所知二是名字即如女無實慧三是觀行即但觀自心四是相似即鄰于真位五是分證即自利利他六是究竟即不取涅槃遍觀法界眾生示現病行及嬰兒行弟子寂元募刻
