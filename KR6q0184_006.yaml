body:
  text: 北天目道人蕅益智旭著下經之二乾下兌上夬揚于王庭孚號有厲告自邑不利即戎利有攸往約世道則民說無疆坐享豐樂而所行必決約佛法則損己利他化功歸己決當進斷餘惑證極果也夫世間豈容有陽而無陰有男而無女有君子而無小人然陰居陽上女占男先小人據于君子之上則必將共決去之必將至王庭以揚之必將相約相信而聲明其罪以號之凡此皆有厲之道也吾謂宜反身修德而告自邑不宜以力爭而即戎但使以德往化則無不利矣佛法釋者體惑法界即惑成智名告自邑敵對相除名為即戎彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也健而說決而和正明應以德化不應以力爭也知危則光尚力則窮利有攸往則以德化小人小人皆為君子而剛長乃終也象曰澤上於天夬君子以施祿及下居德則忌祿宜施德宜居祿不施則恩枯德不居則本喪又以此施祿則及下而可以化人以此居德則自滿而為人所忌初九壯于前趾往不勝為咎象曰不勝而往咎也重剛不中不宜進而壯于進步徒自折耳何能勝哉九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也剛而得中知懼知警居德既周則有戎可無患矣九三壯于頄有凶君子夬夬獨行遇雨若濡有慍無咎象曰君子夬夬終無咎也過剛不中怒且悻悻然現于其面太剛必折有凶道也君子于此何不自夬其夬舍上下四陽而獨行其與上六應之正理則以德相化陰陽相和庶遇雨而若濡雖彼群陽不知我心不諒我跡或有慍者然化小人之道必應如此終無咎也言夬夬者群陽以決去小人為夬今吾以決不同彼群陽為夬夬也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九四以下爻為臀下爻純剛無柔如有骨無膚臀既無膚行必次且不前若讓彼羊在前而隨其後則羊仍屬我所牽便可悔亡但以剛不中正聞此善言決不相信也羊指上六為兌之主四宜牽之不宜決之亦不宜與之爭前後也九五莧陸夬夬中行無咎象曰中行無咎中未光也上六柔脆如莧而在五剛之上如莧在陸人人得踐踏之嗟嗟彼獨非坤德乎彼獨非太極全體所成還具太極全體者乎是宜夬彼群陽所夬而護養之乃為中行之道可無咎耳然在夬時終不免以君子小人二其心未肯忘于大同故曰中未光也聖人于復則諄諄以保護微陽于夬則諄諄以保護殘陰陰陽豈可偏廢哉上六無號終有凶象曰無號之凶終不可長也下之五爻聖人所以勸誡群陽者至矣以六居上雖得其正而陰柔才弱不能惕號以自周備故終不可長不若反乎下以為姤耳巽下乾上姤女壯勿用取女約世道則決之于意中者必將遇之于意外約佛法則決斷餘惑而上同諸佛者必巧用性惡而下遇衆生又約究竟則夬是無間道姤是解脫道約初心則夬是乾慧姤是理水也以無號之一陰忽反于下而得其所安勢必漸壯故九二宜包而有之不宜使賓取之佛法釋者在佛為性惡法門在衆生不了則為修惡九二行菩薩道自可示同修惡不令餘人作惡又解脫道一得永得名女壯無所取著名勿用取女理水亦爾彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉不曰剛遇柔而曰柔遇剛者柔為政也佛法釋者剛是性德柔是修德以修顯性名柔遇剛剛是妙觀柔是妙止從止起觀名柔遇剛剛是智慧柔是禪定因定發慧名柔遇剛修本無加于性止亦不可偏勝定亦不可偏多故曰不可與長也天地相遇天得地之初爻而為巽撓萬物者莫疾乎風齊乎巽而萬物潔齊故曰品物咸章也九二之剛下遇初六上遇九五之中正在世法中則為大臣得君以撫民在佛法中則為智慧稱性以成福故曰天下大行也象曰天下有風姤后以施命誥四方剝乎上者反乎下名之曰復性德也觀慧也不可即致用也故如雷在地中而后不省方夬乎上者反乎下名之曰姤修德也止定也即可以取效也故如天下有風而后施誥命復以見天地之心姤以見時義之大復即乾知大始姤即坤作成物復即金聲姤即玉振復即智巧姤即聖力而腐儒以抑陰戒小人釋之不亦陋乎初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也無君子莫治野人無野人莫養君子此世法之必應互相繫屬者也無性不能起修無修不能顯性非智不禪非禪不智此佛法之必應互相繫屬者也一陰始生于下得九二金柅以繫之此貞吉之道也不繫則有攸往往則見凶如羸豕必能蹢躅由不早為調御故耳柔道宜與剛德相牽則互相與有成矣九二包有魚無咎不利賓象曰包有魚義不及賓也修顯性則性有修定發慧則慧有定性修交成定慧平等無咎之道也但可內自證知豈可舉似他人世法亦爾吾民吾子豈可令他人分治哉九三臀無膚其行次且厲無大咎象曰其行次且行未牽也二近于初故包有魚三遠于初故臀無膚無膚則行必次且矣然雖厲而無大咎者以與初六同居巽體但行未與柔道相牽合耳九四包無魚起凶象曰無魚之凶遠民也剛不中正執性而廢修恃慧而棄定猶世宰輔居上而遠民也方其高談理性正逞狂慧不知其為凶臨命終時地獄相現則悔無所及猶包中無魚起水而後知之九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也枸杞枝軟而長以此包瓜則其蔓交繫而不可解此九二與初六相遇之象也九五為姤之主乃高居于上遠不相及但以剛健中正則性德久熏成種將欲發煥故名含章由其志不舍命不肯自暴自棄故初六雖不相遇必有自天隕墜以遇我者矣發得本有名為自天無心契合名為有隕又九二如大臣能有初六之民與民固結九五如聖君能用九二之賢臣故名含章既有九二則并九二所遇初六之民而有之矣民與之即天與之故云有隕自天上九姤其角吝無咎象曰姤其角上窮吝也居姤之終不與柔遇名姤其角此如二乘偏真空慧但免無魚之凶不無焦芽敗種之吝也坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往相遇則相聚世出世之常也聚安有不亨者哉幽明之情萃故有廟可假上下之情萃故大人可見用大牲以假有廟利攸往以見大人皆順乎時義之所當然所謂貞也彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣同一致孝享耳有時云二簋可用有時云樽酒簋二今則云用大牲吉同一見大人耳有時云不利涉川有時云往蹇來碩今則云利有攸往夫豈有私意于其間哉宜儉則儉宜豐則豐可往則往可來則來皆所以順天命而觀物情耳象曰澤上于地萃君子以除戎器戒不虞楊慈湖曰澤所以能瀦水而高上于地者以有坊也民所以得安居而聚者不可無武備也除治戎器戒備不虞皆大易之道也蕅益子曰約佛法則毗尼內禁約觀心則密咒治習初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也當萃之時未有不志于萃者也二陽為受萃之主而四陰萃之初與四為正應本可信也不中不正故不能終其信而乃亂乃萃焉乃亂故若號乃萃故一握為笑言其號笑夾雜而為一握也然既是正應何所疑恤不若往從為無咎耳志亂故號笑夾雜明相應之理未嘗亂也六二引吉無咎孚乃利用禴象曰引吉無咎中未變也柔順中正上應九五陽剛中正之君本無可疑者也乃初六與六三皆往萃于九四我居二者之間設不自引而出何以取信于九五乎苟引出而得其信則不必用大牲而用禴亦利矣舍二陰而獨從所應故如用禴其物甚薄但由二有中德故不變所守以隨兩陰耳六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也上無應與志欲萃而無從故嗟如而無所利然當萃之時往從九四亦可無咎但非正應故得小吝而九四則巽以受之矣九四大吉無咎象曰大吉無咎位不當也當萃之時初六應之六三歸之不幾以臣擬君乎故必大吉乃得無咎如伊尹周公之終盡臣道可也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也陽剛中正以天位而受萃者也然惟二實應之上實附之而初與三已萃于九四矣僅可無咎若能忘吾位以任九四聽彼二陰之匪孚我而元萃于四者永貞弗改則九四既為吾臣二陰何一非吾民也故得悔亡設但恃其位以為萃則志未光矣上六齎咨涕洟無咎象曰齎咨涕洟未安上也以陰居陰而在上位心不自安故齎咨涕洟以附悅于九五得無咎也巽下坤上升元亨用見大人勿恤南征吉氣聚而上升如木之升于地元亨可知也巽順非果于有為者故勸以用見大人勿恤萬物齊乎巽而相見乎離故南征則吉欲其嚮明以行志也彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也巽木本柔故必以時而升木之升固必藉土土亦以生木為功今九二剛中而應六五蓋不惟木之志亦是土之志也象曰地中生木升君子以順德積小以高大道體本無大小而君子之積德也順而致之必由小以高大譬如合抱之木始于微芒但不可戕伐亦不可助長耳初六允升大吉象曰允升大吉上合志也為巽之主上與二陽合志故信能升而大吉也九二孚乃利用禴無咎象曰九二之孚有喜也升九二之求孚于六五以各不得其正非如萃六二之孚于九五也但萃之六二以兩鄰同質而不同志故中雖未變而須引吉今升之九二以兩鄰異質而志相合故不惟無咎而且有喜九三升虛邑象曰升虛邑無所疑也以堅剛之木上升于柔順之土何疑阻哉六四王用亨于岐山吉無咎象曰王用亨于岐山順事也巽之升也為木坤之升也為山而人之升也為亨于天地山川鬼神其事不同其所以為順一也方木之升于地人但以為木剋土耳不知木升即是地升以離地四微別無木四微故如太王之去豳而邑于岐人但以為王棄豳耳不知邑岐即是邑豳以非捨豳人而別撫岐人故六五貞吉升階象曰貞吉升階大得志也朝有君子則聖王之志得猶地有喬木則成園苑故地未有不以升木為志者也九二剛中而五應之此明與以可升之道猶聖王之設階以升君子但恐其以陰居陽不能鑒九二之孚故特以貞誡之欲其貞于九二也上六冥升利于不息之貞象曰冥升在上消不富也升至于冥可以息矣而有不息之貞則宜冥而益升此所謂天爵也修其天爵則匹夫不為貧賤而不富可消矣坎下兌上困亨貞大人吉無咎有言不信升而不已必困此盈虛消息之常也困心衡慮實所以致亨然不以正道持之不以大人處之何能吉無咎哉設無躬行實德而但有空言決不足以取信矣彖曰困剛掩也險以說困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也坎剛在下而為兌柔所掩剛既被掩水漏澤枯困之象也處險而說素患難行乎患難遁世無悶不改其樂非君子其孰能之九二九五皆以剛而得中此大人之貞吉之道也苟不守此貞而徒尚口適足以取窮而已矣象曰澤無水困君子以致命遂志水在澤下澤中無水枯槁窮困此已定之命也君子致之而已豈容作意而不順受剛中故處險能說此在我之志也君子則必遂之豈因顛沛而或稍違初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也六爻皆處困者也惟剛中大人能不失其所亨初六居下臀之象也上應九四之株木正當困時不能相庇而陰居險初則如入于幽谷三歲不能相見矣九二困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也當困之時能以剛中自養故名困于酒食九五陽剛中正之君必將以朱紱錫我使我同濟時困我但當默然以誠應之如亨祀然若遽往則必有凶而志在救時仍無咎也中有慶即是貞大人吉此如伊尹就湯紱蔽膝也六三困于石據于蒺藜入于其宮不見其妻凶象曰據于蒺藜乘剛也入于其宮不見其妻不祥也陰柔不中不正居于二陽之間四如石二如蒺藜上六不與相應故入其宮而不見其妻由無禎祥之德所以自取其凶九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也夫處困而亨非剛中者不能也九四正在困時猶不能忘情于初六而來徐徐既志在初六豈惟不與九二合德反困于九二之金車而吝矣然九二剛中必能與我同濟時困不因我不當位而遂棄我故可有終九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也九五陽剛中正居于尊位視天下如一身者也上六困于葛藟如劓我之鼻初六困于株木如刖我之足我方賴九二同行濟困猶如赤紱而彼方困于酒食則是我困于赤紱也然九二中直必徐應我而有悅我當竭誠以感之如祭祀然庶可以受福矣上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也處困之極可以動而行矣陰柔才弱疑慮未當猶牽纏而不自安懼其動而有悔而每自退悔也故聖人直以征吉決之巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶夫井者居其所而遷者也知井之居所而遷則知困之窮而通矣故次困而明井邑可改井不可改可改則有喪有得既不可改何喪何得食水者往未食者來人有往來井何往來下瓶將及于水曰汔至得水收繩未盡曰未繘井繘井則有功未繘羸其瓶則凶此皆人之得喪非井之得喪也知井無得喪則知性德六而常即知人有得喪則知修德即而常六故曰井德之地也又曰井以辨義彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也水輪含地故鑿地者無不得水喻如來藏性具一切陰界入等故觀陰界入者無不得悟藏性但貴以妙止觀力深入而顯發之藏性一顯自養養他更無窮盡也困之貞大人吉曰以剛中今改邑不改井亦曰乃以剛中困似專指修德其實發明全修在性今似專指性德其實要人全性起修故隨明未有功而羸瓶則凶其重修德甚矣象曰木上有水井君子以勞民勸相夫擔水惠人則所及者寡鑿井任汲則所潤者多擔水者有作善鑿井者無作善也君子之慰勞于民也則勸其交相為養焉故養而不窮矣初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也井之六爻三陰為井三陽為泉初居最下故象如泥不惟人不食之禽亦不顧之矣理即佛也九二井谷射鮒甕敝漏象曰井谷射鮒無與也在下之中故為井谷有泉可以射鮒而上無應與如甕既敝漏不能相汲也魚之至小者名鮒蓋指初六此是名字即佛薄有聞熏未成法器九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也以陽居陽其泉潔矣猶居下卦不為人食是可惻也上六應之故可用汲蓋王既明而用賢則賢者之福非止獨受而已此是觀行即佛圓伏五住故井泄未證理水故不食宜求諸佛加被則可自利利他也六四井甃無咎象曰井甃無咎修井也甃者以磚石包砌其傍所以禦汙而潔泉者也故曰修井此是相似即佛從思慧入修慧禦二邊之汙而潔中道之泉九五井冽寒泉食象曰寒泉之食中正也陽剛中正泉之至潔而泠然者也功及于物故得食之此是分證即佛中道理水自利利他上六井收勿幕有孚元吉象曰元吉在上大成也以陰居上如井之收收即井欄常露之而勿幕衆皆汲之而所養無窮矣此是究竟即佛功德滿足盡未來際恆潤衆生離下兌上革已日乃孚元亨利貞悔亡夫邑改而井不改者言其處也井舊則無禽而泥可弗革乎學者以變化氣質為先猶火之煆金也方其煆也金必苦之既煆成器而後信火之功也此革之道即乾坤之道大亨以正者也未信故有悔已孚則悔亡矣彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉革而信之明未革則人不信也革而當乃使人信其悔乃亡明不當則悔不亡也須如天地之革時湯武之革命方可取信于人耳革何容易象曰澤中有火革君子以治曆明時時無實法依于色心分位假立心無形像依色表見色有共相及不共相共相之在上者為日月星宿因日月星宿周行于天據其所歷之度以明春夏秋冬之時春則萬物皆春乃至冬則萬物皆冬故知時惟心現無在而無所不在猶如火性無我亦無在而無所不在雖澤中亦自有之彼大海中火光常起即其驗也初九鞏用黃牛之革象曰革用黃牛不可以有為也離為能革兌為所革而初九居下上無應與此不可以有為者也但用黃牛之革以自鞏固可耳六二己日乃革之征吉無咎象曰己日革之行有嘉也陰柔中正為離之主得革物之全能者也革必己日乃孚而上應九五是其嘉配故征吉而無咎九三征凶貞厲革言三就有孚象曰革言三就又何之矣過剛不中而應上六上六陰柔得正乃君子而如文豹者也何容更以剛燥革之征則必凶雖得其貞亦仍危厲但可自革以相順從其言至于三就庶亦可以取信也九四悔亡有孚改命吉象曰改命之吉信志也兌金之質本待煆以成器而九四無應于下則無肯成我者悔可知也但剛而不過又附近于離體之上其志可信故悔亡而有孚可以改其所秉之定命而日進于自利利他之域矣九五大人虎變未占有孚象曰大人虎變其文炳也以陽剛中正之大人又得六二陰柔中正之應以輔助之故如虎之神變炳乎有文不待占而足以取信于天下也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也豹亦生而有文者也但待時而變現耳九三剛燥小人既見其變亦革言三就以相順從然僅革面未始革心君子正不必深求也若欲令心革而往征之未免得凶惟居貞以默化之則吉巽下離上鼎元吉亨革物者莫若鼎此陶賢鑄聖烹佛煉祖之器也安得不元吉而亨哉彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨初陰為足二三四陽為腹五陰為耳上陽為鉉非鼎象乎以木巽火而亨飪非鼎用乎勿謂鼎之道小聖人亨以享上帝亦此鼎耳即大亨以養天下聖賢亦此鼎耳何必離事別求理哉且以卦德言之內則巽順外則離而耳目聰明六五以柔為離之主進而上行得中位而應九二之剛此豈非聖賢佛祖自陶自鑄自烹自煉之道其元亨也宜矣象曰木上有火鼎君子以正位凝命鼎者國之重寶君位之所寄也得其道以正其位則命可凝德不稱位則命去而鼎隨去矣約象明之德如木命如火有木則有火木盡則火亡有德以正其位則命凝德亡則命亡故曰惟命不于常也初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也初為鼎趾應四故顛然及其未烹物而顛之舊積否惡從此可出矣顛趾如得妾出否如得子母以子貴因其子而知得妾之未悖因出否而知顛趾之有功也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也二當鼎腹之下分陽剛故為有實上應黃耳金鉉之六五能護守之初雖顛趾而有疾終不害及我也然在二則宜慎所之矣九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三當鼎腹之中分其實腴美有雉膏可食矣上無應與如鼎方革耳而不可行者焉賴六五柔中之黃耳貫上九剛而不過之玉鉉方將舉二以及三如陰陽之和而得雨則可以虧悔而終吉矣懷道而不思致用故失其義猶所云不仕無義激之使及時行道也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四當鼎腹之上分其實既滿而下應初六則不勝其重足云折矣形貌能無赧汗乎始也不自知其德薄知小力小妄據尊位而謀大任重今一旦不勝其任此其所自信者為如何也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也五為鼎耳而有中德故其色黃以虛受實故為金鉉鉉即指上九也以鉉貫耳以耳舉鼎盡天下聖賢而養之豈非聖人大亨之正道乎然六五自本無實特下應九二之剛中以之為實即以此而養天下所謂為天下得人者耳上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔接也上為鼎鉉自六五觀之則如金之剛自其剛而不過之德言之則如玉之潤矣金遇猛火則鎔玉非火所能壞以此舉鼎故大吉無不利也震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯主重器者莫若長子長子未有不奮動以出者也故震則必亨然其亨也必有道以致之方其初動而來虩虩乎如蠅虎之周環顧慮仍不失其和而笑言啞啞夫惟存于己者既嚴且和以此守重器而為祭主縱遇震驚百里之大變能不喪其匕鬯矣佛法釋者一念初動即以四性四運而推簡之名為虩虩知其無性無生名為笑言啞啞煩惱業境種種魔事橫發名為震驚百里不失定慧方便名為不喪匕鬯也彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也恐懼乃能致福福不可以幸邀所謂生于憂患也啞啞亦非放逸仍不失其法則也惟其養之有素如此故雖當驚遠懼邇之變人皆退避而偏能出此凝定之神以當之可以守宗廟社稷而為祭主也為祭主即是不喪匕鬯注腳象曰洊雷震君子以恐懼修省君子不憂不懼豈俟雷洊震而後恐懼修省哉恐懼修省正指平日不睹不聞慎獨功夫平日功夫能使善長惡消猶如洊雷能使陽舒陰散也惟其恐懼修省慣于平日故雖遇洊雷亦復不憂不懼矣問曰孔子迅雷風烈必變復云何通答曰此是與天地合德變則同變亦非憂懼初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也六爻皆明恐懼修省之道而德有優劣位有當否故吉凶分焉初九剛正為震之主主器莫若長子吉可知矣六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六二乘初九之剛蓋嚴憚切磋之畏友也藉此深自惕厲以振刷我陰柔懦弱之習舉吾平日所謂中正純善多種寶貝盡喪不顧直躋于乾健高明之九陵勿更留意求逐然至于七日復其故位則中正純善之德仍在矣六三震蘇蘇震行無眚象曰震蘇蘇位不當也三遠于初初之所以警發我者蘇蘇而不切矣三當自以震行勿因遠于畏友而緩其恐懼修省之功則無眚也九四震遂泥象曰震遂泥未光也九四亦震主也以陽居陰復陷四陰之間雖似洊至遂失其威而入泥豈能如虩虩啞啞之有光哉六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也震六二者惟初九故但云來厲震六五者則初九與九四也初震既往四震復來五得藉此以自惕厲令所行日進于高明故曰危行猶所云邦有道危言危行也以六居五不過于柔又得中道故其德甚多而毫無所喪但有恐懼修省之事耳上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也初九之剛固不足以及我九四震亦遂泥聲已索索無餘威矣而陰柔弱極方且視矍矍而惶惑無措以此征往則中心無主神已先亂凶可知也然震既不及其身止及其鄰即因震鄰而恐懼修省亦可無咎但禍未至而先防乃明哲保身之道倘與婚媾商之必反以為迂而有言矣君子可弗自勉乎艮下艮上艮其背不獲其身行其庭不見其人無咎夫動與止雖是相對待法亦是相連屬法又是無實性法究竟是無二體法也不動曰止不止曰動此約相對待言也因動有止因止有動此約相連屬言也止其動則為靜止其靜則為動動其止則為動動其動則為止此約無實性言也止即是動故即寂恆感動即是止故即感恆寂此約無二體言也知動止無二體者始可與言止矣夫人之一身五官備于面而五臟司之五臟居于腹而一背繫之然玄黃朱紫陳于前則紛然情起若陳于背則渾然罔知故世人皆以背為止也然背之止也縱令五官競騖于情欲而仍自寂然逮情之動也縱復一背原無所分別而畢竟隨往故以面從背則背止而面亦隨止以背從面則面行而背亦隨行究竟面之與背元非二體不可兩判今此卦上下皆艮止而又止是艮其背者也艮背何以能無咎哉是必不獲其身行其庭不見其人斯無咎耳身本非實特以情欲錮之妄見有身今向靜時觀察其中堅者屬地潤者屬水暖者屬火動者屬風眼耳鼻舌異其用四支頭足異其名三百六十骨節八萬四千毫竅畢竟以何為身身既了不可得即使歷涉萬變又豈有人相可得哉故行其庭而亦不見其人此則止不礙行即行恆止故無咎也彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也止其行而為靜止其止而為動動靜以時無非妙止故其道光明也止非面牆之止所非處所之所特以法法本不相知法法本不相到猶此卦之上下敵應而不相與是以覓身了不可得雖行其庭而亦了無人相可見合于光明之道而無過也象曰兼山艮君子以思不出其位兩山並峙各安其位者也是故草木生之禽獸居之寶藏興焉位位無非法界故也君子于此非不思也知離此現前之位別無一法可得故思不出其位不出位而恆思則非枯槁寂滅思而不出其位則非馳逐紛紜恆思則能盡其位之用故一切旋乾轉坤事業無不從此法界流不出則能稱其位之量故一切位天育物功能無不還歸此法界初六艮其趾無咎利永貞象曰艮其趾未失正也居艮之下其位為趾止之于初不令汩于所欲往斯固未失正而無咎矣然必利于永貞時止則止時行則行乃獲敦艮之吉耳六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也趾也腓也股也皆隨心而為行止者也然趾無力不能自專又正行時趾元自止今六二其位為腓而以陰居陰當艮之時力能專止而不隨心動故曰不拯其隨此非動靜不失其時之道蓋由未肯謙退而聽命于天君故令其心不快九三艮其限列其夤厲薰心象曰艮其限危薰心也三位在限而以剛居剛為艮之主則腰臗硬直不可屈申者也夫上下本自相聯猶如夤然今分列而不相繫屬其危厲不亦薰心矣乎六四艮其身無咎象曰艮其身止諸躬也四位在于胸腹彖云艮其背而此直云艮其身身止則背不待言矣夫千愆萬繆皆由身起今陰柔得正能止諸躬何咎之有楊龜山曰爻言身象言躬者伸為身屈為躬屈伸在我不在物兼爻與象是屈伸兼用矣六五艮其輔言有序悔亡象曰艮其輔以中正也五位在心心之聲由輔以宣而以陰居陽又復得中能于言未出口前豫定其衡故言無妄發發必有序而口過終可免矣上九敦艮吉象曰敦艮之吉以厚終也為艮之主居卦之終可謂止于至善無所不用其極者矣性德本厚而修德能稱性復之故曰以厚終也震為長男故舉乾之全體大用而虩于其初艮為少男故舉乾之全體大用而敦于其上一始一終知及仁守之功備非動非靜之體復矣艮下巽上漸女歸吉利貞夫敦艮既非面牆則止而不失其行之時矣行之以巽故名曰漸君子將致身以有為必如女之歸夫始終以禮而非苟合乃得吉耳苟不利貞則躁進固足取辱雖漸進亦豈能正人哉佛法釋者理則頓悟乘悟併銷如震虩而艮敦事非頓除因次第盡如女歸而漸進又次第禪門名之為女即事禪而達實相名之為歸以圓解遍修事禪名之為貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也進有頓漸今明以漸而進故如女歸則吉也得位則往有功倘進不得位則不可往明矣以正則可正邦倘進不以正則不能正邦明矣然此卦何以為進得位則由九五剛得中耳何以為往有功則由止而巽故動不窮耳止者動之源設無止體則一動即窮如溝澮因雨暫盈可立待其涸也象曰山上有木漸君子以居賢德善俗木在山上以漸而長觀者不覺君子居德亦復如是山有喬木則山益高俗有居賢德之君子則俗益善初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也洪覺山曰漸何以象鴻也鴻水鳥木落南翔冰泮北徂出則有時居則有序蘇眉山曰鴻陽鳥而水居在水則以得陸為安在陸則以得水為樂者也初六陰爻如鴻在水上無應與故為漸于水涯于人則為小子正宜乾乾惕厲且宜有言以求人之切磋琢磨如鴻在干而哀鳴覓伴乃無咎也無應本宜有咎以當漸初而能自厲則其義可無咎矣六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也二亦在水而應九五則如漸于磐石飲啄皆和樂矣養道以待時豈無事而食哉九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離群醜也婦孕不育失其道也利用禦寇順相保也九三陽爻如鴻在陸上無應與則無水矣鴻不亂配而六四亦無應與與三相鄰設三征而從四則為離鴻群而可醜設四俯而就三則為失其道而雖孕亦不敢育凶可知已夫非配而私相為配以理言之則寇也三若守正而禦之則在我既無離群之醜在四亦無失道之凶乃可順相保耳六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也四亦在水而乘九三之剛不足安身如漸于木非鴻之所能棲以鴻之趾連不能握木故也或得其橫而且大有如桷者庶幾可以無咎意指上附九五言之蓋以陰居陰則順為巽之主則巽故可冀其無咎耳九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也五本在陸而居尊位則如高陵矣下應六二之婦方飲食衎衎以自養非九三之所能汙故三歲不孕終莫之勝而吉也聖王得明世之臣滿其夢卜求賢本願不亦快乎上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上亦在陸者也但九三為木落南翔之陸入于人中故凶上九為冰泮北歸之陸超于天外故吉所謂鴻飛冥冥弋者何慕但可遠望其羽用為高人達士之儀則耳又凡鴻飛之時成配者以次在後孤而無侶者獨在于前今上九超然物外下無應與如世間義夫志不可亂故吉也以羽為儀則其為用也大矣故曰聖人百世之師兌下震上歸妹征凶無攸利夫漸而進者未有不歸其所者也以少女而歸長男過以相與亦既得其所歸然一歸則當終身守之若更他往則凶又設以少女用事擅權則無所利佛法釋者修次第禪蓋攝世間事定而歸佛法正慧者也倘直用此事定而設化儀則必墮于愛見之網而凶若耽著此定則紆偏權曲徑而無所利也彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也如人有正配而不育則必取少女以育子此亦天地之大義以例國君用名世為宰輔不妨用小才小德為百官觀心用妙定合妙慧不妨用次第諸禪助神通設使天地不交則萬物不興故歸妹者乃人道之以終而成始者也夫如是則歸妹何過獨恨其以說而動則名為繼嗣實在情欲如國君名為群寮實在便嬖觀心名為助道實在味禪故所歸者名為妹也女捨夫而他適臣捨君而他往定捨慧而獨行則必得凶以卦中陰爻之位皆不當故女恃愛而司晨臣恃寵而竊柄定久習而耽著則無攸利以卦中六三之柔乘九二初九之剛六五上六之柔乘九四之剛故象曰澤上有雷歸妹君子以永終知敝方雷之動必感于澤而雷則易息澤恆如故此豈可為夫婦恆久之道亦豈君臣相遇之道亦豈定慧均平之道乎君子之于事也未暇問其所始先慮永其所終苟以永終為慮則知歸妹之敝矣昔有賢達年高無子誓不取妾其妻以為防己之妒也宛轉勸曰君勿忌我以致無後賢達曰吾豈不知卿有賢德哉吾年老矣設取幼妾未必得子吾沒之後彼當如何是以誓弗為耳其妻猶未深信乃密訪一少艾厚價買之置酒于房誘其夫與之同飲抽身出房反鎖其門賢達毅然從窗越出喻其妻曰吾豈以衰頽之身汙彼童女令彼後半世進退失措也幸速還彼父母勿追其價于是妻及親友無不歎服未幾妻忽受胎連育三子後皆顯達噫此所謂永終知敝以德動天者乎聖人于彖傳中隨順恆情則以天地大義許之于大象中勸修陰德則以永終知敝醒之知此義者亦可治國亦可觀心矣初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也此卦以下兌為妹以震為所歸者也兌三爻中六三為妹而初九九二從嫁者為娣震三爻中九四為所歸主而六五如帝乙之主婚上六如宗廟之受祭今初九以剛正之德上從六三之妹歸于九四而為其娣六三如跛待初能履故得征吉娣之為德貴在能恆相承于三則三吉而初亦吉矣九二眇能視利幽人之貞象曰利幽人之貞未變常也以剛中之德亦從六三而為娣六三如眇待二能視夫不自有其明而使人獲其視非幽人之貞其孰能之然亦止是娣德之常耳六三歸妹以須反歸以娣象曰歸妹以須未當也為兌之主恐其說之易動也故誡之曰須待六五之命勿令人輕我而反重我之娣以歸也由位未當故誡之九四歸妹愆期遲歸有時象曰愆期之志有待而行也三既須五命而後歸我則我之歸妹不愆期乎然雖遲歸會須有時如大舜不得父命則待帝堯之命而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也五為帝乙六三為妹亦稱女君初九九二為娣以袂而論則三不如初之與二以女而論則如月幾望而圓滿矣夫以帝女之貴而能行嫁于下不驕不亢豈非吉之道乎上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也震為兌所承之筐兌為震所刲之羊三承于六筐則無實六刲于三羊則無血故無攸利蓋生不積德死後無靈不能使子孫繁衍至于不獲已而歸妹此非女士之過皆上六無實之過也君子永終知敝早見及于此矣弟子道合募刻
