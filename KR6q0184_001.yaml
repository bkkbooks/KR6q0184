body:
  text: 北天目道人蕅益智旭著上經之一六十四卦皆伏羲所畫夏經以艮居首名曰連山商經以坤居首名曰歸藏各有繇辭以斷吉凶文王囚羑里時繫今彖辭以乾坤二卦居首名之曰易周公被流言時復繫爻辭孔子又為之傳以輔翌之故名周易古本文王周公彖爻二辭自分上下兩經孔子則有上經彖傳下經彖傳上經象傳下經象傳乾坤二卦文言繫辭上傳繫辭下傳說卦傳序卦傳雜卦傳共名十翼後人以孔子前之五傳會入上下兩經而繫辭等五傳不可會入附後別行即今經也可上可下可內可外易地皆然初無死局故名交易能動能靜能柔能剛陰陽不測初無死法故名變易雖無死局而就事論事則上下內外仍自歷然雖無死法而即象言象則動靜剛柔仍自燦然此所謂萬古不易之常經也若以事物言之可以一事一物各對一卦一爻亦可于一事一物之中具有六十四卦三百八十四爻若以卦爻言之可以一卦一爻各對一事一物亦可于一卦一爻之中具斷萬事萬物乃至世出世間一切事物又一切事物即一事一物一事一物即一切事物一切卦爻即一卦一爻一卦一爻即一切卦爻故名交易變易實即不變隨緣隨緣不變互具互造互入互融之法界耳伏羲但有畫而無辭設陰陽之象隨人作何等解世界悉檀也文王彖辭吉多而凶少舉大綱以生善為人悉檀也周公爻辭誡多而吉少盡變態以勸懲對治悉檀也孔子十傳會歸內聖外王之學第一義悉檀也偏說如此剋實論之四聖各具前三悉檀開權顯實則各四悉乾下乾上乾元亨利貞六畫皆陽故名為乾乾者健也在天為陽在地為剛在人為智為義在性為照在修為觀又在器界為覆在根身為首為天君在家為主在國為王在天下為帝或有以天道釋或有以王道釋者皆偏舉一隅耳健則所行無礙故元亨然須視其所健者何事利貞之誡聖人開示學者切要在此所謂修道之教也夫健于上品十惡者必墮地獄健于中品十惡者必墮畜生健于下品十惡者必墮鬼趣健于下品十善者必成修羅健于中品十善者必生人道健于上品十善者必生天上健于上品十善兼修禪定者必生色無色界健于上品十善兼修四諦十二因緣觀者必獲二乘果證健于上上品十善能自利利他者即名菩薩健于上上品十善了知十善即是法界即是佛性者必圓無上菩提故十界皆元亨也三惡為邪三善為正六道有漏為邪二乘無漏為正二乘偏真為邪菩薩度人為正權乘二諦為邪佛界中道為正分別中邊不同為邪一切無非中道為正此利貞之誡所以當為健行者設也初九潛龍勿用龍之為物也能大能小能屈能申故以喻乾德焉初未嘗非龍特以在下則宜潛而勿用耳此如大舜耕歷山時亦如顏子居陋巷乎其靜為復其變為姤復則后不省方以自養姤則施命誥四方以養衆皆潛之義也九二見龍在田利見大人初如淵二如田時位之不同耳龍何嘗有異哉二五曰大人三曰君子皆人而能龍者也此如大舜徵庸時亦如孔子遑遑求仕乎其靜為臨為師其變為同人皆有利見之義焉九三君子終日乾乾夕惕若厲無咎在下之上則地危純剛之德則望重故必終日乾乾雖至于夕而猶惕若所謂安而不忘危危者安其位者也此如大舜攝政時亦如王臣蹇蹇匪躬者乎其靜為泰為謙其變為履皆有乾乾惕厲之義焉九四或躍在淵無咎初之勿用必于深淵四亦在淵何也初則潛四則躍時勢不同而跡暫同此如大舜避位時亦如大臣之休休有容者乎其靜為大壯為豫其變為小畜皆有將飛未飛以退成進之義焉九五飛龍在天利見大人今之飛者即昔之或躍或惕或見或潛者也不如此安所稱大人哉我為大人則所見無非大人矣此如大舜垂衣裳而天下治亦如一切聖王之御極者乎其靜為夬為比其變為大有皆有利見之義焉上九亢龍有悔亢者時勢之窮悔者處亢之道也此如大舜遇有苗弗格舞干羽于兩階乎否則不為秦皇漢武者幾希矣其靜為乾為剝其動為夬皆亢而須悔者也王陽明曰乾六爻作一人看有顯晦無優劣作六人看有貴賤無優劣統論六爻表法通乎世出世間若約三才則上二爻為天中二爻為人下二爻為地若約天時則冬至後為初爻立春後為二爻清明後為三爻夏為四爻秋為五爻九月後為上爻又乾坤二卦合論者十一月為乾初爻十二月為二爻正月為三爻二月為四爻三月為五爻四月為上爻五月為坤初爻乃至十月為坤上爻也若約欲天則初爻為四王二忉利三夜摩四兜率五化樂上他化若約三界則初欲界二三四五色界上無色界若約地理則初為淵底二為田三為高原四為山谷五為山之正基上為山頂若約方位則初為東三為南四為西六為北二五為中若約家則初為門外上為後園中四爻為家庭若約國則初上為郊野中四爻為城內若約人類則初民二士三官長四宰輔五君主上太皇或祖廟若約一身則初為足二為腓三為股為限四為胸為身五為口為脢上為首亦為口若約一世則初為孩童二少三壯四強五艾上老若約六道則如次可配六爻又約十界則初為四惡道二為人天三為色無色界四為二乘五為菩薩上為佛若約六即則初理二名字三觀行四相似五分證上究竟以要言之世出世法若大若小若依若正若善若惡皆可以六爻作表法有何一爻不攝一切法有何一法不攝一切六爻哉佛法釋乾六爻者龍乃神通變化之物喻佛性也理即位中佛性為煩惱所覆故勿用名字位中宜參見師友故利見大人觀行位中宜精進不息故日乾夕惕相似位中不著似道法愛故或躍在淵分證位中八相成道利益群品故為人所利見究竟位中不入涅槃同流九界故云有悔此原始要終兼性與修而言之也若單約修德者陽為智德即是慧行初心乾慧宜以定水濟之不宜偏用二居陰位定慧調適能見佛性故云利見大人三以慧性遍觀諸法四以定水善養其機五則中道正慧證實相理上則覓智慧相了不可得又約通塞而言之者初是淺慧故不可用上是慧過于定故不可用中之四爻皆是妙慧二如開佛知見三如示佛知見四如悟佛知見五如入佛知見也用九見群龍無首吉六十四卦共計三百八十四爻陰陽各半則陽爻共有百九十二此周公總明一切陽爻所以用九而不用七之旨也蓋七為少陽靜而不變九為老陽動而變陰今若筮得乾卦六爻皆九則變為坤卦不惟可知大始亦且可作成物而六龍不作六龍用其變化妙無端倪矣此如大舜薦禹于天不以位傳其子亦如堯舜之猶病文王之望道未見孔子之聖仁豈敢乎若約佛法釋者用九是用有變化之慧不用七之無變化慧也陽動即變為陰喻妙慧必與定俱華嚴云智慧了境同三昧大慧云一悟之後穩貼貼地皆是此意群龍者因中三觀果上三智也觀之與智離四句絶百非不可以相求不可以識識故無首而吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形此孔子彖傳所以釋文王之彖辭者也釋彖之法或闡明文王言中之奧或點示文王言外之旨或借文王言句而自出手眼別申妙義事非一概今乾坤二卦皆是自出手眼或亦文王言外之旨此一節是釋元亨二字以顯性德法爾之妙所謂無不從此法界流也蓋乾之德不可勝言而惟元能統之元之德不可名狀惟于萬物資始處驗之始者對終而言不始不足以致終不終不足名資始即始而終故曰統天舉凡雲行雨施品物流行莫非元之德用所謂始則必亨者也大明終始六位時成時乘六龍以御天此一節是顯聖人以修合性而自利功圓也聖人見萬物之資始便能即始見終知其由終有始始終止是一理但約時節因緣假分六位達此六位無非一理則位位皆具龍德而可以御天矣天即性德也修德有功性德方顯故名御天乾道變化各正性命保合太和乃利貞此一節是釋利貞二字以顯性德本來融遍所謂無不還歸此法界也蓋一切萬物既皆資始于乾元則罔非乾道之變化既皆乾道變化則必各得乾道之全體大用非是乾道少分功能故能各正性命物物具乾道全體又能保合太和物物具乾元資始大用乃所謂利貞也首出庶物萬國咸寧此一節是顯聖人修德功圓而利他自在也統論一傳宗旨乃孔子借釋彖爻之辭而深明性修不二之學以乾表雄猛不可沮壞之佛性以元亨利貞表佛性本具常樂我淨之四德佛性必常常必備乎四德豎窮橫遍當體絶待故曰大哉乾元試觀世間萬物何一不從真常佛性建立設無佛性則亦無三千性相百界千如故舉一常住佛性而世間果報天方便淨天實報義天寂光大涅槃天無不統攝之矣依此佛性常住法身遂有應身之雲八教之雨能令三草二木各稱種性而得生長而聖人則于諸法實相究盡明了所謂實相非始非終但約究竟徹證名之為終衆生理本名之為始知其始亦佛性終亦佛性不過因于迷悟時節因緣假立六位之殊位雖分六位位皆龍所謂理即佛乃至究竟即佛乘此即而常六之修德以顯六而常即之性德故名乘六龍以御天也此常住佛性之乾道雖亙古亙今不變不壞而具足一切變化功用故能使三草二木各隨其位而證佛性既證佛性則位位皆是法界統一切法無有不盡而保合太和矣所以如來成道首出九界之表而剎海衆生皆得安住于佛性中也象曰天行健君子以自強不息六十四卦大象傳皆是約觀心釋所謂無有一事一物而不會歸于即心自性也本由法性不息所以天行常健今法天行之健而自強不息則以修合性矣潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也文並可知佛法釋者法身流轉五道名曰衆生故為潛龍理即法身不可用也具縛凡夫能知如來祕密之藏故德施普十乘妙觀念念熏修故反復道不住相似中道法愛故進無咎八相成道廣度衆生故是大人之事無住大般涅槃亦不畢竟入于滅度盡未來時同流九界故盈不可久但恃性德便廢修德全以修德而為教門故天德不可為首馮文所曰其潛藏者非謂有時而發用也即發用而常潛藏也其在下者非謂有時而上也其上者不離乎下也乾卦所謂勿用之潛龍即大衍所謂勿用之一也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也六十四卦不出陰陽二爻陰陽之純則為乾坤二卦乾坤二義明則一切卦義明矣故特作文言一傳以申暢之此一節先明性德也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事此一節明修德也君子行此四德者故曰乾元亨利貞此一節結顯以修合性也非君子之妙修何能顯乾健之本性哉統論乾坤二義約性則寂照之體約修則明靜之德約因則止觀之功約果則定慧之嚴也若性若修若因若果無非常樂我淨常樂我淨之慧名一切種智常樂我淨之定名首楞嚴定所以乾坤各明元亨利貞四德也今以儒理言之則為仁義禮智若一往對釋者仁是常德體無遷故禮是樂德具莊嚴故義是我德裁制自在故智是淨德無昏翳故若互攝互含者仁禮義智性恆故常仁禮義智以為受用故樂仁禮義智自在滿足故我仁禮義智無雜無垢故淨又四德無雜故為仁四德周備故為禮四德相攝故為義四德為一切法本故為智也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也約聖德釋如文可解若約理即釋者龍德而隱即所謂隱名如來藏也昏迷倒惑其理常存故不易乎世佛性之名未彰故不成乎名終日行而不自覺枉入諸趣然畢竟在凡不減故遁世無悶不見是而無悶樂則行之而行者亦是佛性憂則違之而違者亦是佛性終日隨緣終日不變故確乎其不可拔也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也文亦可解若約名字即佛釋者庸言庸行秖是身口七支以知法性無染汙故隨順修行尸波羅蜜從此間九界之邪而存佛性之誠初心一念圓解善根已超三乘權學塵劫功德而不自滿假故其德雖博亦不存德博之想以成我慢也發心畢竟二不別如是二心先心難故雖名字初心已具佛知佛見而為君德九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣忠信是存心之要而正所以進德修辭立誠是進修之功而正所以居業此合外內之道也可往則往是其幾可止則止是其義進退不失其道故上下無不宜矣若約佛法六即釋者正觀行位中圓妙功夫也直心正念真如名為忠信所以進德而為正行也隨說法淨則智慧淨導利前人化功歸己名為修辭立誠所以居業而為助行也知至至之是妙觀知終終之是妙止止觀雙行定慧具足則能上合諸佛慈力而不驕下合衆生悲仰而不憂矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離群也君子進德修業欲及時也故無咎此正闡明舜禹避位仍即登位之心事也若約佛法者直觀不思議境為上用餘九法助成為下心心欲趨薩婆若海為進深觀六即不起上慢為退欲及時者欲于此生了辦大事也此身不向今生度更向何生度此身設不證入圓住正位不名度二死海九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也此明聖人垂衣裳而天下治初非有意有造作也佛法釋者如來成正覺時悉見一切衆生成正覺初地離異生性入同生性大樂歡喜悉是此意乃至證法身已入普現色身三昧在天同天在人同人皆所謂利見大人法界六道所同仰也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也李衷一曰從來說聖人無亢卻都從履滿招損上看夫子乃以無位無民無輔表之此堯舜有天下而不與之心也非位喪民叛賢人離去之謂也動字下得妙無停思無二慮天下極重難反之局止在聖人一反掌間致悔之由止在一動處亢之術止在一悔佛法釋者法身不墮諸數故貴而無位佛果出九界表故高而無民寂光非等覺以下境界故賢人在下位而無輔是以究竟位中必逆流而出示同九界還現嬰兒行及病行也潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此以時位重釋六爻之義也用九而曰乾元正顯乾卦全體大用亦顯潛見惕躍飛亢皆無首而皆吉佛法釋者理即佛為貶之極故下名字即佛未有功夫故時舍五品位正修觀行故行事相似位擬欲證真故自試分證位八相成道故上治究竟位不住涅槃故窮之災用九則以修合性故天下治也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此兼約德之與時再釋六爻之義也與時偕極對與時偕行看皆所謂時乘御天者也乃見天則則潛而勿用亦天則乃至亢而有悔亦天則也佛法釋者佛性隱在衆生身中故潛藏一聞佛性則知心佛衆生三無差別故天下文明念念與觀慧相應無間故與時偕行捨凡夫性入聖人性故乾道乃革由證三德方坐道場故位乎天德天德者天然之性德也極則必返證佛果者必當同流九界性必具修全性起修乃見性修不二之則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉前約仁禮義智四德以釋元亨利貞今更申明四德一以貫之統惟屬乾而非判然四物也舉一乾字必具元德舉一元字必統四德元之大即乾之大矣大哉乾乎剛健中正純粹精也六爻發揮旁通情也乾具四德而非定四故大故復以剛健等七字而深贊之卦言其體爻言其用卦據其定爻據其變體大則用亦大體剛健中正純粹精則用亦剛健中正純粹精矣時乘六龍以御天也雲行雨施天下平也上明乾德體必具用此明聖人因用以得體也佛法釋者此章申明性必具修修全在性也佛性常住之理名為乾元無一法不從此法界而始無一法不由此法界而建立生長亦無有一法而不即以此法界為其性情所以佛性常住之理遍能出生成就百界千如之法而實無能生所生能利所利以要言之即不變而隨緣即隨緣而不變豎窮橫遍絶待難思但可強名之曰大耳其性雄猛物莫能壞故名剛依此性而發菩提心能動無邊生死大海故名健非有無真俗之二邊故名中非斷常空假之偏法故名正佛性更無少法相雜故名純是萬法之體要故名粹無有一微塵處而非佛性之充遍貫徹者故名精所以只此佛性乾體法爾具足六爻始終修證之相以旁通乎十界迷悟之情此所謂性必具修也聖人乘此即而常六之龍以御合于六而常即之天自既以修合性遂能稱性起于身雲施于法雨悉使一切衆生同成正覺而天下平此所謂全修在性也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也此下六爻皆但約修德兼約通塞言之佛法釋者成德為行謂依本自天成之性德而起行也既全以性德為行則狂心頓歇歇即菩提故為日可見之行也然猶云潛者以其雖則開悟習漏未除故佛性猶為虛妄煩惱所隱而未現而正助二行尚在觀行相似未成般若解脫二德是以君子必以修德成之而弗專用此虛解也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也學問是聞慧寬居是思慧仁行是修慧從三慧而入圓住開佛知見即名為佛故云君德九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重剛者自強不息有進而無退也不中者不著中道而匆匆取證也上不在天者未登十地入佛知見也下不在田者已超十住開佛知見因時而惕正是不思議十行法門遍入法界而能行于非道通達佛道故雖危無咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎重剛不中亦如上說中不在人謂已超十行示佛知見也或之者回事向理回因向果回自向他和融法界而無所偏倚有似乎疑之也疑者擬議以成變化之謂故雖似有修證之事而實無事也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況于人乎況于鬼神乎十地入佛知見如天普覆如地普載如日照晝如月照夜如四時次序之始終萬物如鬼神吉凶之折攝群機根本妙智窮法界無始之始差別妙智建法界無時之時理既相契弗違則凡人與鬼神總囿于一理者安得不相順而利見哉亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎凡有慧無定者惟知佛性之可尚而不知法身之能流轉五道也惟知佛性之無所不在而不知背覺合塵之不亡而亡也惟知高談理性之為得而不知撥無修證之為喪也惟聖人能知進退存亡之差別而進亦佛性退亦佛性存亦佛性亡亦佛性進退存亡不曾增減佛性佛性不礙進退存亡故全性起修全修在性而不失其正也若徒恃佛性不幾亢而非龍乎又約究竟位中解者示現成佛是知進示現九界是知退示現聖行梵行嬰兒行是知存示現病行是知亡而于佛果智斷無所缺減是不失其正也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉六畫皆陰故名為坤坤者順也在天為陰在地為柔在人為仁在性為寂在修為止又在器界為載在根身為腹為腑臟在家為妻在國為臣順則所行無逆故亦元亨然必利牝馬之貞隨順牡馬而不亂其在君子之體坤德以修道也必先用乾智以開圓解然後用此坤行以卒成之若未有智解先修定行則必成暗證之迷惟隨智後用之則得主而有利如目足並運安隱入清涼池亦如巧力並具能中于百步之外也若往西南則但得陰之朋類如水濟水不堪成事若往東北則喪其陰之朋黨而與智慧相應方安于定慧均平之貞而吉也彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆此傳詳釋彖辭先約地道明坤四德次明君子體坤德而應地道也資始所以稟氣資生所以成形由稟氣故方得成形故名順承天也德合無疆言其與天合德西南則兌離以及于巽皆陰之類東北則震艮以至坎乾可賴之以終吉矣佛法釋者以坤表多所含蓄而無積聚之如來藏性約智名乾約理名坤約照名乾約寂名坤又可約性名乾約修名坤又可修中慧行名乾行行名坤乾坤實無先後以喻理智一如寂照不二性修交徹福慧互嚴今于無先後中說先後者由智故顯理由照故顯寂由性故起修由慧故導福而理與智冥寂與照一修與性合福與慧融故曰至哉坤元萬物資生乃順承天也稱理之行自利利他一行一切行故德合于無疆之智而含弘光大也牝馬行地雖順而健三昧隨智慧行所以為佛之三昧也夫五度如盲般若如導若以福行為先則佛知見未開未免落于旁蹊曲徑而失道惟以智導行行順于智則智常而行亦常故西南得朋不過與類俱行而已惟東北喪朋則于一一行中具見佛性而行行無非法界當體絶待終有慶矣所以安貞之吉定慧均平乃可應如來藏性之無疆也象曰地勢坤君子以厚德載物性德本厚所以地勢亦厚今法地勢以厚積其德荷載群品正以修合性之真學也初六履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也此爻其靜為垢其變為復垢則必至于坤復則必至于乾皆所謂馴致其道者也問曰乾坤之初爻等耳乾胡誡以勿用坤胡決其必至乎答曰陽性動妄動恐其泄也故誡之陰性靜安靜則有成也故決之積善積惡皆如履霜餘慶餘殃皆如堅冰陽亦有剛善剛惡陰亦有柔善柔惡不當偏作陰柔邪惡釋之說統云善乾惡坤此晉魏大謬處九家易曰霜者乾之命堅冰者陰功成也京氏曰陰雖柔順氣則堅剛為無邪氣也陰中有陽氣積萬象孫聞斯曰隤霜不殺菽冬無冰春秋皆為記異然時霜而霜時冰而冰正令正道以堅冰為至而至之自初也如是謂凝謂順冰畢竟是陰之所結然惟陽伏于內故陰氣外沍而為冰聖人於乾曰為冰明是此處注腳馴致二字正表坤德之順處腳跟無霜不秋而凋面孔無血見敵輒走若約佛法釋者乾之六爻兼性修而言之坤之六爻皆約修德定行而言初上二爻表世間味禪之始終中間四爻表禪波羅蜜具四種也二即世間淨禪而達實相三即亦世間亦出世禪四即出世間禪五即非世間非出世禪又借乾爻對釋初九有慧無定故勿用欲以養成其定初六以定含慧故如履霜若馴致之則為堅冰之乾德九二中道妙慧故利見大人六二中道妙定故無不利九三慧過于定故惕厲而無咎六三定有其慧故含章而可貞九四慧與定俱故或躍而可進六四定過于慧故括囊而無譽九五大慧中正故在天而利見六五大定即慧故黃裳而元吉亢以慧有定而知悔戰則定無慧而道窮也又約乾為正行坤為助行者坤之六爻即表六度布施如履霜馴之可致堅冰冰者乾德之象故云乾為冰也持戒則直方大攝律儀故直攝善法故方攝衆生故大忍辱為含章力中最故精進如括囊于法無遺失故禪定如黃裳中道妙定遍法界故智慧如龍戰破煩惱賊故六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也純柔中正順之至也順理故直依理而動故方既直且方則必大矣此地道本具之德非關習也佛法釋者世間淨禪即是實相故直方大正念真如為直定之體也善法無缺為方定之相也功德廣博為大定之用也世間淨禪法爾本具實相三德能于根本禪中通達實相故不習而無不利也向淨禪中覷實相理名之為動動則三德之理現前于禪開祕密藏故地道光六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也蘇眉山曰三有陽德苟用其陽則非所以為坤也故有章而含之有章則可以為正矣然以其可正而遂專之亦非所以為坤也故從事而不造事無成而代有終佛法釋者亦世間亦出世禪亦愛亦策故含章而可貞或從一乘無上王三昧事則借此可發出世上上妙智而有終不復成次第禪矣六四括囊無咎無譽象曰括囊無咎慎不害也得陰之正而處于上卦之下位高任重故括囊以自慎焉吳幼清曰坤體虛而容物囊之象也四變為奇塞壓其上猶括結囊之上口人之謹閉其口而不言亦猶是也蘇眉山曰咎與譽人之所不能免也出乎咎必入乎譽脫乎譽必罹乎咎咎所以致罪而譽所以致疑也甚矣無譽之難也佛法釋者出世間禪切忌取證取證則墮聲聞辟支佛地雖無生死之咎亦無利他之譽矣若能慎其誓願不取小證則不為大乘之害也六五黃裳元吉象曰黃裳元吉文在中也黃者中色君之德也裳者下飾臣之職也三分天下有其二以服事殷斯之謂乎佛法釋者非世間非出世禪禪即中道實相故黃不起滅定現諸威儀同流九界故如裳此真無上菩提法門故元吉定慧莊嚴名之曰文全修在性名文在中上六龍戰于野其血玄黃象曰龍戰于野其道窮也其靜為夬其變為剝皆有戰之義焉善極則斷惡必盡惡極則斷善必盡故窮則必戰戰則必有一傷也陳旻昭曰此天地既已定位而震龍欲出故戰于野也震為龍為玄黃氣已盛故為血窮乎上者必反下故為屯卦之初爻夫乾坤立而有君故次之以屯有君則有師故次之以蒙屯明君道蒙明師道乾坤即天地父母合而言之天地君親師也佛法釋者無想天灰凝五百劫而墮落非非想天八萬大劫而還作飛狸牛蟲乃至四禪無聞比丘墮阿鼻獄皆偏用定而不知以慧濟之故至于如此之窮用六利永貞象曰用六永貞以大終也此總明百九十二陰爻所以用六而不用八之旨也八為少陰靜而不變六為老陰動而變陽今筮得坤卦六爻皆六則變為乾卦不惟順承乎天亦且為天行之健矣佛法釋者用八如不發慧之定用六如發慧之定發慧之定一切皆應久修習之禪波羅蜜至佛方究竟滿故曰大終文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行此仍以地道申贊坤之德也贊乾則自元而亨而利而貞贊坤則自貞而利而亨而元乾之始必徹終而坤之終必徹始也文並可知佛法釋者即是直贊禪波羅蜜以其住寂滅地故至柔至靜以其能起神通變化普應群機感而遂通故動剛德方由般若為導而成故後得主而有常所謂般若常故禪亦常也于禪中具足萬行一一妙行與智相應導利含識故含萬物而化光非智不禪故坤道為順非禪不智故承天時行也積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也順即馴致其道之謂洪化昭曰臣而順必不弒君子而順必不弒父此正所謂辨之于早者不作慎字解陳非白問曰何故積善餘慶積惡餘殃不發明于乾之初爻而明于坤之初爻耶答曰乾是智巧坤是聖力非智巧則不能知善知惡非聖力則不能積善積惡故曰乾知大始坤作成物佛法釋者十善為善十惡為不善無漏為善有漏為不善利他為善自利為不善中道為善二邊為不善圓中為善但中為不善善即君父之義不善即臣子之義以善統御不善則不善即善之臣子以不善妨礙于善則善遂為不善所障如君父之被弒矣所以千里之行始于一步必宜辨之于早也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也惟正故直惟義故方直方皆本具之德而敬之一字乃君子修道之要術也敬即至順順則必直且方而德不孤可謂大矣佛法釋者正念真如是定之內體具一切義而無減缺是定之外相既具內體外相則必大用現前而德不孤所以于禪開祕密藏了了見于佛性而無疑也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也文義可知佛法釋者亦世間亦出世禪雖即具足實相之美但含而未發以此為王三昧之助弗宜偏修以至成也蓋禪定隨智慧行如地承天如妻隨夫如臣輔君然智慧不得禪定則不能終其自利利他之事故禪定能代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也能謹則可以成變化變化則草木亦蕃不謹則天地必閉閉則雖賢人亦隱矣安得不括囊哉佛法釋者定慧變化則三草二木各得潤澤生長若入于出世果證則灰身泯智而無利生之事矣故修此法門者不可以不謹也君子黃中通理正位居體美在其中而暢于四支發于事業美之至也黃是中色即表中德德雖在中而通乎腠理故雖屬正位仍居四體此釋黃裳義也美在其中等重牒上義以釋元吉之義佛法釋者以黃中三昧而通達實相之理實相雖名正位遍入一切諸法而居衆體蓋惟深證非世間非出世上上之禪故能暢于四支發于事業而三輪不思議化普利法界乃為美之至也陰疑于陽必戰為其嫌于無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃夫陰陽皆本于太極則本一體何至相疑而戰哉陽者見之謂之陽不知與陰同體故疑陰而必戰陰者見之謂之陰不知與陽同體故亦疑陽而必戰方陰之盛而戰陽則有似乎無陽故稱龍以明陽本未嘗無焉逮陰之動而變陽則似離乎陰類故稱血以明陰仍未離類焉夫惟動而將變故玄黃相雜耳變定之後天玄地黃豈可雜哉子韶風草頌云君子何嘗去小人小人如草去還生但令鼓舞心歸化不必區區務力爭得此旨者可以立消朋黨之禍不然君子疑嫌小人小人亦疑嫌君子不至于兩敗俱傷者幾希矣佛法釋者始則誤認四禪為四果及至後陰相現則反疑四果不受後有之說為虛而起謗佛之心是必戰也然世間豈無真證四果智德者耶故稱龍以顯四果之非虛焉彼雖自謂四果止是暗證味禪實未離于生死之類故稱血以定其類焉夫玄黃者定慧俱傷之象也以定傷慧慧傷而定亦傷然此但約修德故言傷耳若本有寂照之性則玄自玄黃自黃雖闡提亦不能斷性善雖昏迷倒惑其理常存豈可得而雜哉又觀心釋者陰陽各論善惡今且以陰為惡以陽為善善惡無性同一如來藏性何疑何戰惟不達性善性惡者則有無相傾起輪回見而必戰戰則埋沒無性之妙性似乎無陽故稱龍以顯性善之不斷焉既以善惡相抗則二俱有漏故稱血以顯未離生死類焉夫善惡相傾奪者由未達妙性體一而徒見幻妄事相之相雜也實則天玄地黃性不可改何嫌何疑何法可相戰耶善惡不同而同是一性如玄黃不同而同是眼識相分天地不同而同一太極又如妍媸影像不同而同在一鏡也若知不同而同則決不敵對相除而成戰若知同而不同則決應熏習無漏善種以轉惡矣祖堂修如捐資刻
