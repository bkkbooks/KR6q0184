front:
  text: 周易禪解序蕅益子結冬於月臺禪誦之餘手持韋編而箋釋之或問曰子所解者是易耶余應之曰然復有視而問曰子所解者非易耶余亦應之曰然又有視而問曰子所解者亦易亦非易耶余亦應之曰然更有視而問曰子所解者非易非非易耶余亦應之曰然侍者聞而笑曰若是乎墮在四句中也余曰汝不聞四句皆不可說有因緣故四句皆可說乎因緣者四悉檀也人謂我釋子也而亦通儒能解易則生歡喜焉故謂是易者吾然之世界悉檀也或謂我釋子也奈何解易以同俗儒知所解之非易則善心生焉故謂非易者吾然之為人悉檀也或謂儒釋殆無分也若知易與非易必有差別雖異而同雖同而異則儱侗之病不得作焉故謂亦易亦非易者吾然之對治悉檀也或謂儒釋必有實法也若知非易則儒非定儒知非非易則釋非定釋但有名字而無實性頓見不思議理焉故謂非易非非易者吾然之第一義悉檀也侍者曰不然若所解是易則人將謂易可助出世法成增益謗若所解非易則人將謂師自說禪何嘗知易成減損謗若所解亦易亦非易則人將謂儒原非禪禪亦非儒成相違謗若所解非易非非易則人將謂儒不成儒禪不成禪成戲論謗烏見其為四悉檀也余曰是固然汝獨不聞人參善補人而氣喘者服之立斃乎抑不聞大黃最損人而中滿者服之立瘥乎春之生育萬物也物固有遇春而爛壞者夏之長養庶品也草亦有夏枯者秋之肅殺也而菊有黃花冬之閉藏也而松柏青青梅英馥馥如必擇其有利無害者而後為之天地恐亦不能無憾矣且佛以慈眼視大千知群機已熟然後示生猶有魔波旬擾亂之九十五種嫉妒之提婆達多思中害之豈惟堯舜稱猶病哉吾所由解易者無他以禪入儒務誘儒以知禪耳縱令不得四益而起四謗如從地倒還從地起置毒乳中轉至醍醐厥毒仍在遍行為外道師薩遮為尼犍主意在斯也侍者再拜而謝曰此非弟子所及也請得筆而存之崇禎辛巳仲冬旭道人書于溫陵之毫餘樓周易禪解目録序卷一上經之一乾坤卷二上經之二屯蒙需訟師比小畜履卷三上經之三泰否同人大有謙豫隨蠱臨觀卷四上經之四噬嗑賁剝復無妄大畜頤大過坎離卷五下經之一咸恆遁大壯晉明夷家人暌蹇解損益卷六下經之二夬姤萃升困井革鼎震艮漸歸妹卷七下經之三豐旅巽兌渙節中孚小過既濟未濟卷八繫辭上傳卷九繫辭下傳說卦傳序卦傳雜卦傳卷十河圖說洛書說伏羲八卦次序說伏羲八卦方位說六十四卦次序說六十四卦方位說文王八卦次序說文王八卦方位說周易禪解目録畢較刻易禪紀事瑞叨侍大師五年每見久精易學之士一聞大師拈義無不傾服遂發心募梓全集輒以易禪居首大師解易既畢方出圖說故並附於末卷或有問曰紫陽本義圖說在前謂聖人作易精微之旨全在語言文字之先今胡得倒置耶大師答曰聖人悟無言而示有言學者因有言而悟無言所以古有左圖右書之說何倒之有且文字與圖皆標月指耳不肯觀月而爭指之前後不亦惑乎問者默然茲因較刻并識此語願我同志閲斯編者了知文字與圖無非吾人心性注腳不作有言會不作無言會庶不負法恩矣門弟子通瑞百拜敬書
