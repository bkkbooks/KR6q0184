body:
  text: 北天目道人蕅益智旭著上經之二震下坎上屯元亨利貞勿用有攸往利建侯乾坤始立震一索而得男為動為雷坎再索而得男為陷為險為雲為雨乃萬物始生之時出而未申之象也始則必亨始或不正則終于不正矣故元亨而利于正焉此元亨利貞即乾坤之元亨利貞也乾坤全體太極則屯亦全體太極也而或謂乾坤二卦大餘卦小不亦惑乎夫世既屯矣倘務往以求功秖益其亂唯隨地建侯俾人人各歸其主各安其生則天下不難平定耳楊慈湖曰理屯如理絲固自有其緒建侯其理之緒也佛法釋者有一劫初成之屯有一世初生之屯有一事初難之屯有一念初動之屯初成初生初難姑置弗論一念初動之屯今當說之蓋乾坤二卦表妙明明妙之性覺性覺必明妄為明覺所謂真如不守自性無明初動動則必至因明立所而生妄能成異立同紛然難起故名為屯然不因妄動何有修德故曰無明動而種智生妄想興而涅槃現此所以元亨而利貞也但一念初生既為流轉根本故勿用有所往有所往則是順無明而背法性矣惟利即于此處用智慧深觀察之名為建侯若以智慧觀察則知念無生相而當下得太平矣觀心妙訣孰過于此彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧乾坤立而剛柔交一索得震為雷再索得坎為雨非難生乎由動故大亨由在險中故宜貞夫雷雨之動本天地所以生成萬物然方其盈滿交作時則天運尚自草亂昧瞑諸侯之建本聖王所以安撫萬民然方其初建又豈可遽謂寧貼哉佛法釋者無明初動為剛因明立所為柔既有能所便為三種相續之因是難生也然此一念妄動既是流轉初門又即還滅關竅惟視其所動何如耳當此際也三細方生六粗頓具故為雷雨滿盈天造草昧之象宜急以妙觀察智重重推簡不可坐在滅相無明窠臼之中蓋凡做功夫人若見雜念暫時不起便妄認為得力不知滅是生之窟宅故不可守此境界還須推破之也象曰雲雷屯君子以經綸在器界則有雲雷以生草木在君子則有經綸以自新新民約新民論經綸古人言之詳矣約自新論經綸者豎觀此心不在過現未來出入無時名為經橫觀此心不在內外中間莫知其鄉名為綸也佛法釋者迷于妙明明妙真性一念無明動相即為雷所現晦昧境界之相即為雲從此便有三種相續名之為屯然善修圓頓止觀者只須就路還家當知一念動相即了因智慧性其境界相即緣因福德性于此緣了二因豎論三止三觀名經橫論十界百界千如名綸也此是第一觀不思議境初九磐桓利居貞利建侯有君德而無君位故磐桓而利居貞其德既盛可為民牧故利建侯以濟屯也佛法釋者一念初動一動便覺不隨動轉名為磐桓所謂不遠之復乃善于修證者也由其正慧為主故如頓悟法門象曰雖磐桓志行正也以貴下賤大得民也磐桓不進似無意于救世然斯世決非強往求功者所能救則居貞乃所以行正耳世之屯也由上下之情隔絶今能以貴下賤故雖不希望為侯而大得民心不得不建之矣佛法釋者不隨生死流乃其隨順法性流而行于正者也雖復頓悟法性之貴又能不廢事功之賤所謂以中道妙觀遍入因緣事境故正助法門並得成就而大得民六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字柔德中正上應九五乃乘初九得民之侯故邅如班如而不能進也初本非寇而二視之則以為寇矣吾豈與寇為婚媾哉寧守貞而不字至于十年之久乃能字于正應耳吳幼清曰二三四在坤為數十過坤十數則逢五正應而許嫁矣佛法釋者此如從次第禪門修證功夫蓋以六居二本是中正定法但不能頓超必備歷觀練熏修諸禪方見佛性故為十年乃字象曰六二之難乘剛也十年乃字反常也乘剛故自成難非初九難之也數窮時極乃反于常明其不失女子之貞佛法釋者乘剛即是煩惱障重故非次第深修諸禪不足以斷惑而反歸法性之常六三即鹿無虞惟入于林中君子幾不如舍往吝欲取天下須得賢才譬如逐鹿須藉虞人六三自既不中不正又無應與以此濟屯屯不可濟徒取羞耳佛法釋者欲修禪定須假智慧自無正智又無明師良友瞎鍊盲修則墮坑落塹不待言矣君子知幾寧捨蒲團之功訪求知識為妙若自信自恃一味盲往必為無聞比丘反招墮落之吝象曰即鹿無虞以從禽也君子舍之往吝窮也堯舜揖讓固是有天下而不與湯武征誅亦是萬不得已為救斯民非富天下今六三不中不正居下之上假言濟屯實貪富貴故曰以從禽也從禽已非聖賢安世之心況無應與安得不吝且窮哉佛法釋者貪著味禪名為從禽本無菩提大志願故六四乘馬班如求婚媾往吉無不利柔而得正居坎之下近于九五進退不能自決故乘馬而班如也夫五雖君位不能以貴下賤方屯其膏初九得民于下實我正應奈何不急往乎故以吉無不利策之佛法釋者六四正而不中以此定法而修則其路迂遠難進惟求初九之明師良友以往則吉無不利矣象曰求而往明也佛法釋者不恃禪定功夫而求智慧師友此真有決擇之明者也九五屯其膏小貞吉大貞凶屯難之世惟以貴下賤乃能得民今尊居正位專應六二膏澤何由普及乎夫小者患不貞一大者患不廣博故在二則吉在五則凶也佛法釋者中正之慧固可斷惑由其早取正位則墮聲聞辟支佛地所以四弘膏澤不復能下于民在小乘則速出生死而吉在大乘則違遠菩提而凶象曰屯其膏施未光也非無小施特不合于大道耳上六乘馬班如泣血漣如以陰居陰處險之上當屯之終三非其應五不足歸而初九又甚相遠進退無據將安歸哉佛法釋者一味修于禪定而無慧以濟之雖高居三界之頂不免窮空輪轉之殃決不能斷惑出生死故乘馬班如八萬大劫仍落空亡故泣血漣如象曰泣血漣如何可長也佛法釋者八萬大劫究竟亦是無常坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞再索得坎既為險為水三索得艮復為止為山遇險而止水涵于山皆蒙昧未開發之象也蒙雖有蔽于物物豈能蔽性哉故亨但發蒙之道不可以我求蒙必待童蒙求我求者誠則告之必達求者瀆則告者亦瀆矣瀆豈發蒙之正耶不憤不啓不悱不發孔子真善于訓蒙者也佛法釋者夫心不動則已動必有險遇險必止止則有反本還源之機蒙所以有亨道也蒙而欲亨須賴明師良友故凡為師友者雖念念以教育成就為懷然須待其求我方成機感又必初筮則告方顯法之尊重其所以告之者又必契理契機而貞然後可使人人為聖為佛矣彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也山下有險即是遇險而止故名為蒙蒙之所以可亨者由有能亨人之師善以時中行教故也雖有善教必待童蒙求我者彼有感通之志然後可應如水清方可印月也初筮即告者以剛而得中故應不失機也瀆則不告者非是恐其瀆我正恐瀆蒙而有損無益也及其蒙時即以正道養之此聖人教化之功令彼亦得成聖者也象曰山下出泉蒙君子以果行育德溪澗不能留故為果行之象盈科而後進故為育德之象自既果行育德便可為師作範矣佛法釋者此依不思議境而發真正菩提心也菩提之心不可沮壞如泉之必行四弘廣被如泉之潤物初六發蒙利用刑人用說桎梏以往吝以九二上九二陽為師道以餘四陰爻為弟子初六以陰居下厥蒙雖甚而居陽位又近九二故有可發之機夫蒙昧既甚須用折伏法門故利用刑人所謂朴作教刑也然既說桎梏之後當羞愧懲艾而不出若遽有所往則吝矣象曰利用刑人以正法也以正法而朴作教刑豈瞋打之謂哉九二包蒙吉納婦吉子克家以九居二知及之仁能守之師之德也蘇眉山曰童蒙若無能為然容之則足為助拒之則所喪多矣明不可以無蒙猶子不可以無婦子而無婦不能家矣佛法釋者定慧平等自利已成故可以包容覆育群蒙而吉以此教授群蒙修行妙定名納婦吉定能生慧慧能紹隆佛種為子克家婦是定子是慧也象曰子克家剛柔接也明納婦而云子克家者以定必發慧慧必與定平等而非偏也六三勿用取女見金夫不有躬無攸利以陰居陽不中不正乃駁雜之質宜從上九正應處求其擊蒙之大鉗錘方可治病今貪九二之包容慈攝殆如女見金夫而失節者乎佛法釋者不中不正則定慧俱劣而居陽位又是好弄小聰明者且在坎體之上機械已深若使更修禪定必于禪中發起利使邪見利使一發則善根斷盡矣象曰勿用取女行不順也行不順故須惡辣鉗錘以煆煉之不可使其修定六四困蒙吝陰爻皆蒙象也初可發三可擊五可包惟四絶無明師良友則終于蒙而已可恥孰甚焉象曰困蒙之吝獨遠實也非實德之師友遠我我自獨遠于師友耳師友且奈之何哉六五童蒙吉以六居五雖大人而不失其赤子之心故為童蒙而吉蓋上親上九之嚴師下應九二之良友故也蘇眉山曰六五之位尊矣恐其不安于童蒙之分而自強于明故教之曰童蒙吉象曰童蒙之吉順以巽也學道之法順則能入設行不順則入道無從矣上九擊蒙不利為寇利禦寇陽居陰位剛而不過能以定慧之力擊破蒙昧之關者也然訓蒙之道原無實法繫綴于人所謂但有去翳法別無與明法若欲以我法授彼則是為寇若應病與藥為其解粘去縛則是禦寇也象曰利用禦寇上下順也無實法繫綴于人則三根普接契理契機故上下皆順乾下坎上需有孚光亨貞吉利涉大川養蒙之法不可欲速類彼助苗故必需其時節因緣時節若到其理自彰但貴因真果正故有孚則光亨而貞吉也始雖云需究竟能度生死大川登于大般涅槃彼岸矣彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也險在前而知須乃是剛健之德不妄動以自陷耳坎何嘗拒乾哉且坎得乾之中爻與乾合德今九五位乎天位素與乾孚則乾之利涉往必有功可無疑矣佛法釋者譬如五百由旬險難惡道名險在前智慧之力不被煩惱所陷故終能度脫而不困窮坎中一陽本即乾體喻煩惱險道之性本如來藏以此不生不滅之性為本修因則從始至終無非稱性天行之位從正因性中中流入薩婆若海故利涉大川從凡至聖而有功也象曰雲上於天需君子以飲食宴樂果行育德之後更無餘事但飲食宴樂任夫雲行雨施而已佛法釋者助道行行為飲正道慧行為食以稱性所起緣了二因莊嚴一性如雲上于天之象全性起修全修在性不藉劬勞肯綮修證故名宴樂此是善巧安心止觀止觀不二如飲食調適初九需于郊利用恆無咎溫陵郭氏云此如顏子之需佛法釋者理即位中不足以言需名字位中且宜恆以聞熏之力資其慧性未與煩惱魔軍相戰也象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉郭氏云此如孔子之需佛法釋者觀行位中既已伏惑則魔軍動矣故小有言象曰需于沙衍在中也雖小有言以吉終也九三需于泥致寇至郭氏云此如周公之需佛法釋者相似位中將渡生死大河故有以致魔軍之來而後降之象曰需于泥災在外也自我致寇敬慎不敗也災既在外故主人不迷客不得便但以願力使其來戰以顯降魔成道之力而三觀之功敬而且慎決無敗也六四需于血出自穴郭氏云此如文王之需佛法釋者魔軍敗衄超然從三界穴出而成正覺矣象曰需于血順以聽也未嘗用力降魔止是慈心三昧之力魔軍自退而菩提自成耳九五需于酒食貞吉郭氏云此如帝堯館甥之需佛法釋者魔界如即佛界如惟以定慧力莊嚴而度衆生故為需于酒食象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉郭氏曰此如仁傑之結交五虎佛法釋者不惟入佛境界亦可入魔境界還來三界廣度衆生觀三界依正因果諸法無不現現成成即是一心三觀故常為三界不請之友而三界衆生有敬之者必終吉也象曰不速之客來敬之終吉雖不當位未大失也既同流三界雖不當佛祖之位而隨類可以度生設衆生有不知而不敬者亦與遠作得度因緣而未大失也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川天在上而水就下上下之情不通所以成訟然坎本得乾中爻以為體則跡雖違而性未嘗非一也惕中則復性而吉終訟則違性而凶利見大人所以復性也不利涉大川誡其逐流而違性也佛法釋者夫善養蒙之道以圓頓止觀需之而已若煩惱習強不能無自訟之功訟者懺悔剋責改過遷善之謂也有信心而被煩惱惡業所障窒當以慚愧自惕其中而吉若悔之不已無善方便則成悔蓋而終凶宜見大人以決擇開發斷除疑悔不利涉于煩惱生死大川而終致陷沒也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也剛而無險則不必自訟險而無剛則不能自訟今處煩惱險惡窟中而慧性勇健所以有自訟改過之心也所謂有孚窒惕中吉者以剛德來復于無過之體僅取滅罪即止不過悔以成蓋也所謂終凶者悔箭入心則成大失故不可使其成也所謂利見大人者中正之德有以決疑而出罪也所謂不利涉大川者心垢未淨而入生死海中必至墮落而不出也約觀心者修慧行名見大人修禪定名涉大川需約無過之人故可習定訟約有過之人習定則發魔事也象曰天與水違行訟君子以作事謀始天亦太極水亦太極性本無違天一生水亦未嘗違而今隨虛妄相則一上一下其行相違所謂意欲潔而偏染者也秖因介爾一念不能慎始致使從性所起煩惱其習漸強而違于性故君子必慎其獨謹于一事一念之始而不使其滋延難治夫是之謂善于自訟者也佛法釋者是破法遍謂四性簡責知本無生初六不永所事小有言終吉大凡善貴剛進惡宜柔退初六柔退故為惡未成改悔亦易不過小有言而已此如佛法中作法懺也象曰不永所事訟不可長也雖小有言其辨明也九二不克訟歸而逋其邑人三百戶無眚剛而不正不能自克以至于訟然犯過既重何能無損但可逋逃處于卑約庶免災耳此如佛法中比丘犯戒退作與學沙彌者也象曰不克訟歸逋竄也自下訟上患至掇也佛法釋者自既犯戒而居下流欲以小小懺悔而復上位罪必不滅且亂法門矣六三食舊德貞厲終吉或從王事無成六三陰柔不敢為惡但謹守常規小心翼翼故得終吉然是硜硜之士恐不足以成大事也象曰食舊德從上吉也自立則不能附人則仍吉所謂倚松之葛上聳千尋也佛法釋者雖非大乘法門若開權顯實則彼所行亦即是菩薩道故必從上乘圓頓之解方吉九四不克訟復即命渝安貞吉九四亦是不正之剛故不能自克以至于訟然居乾體則改悔力強故能復歸無過而悟性命淵微之體是則反常合道猶佛法中因取相懺而悟無生者也象曰復即命渝安貞不失也九五訟元吉剛健中正有不善未嘗不知知之未嘗復行乃至小罪恆懷大懼而不敢犯大善而吉之道也佛法則性業遮業三千八萬無不清淨者矣象曰訟元吉以中正也上九或錫之鞶帶終朝三褫之過極之剛不中不正數數犯過數數改悔就改悔處薄有慚愧之衣猶如鞶帶就屢犯處更無一日清淨猶如三褫也象曰以訟受服亦不足敬也有過而改名為慚愧已不若無過之足敬矣又何必至三褫而後為恥哉此甚誡人不可輒犯過也坎下坤上師貞丈人吉無咎夫能自訟則不至于相訟矣相訟而不得其平則亂亂則必至于用師勢之不得不然亦撥亂之正道也但兵凶戰危非老成有德之丈人何以行之佛法釋者蒙而無過則需以養之蒙而有過則訟以改之但衆生煩惱過患無量故對破法門亦復無量無量對破之法名之為師亦必以正治邪也然須深知藥病因緣應病與藥猶如老將善知方略善知通塞方可吉而無咎不然法不逗機藥不治病未有不反為害者也彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣用衆以正謂六五專任九二為將統御群陰此王者之道也兵者不得已而用之猶藥治病故名為毒天下佛法釋者師是衆多法門貞是出世正印也能以衆多法門正無量邪惑則自利利他可以為法王而統治法界矣剛中則定慧莊嚴隨感而應雖行于生死險道而未嘗不順涅槃以此圓頓妙藥如毒鼓毒乳毒于天下而九界之民皆悉從之吉又何咎矣象曰地中有水師君子以容民畜衆地中有水水載地也君子之德猶如水故能容陰民而畜坤衆容民即所以畜衆未有戕民以養兵者也為君將者奈何弗深思哉佛法釋者一切諸法中悉有安樂性亦悉具對治法如地中有水之象故君子了知八萬四千塵勞門即是八萬四千法門而不執一法不廢一法也此是善識通塞如撫之則即民即兵失之則為賊為寇初六師出以律否臧凶大司馬九伐之法名之為律師出苟不以律縱令徼幸成功然其利近其禍遠其獲小其喪大故凶孟子所謂一戰勝齊遂有南陽然且不可也佛法釋者初機對治之法無過大小乘律若違律制則身口意皆悉不善而凶矣象曰師出以律失律凶也九二在師中吉無咎王三錫命以大將才德膺賢主專任故但有吉而無咎也陳旻昭曰九二以一陽而五陰皆為所用不幾為權臣乎故曰在師中吉以見在朝則不可也佛法釋者有定之慧遍用一切法門自治治他故吉且無咎而法王授記之矣象曰在師中吉承天寵也王三錫命懷萬邦也自古未有無主于內而大將能立功于外者九二之吉承六五之寵故也為天下得人者謂之仁故三錫命于賢將即所以懷萬邦佛法釋者承天行而為聖行梵行等所謂一心中五行故為法王所寵而授記以廣化萬邦也六三師或輿尸凶不中不正才弱志剛每戰必敗不言可知佛法釋者不知四悉因緣而妄用對治反致損傷自他慧命象曰師或輿尸大無功也六四師左次無咎雖柔弱而得正不敢行險僥幸以自取敗故無咎也佛法釋者此如宣律師不敢妄號大乘象曰左次無咎未失常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶柔中之主當此用師之時仗義執言以討有罪固無過也但恐其多疑而不專任九二之長子故誡以弟子輿尸雖正亦凶佛法釋者田中有禽妨害良禾喻心有煩惱妨害道芽也利執言者宜看經教以照了之也然看經之法依義不依語依了義不依不了義依智不依識若能深求經中義理隨文入觀則如長子帥師若但著文字不依實義則如弟子輿尸雖貞亦凶此如今時教家象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用方師之始即以失律凶為誡矣今師終定功又誡小人勿用夫小人必徼幸以取功者耳蘇氏云聖人用師其始不求苟勝故其終可以正功佛法釋者正當用對治時或順治或逆治于通起塞即塞成通事非一概今對治功畢入第一義悉檀將欲開國承家設大小兩乘教法以化衆生止用善法不用惡法倘不簡邪存正簡愛見而示三印一印則佛法與外道幾無辨矣象曰大君有命以正功也小人勿用必亂邦也坤下坎上比吉原筮元永貞無咎不寧方來後夫凶用師既畢踐天位而天下歸之名比比未有不吉者也然聖人用師之初心但為救民于水火非貪天下之富貴今功成衆服原須細自筮審果與元初心相合而永貞乃無咎耳夫如是則萬國歸化而不寧方來彼負固不服者但自取其凶矣佛法釋者善用對破法門則成佛作祖九界歸依名比又觀心釋者既知對破通塞要須道品調適七科三十七品相屬相連名比仍須觀所修行要與不生不滅本性相應名原筮元永貞無咎所謂圓四念處全修在性者也一切正勤根力等無不次第相從名不寧方來一切愛見煩惱不順正法門者則永被摧壞而凶矣彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比則必吉故非衍文餘皆可知佛法釋者約人則九界為下順從佛界為輔約法則行行為下順從慧行為輔剛中故能全性起修全修在性上下應者約人則十界同稟道化約法則七科皆會圓慧也其道窮者約人則魔外不順佛化而墮落約法則愛見不順正法而被簡也象曰地上有水比先王以建萬國親諸侯建萬國親諸侯即所謂開國承家者也佛法釋者地如境諦水如觀慧地如寂光水如三土差別皆比之象也約化他則建三土剎網令諸菩薩轉相傳化約觀心則立陰界入等一切境以為發起觀慧之地觀慧名諸侯也此是道品調適謂七科三十七品相比無間初六有孚比之無咎有孚盈缶終來有他吉柔順之民率先歸附有孚而無咎矣下賤之位雖如缶器而居陽位有君子之德焉故為有孚盈缶將來必得徵庸有他吉也約佛法者初六如人道六二如欲天六三如魔天六四如禪天九五如佛為法王上六如無想及非非想天今人道易趣菩提故有他吉約觀心者初六如藏教法門六二如通教法門六三如愛見法門六四如別教法門九五如圓教真正法門上六如撥無因果邪空法門今藏教正因緣境開之即是妙諦故有他吉象曰比之初六有他吉也六二比之自內貞吉柔順中正之臣上應陽剛中正之君中心比之故正而吉也佛法釋者欲天有福亦復有慧但須內修深定又通教界內巧度與圓教全事即理相同但須以內通外象曰比之自內不自失也六三比之匪人不中不正居下之上又無陽剛師友以諫諍之故曰比之匪人佛法釋者魔波旬無一念之善又愛見決不與佛法相應象曰比之匪人不亦傷乎六四外比之貞吉柔而得正近于聖君吉之道也但非其應故名外比誡之以貞佛法釋者色界具諸禪定但須發菩提心外修一切差別智門又別教為界外拙度宜以圓融正觀接之象曰外比于賢以從上也九五既有賢德又居君位四外比之理所當然亦分所當然矣九五顯比王用三驅失前禽邑人不誡吉陽剛中正為天下之共主故名顯比而聖人初無意于要結人心也如成湯于四面之網解其三面任彼禽獸驅走雖失前禽邑人亦知王意而不警誡此所謂有天下而不與吉之道也佛法釋者法王出世如杲日當空名顯比三輪施化又初中後三語誘度又令種熟脫三世得益名王用三驅于無緣人善用大捨三昧即諸佛弟子亦不強化無緣之人名失前禽邑人不誡觀心釋者實慧開發如赫日麗天名顯比一心三觀又轉接會前三教名王用三驅覺意三昧隨起隨觀不怕念起只怕覺遲一覺則歸于正念不以前念之非介懷名失前禽邑人不誡象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也上六比之無首凶陰柔無德反據聖主之上衆叛親離不足以為人首矣佛法釋者窮空輪轉不能見佛聞法假饒八萬劫不免落空亡觀心釋者豁達空撥因果自謂毗盧頂上行悟得威音王那畔又那畔實不與真實宗乘相應業識茫茫無本可據生死到來便如落湯螃蟹也象曰比之無首無所終也從屯至此六卦皆有坎焉坎得乾之中爻蓋中道妙慧也其德為陷為險夫煩惱大海與薩婆若海豈真有二性哉且從古及今無不生于憂患死于安樂故四諦以苦居初佛稱八苦為師苦則悚惕而不安悚惕不安則煩惱海動而種智現前矣聖人序卦之旨不亦甚深也與乾下巽上小畜亨密雲不雨自我西郊畜阻滯也又讀如蓄養也遇阻滯之境不怨不尤惟自養以消之故亨然不可求速效也約世法則如垂衣裳而天下治有苗弗格約佛法則如大集會中魔王未順約觀心則如道品調適之後無始事障偏強阻滯觀慧不能克證然聖人御世不忌頑民如來化度不嫌魔侶觀心勝進豈畏夙障譬諸拳石不礙車輪又譬鐘擊則鳴刀磨則利豬揩金山益其光彩霜雪相加松柏增秀故亨也然當此時雖不足畏亦不可輕于取功須如密雲不雨自我西郊直俟陰陽之和而後雨耳蓋凡雲起于東者易雨起于西者難雨今不貴取功之易而貴奏效之遲也楊慈湖曰畜有包畜之義故云畜君何尤此卦六四以柔得近君之位而上下諸陽皆應之是以小畜大以臣畜君故曰小畜其理亦通其六爻皆約臣畜君說亦妙陳旻昭曰小畜者以臣畜君如文王之畜紂也亨者冀紂改過自新望之之辭也密雲不雨自我西郊者言秖因自我西郊故不能雨怨己之德不能格君乃自責之辭猶所云臣罪當誅天王聖明也六四則是出羑里時九五則是三分天下有二以服事殷之時上九則是武王伐紂之時故施己行而既雨然以臣伐君冒萬古不韙之名故曰君子征凶彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也既畜矣而云小者以在我之柔德既正又有上下之剛應之所以一切外難不足擾我鎮定剛決之德反藉此以小自養也健則無物欲之邪巽則無躁動之失剛中則慧與定俱故其志得行而亨也雲雖密而尚往則修德不妨益進自西郊而施未行則取效不可欲速象曰風行天上小畜君子以懿文德鼓萬物者莫妙于風懿文德猶所謂遠人不服則修文德以來之舞干羽于兩階而有苗格即是其驗故曰君子之德風也觀心則遍用事六度等對治助開名懿文德初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿說輻夫妻反目象曰夫妻反目不能正室也六四有孚血去惕出無咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也時當小畜六爻皆有修文德以來遠人之任者也初九剛而得正克己復禮天下歸之故吉九二剛中與初同復故亦得吉九三過剛不中恃力服人人偏不服故輿說輻而不能行尚不可以齊家況可服遠人乎六四柔而得正能用上賢以成其功故惕出而無咎九五陽剛中正化被無疆故能富以其鄰上九剛而不過又居小畜之終如密雲之久而既雨遠近皆得安處太平此乃懿尚文德至于積滿故能如此然在彼臣婦宜守貞而時時自危不可恃君有優容之德而失其分世道至此如月幾望可謂圓滿無缺矣其在君子更不宜窮兵黷武以取凶也佛法觀心釋者修正道時或有事障力強須用對治助開雖用助開仍以正道觀慧為主初九正智力強故事障不能為害而復自道九二定慧得中故能化彼事障反為我助而不自失九三恃其乾慧故為事障所礙而定慧兩傷六四善用正定以發巧慧故血去而惕出九五中正妙慧體障即德故能富以其鄰上九定慧平等故事障釋然解脫如既雨既處而修德有功夫事障因對助而排脫必有一番輕安境界現前名之為婦而此輕安不可味著味著則生上慢自謂上同極聖為月幾望若信此以往則反成大妄語之凶矣可不戒乎兌下乾上履虎尾不嘻人亨約世道則頑民既格上下定而為履以說應乾故不嘻人約佛法則魔王歸順化道行而可履以慈攝暴故不嘻人約觀心則對治之後須明識次位而成真造實履觀心即佛如履虎尾不起上慢如不嘻人亨也彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也履之道莫善于柔柔能勝剛弱能勝強故善履者雖履虎尾亦不嘻人不善履者雖履平地猶傷其足此卦以說應乾說即柔順之謂臣有柔順之德乃能使彼剛健之主中正光明履帝位而不疚否則不免于夬履貞厲矣佛法釋者以定發慧以修合性以始覺而欲上契本覺以凡學聖皆名為柔履剛得法喜名說悟理性名應乾不起上慢進趣正位則能以修合性處于法王尊位如九五也象曰上天下澤履君子以辨上下定民志佛法釋者深知即而常六道不浪階是為辨上下定民志初九素履往無咎象曰素履之往獨行願也此如伯夷叔齊之履佛法釋者以正慧力深知無位次之位次以此而往則不起上慢矣九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也此如柳下惠蘧伯玉之履佛法釋者中道定慧進趣佛果而不自滿足潛修密證不求人知故吉六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也此如項羽董卓之履佛法釋者知性德而不知修德如眇其一目尚慧行而不尚行行如跛其一足自謂能視而實不見正法身也自謂能履而實不能到彼岸也高談佛性反被佛性二字所害本是鹵莽武人妄稱祖師其不至于墮地獄者鮮矣問六三為悅之主彖辭讚其應乾而亨爻胡貶之甚也答彖約兌之全體而言爻約六三不與初二相合自信自任而言九四履虎尾訴訴終吉象曰訴訴終吉志行也此如周公吐握勤勞之履佛法釋者定慧相濟雖未即證中道然有進而無退矣九五夬履貞厲象曰夬履貞厲位正當也此如湯武反身之履亦如堯舜危微允執之履或云此是誡辭恐其為漢武也須虛心以應柔悅之臣乃不疚而光明耳佛法釋者剛健中正決定證于佛性從此增道損生出沒化物不取涅槃以自安隱矣上九視履考祥其旋元吉象曰元吉在上大有慶也此如堯舜既薦舜禹于天舜禹攝政堯舜端拱無為之履佛法釋者果徹因源萬善圓滿復吾本有之性稱吾發覺初心故大吉也弟子戴從暹捐資刻
