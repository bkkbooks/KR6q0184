body:
  text: 北天目道人蕅益智旭著繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此直明聖人作易包天地萬物之理而為內聖外王之學也蓋自八卦成列而天地萬物之象已皆在其中矣因而重之而天地萬物之交亦皆在其中矣剛柔必互具剛柔而天地事物之變又皆在其中矣繫辭焉而命之而吾人惠迪從逆之動又皆在其中矣夫吉凶悔吝皆由一念之動而生者也一念之動必有剛柔以立其本一剛一柔必有變通以趨于時得其變通之正者則勝不得變通之正者則負故吉之與凶唯以貞勝者也此易中示人以聖賢學問全體皆法天地事理非有一毫勉強是故天地之道一健一順各有盈虛消長之不同皆以變通之正示人者也日月之道一晝一夜亦有中昃盈缺之不定皆以變通之正為明者也天下之動萬別千差尤為至賾實不可亂乃歸極于變通之一正者也夫乾之變現于六十四卦雖有一百九十二爻無不確然示人以易矣夫坤之變現于六十四卦雖亦一百九十二爻無不隤然示人以簡矣此易簡之理正所謂千變萬化而貞夫一者也爻即效此易簡象即像此易簡苟吾心之爻象一動乎內則事物之吉凶即現乎外吉可變凶凶可變吉得此善變之方乃見裁成輔相功業而聖人所以教人之真情則全見乎卦爻之辭所應深玩細觀者也是故生生之謂易而天地之大德不過此無盡之生理耳聖人體天立極其所以濟民無疆者則在位耳何以守位則必全體天地之德純一不已之仁耳仁則物我一體矣庶必加之以富故曰財富必加之以教故曰義此內聖外王之學一取法于天地事物者也古者包犧氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情本法天地身物以作八卦既作八卦遂能通神明之德于一念類萬物之情于一身作結繩而為網罟以佃以漁蓋取諸離驅鳥獸魚蛇于山澤使民得稼穡者乃深明物各宜麗其所者也故取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益魚鳥之害既除田疇之利方起日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑農事既備商賈隨興神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤通變神化全體乾坤之德所謂自強不息厚德載物者也刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙服牛乘馬引重致遠以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫坤如重門震如擊柝暴客溫陵郭氏以為初至之客甚通蓋使動者得隨地而安也斷木為杵掘木為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌由上明故下悅所謂若大旱之望雨者是也上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯震木之下別有天焉宮室之象也古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過以巽木入于澤穴之中上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬以書契代語言遂令之與天同久是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也由此觀之所謂易者不過示人以象耳而象也者則是事物之克肖者也所謂彖者則是事物之材質也所謂爻者則是效天下之動者也是故得有吉凶悔吝之生著也夫動則必有吉凶悔吝之生著君子可不思所以慎其動乎陽卦多陰陰卦多陽其故何也陽卦奇陰卦耦其德行何也陽一君而二民君子之道也陰二君而一民小人之道也欲慎其動當辨君民之分于身心孟子所謂從其大體為大人從其小體為小人也觀于陽卦多陰陰卦多陽可以悟矣奇者天君獨秉乾綱之謂耦者意念夾帶情欲之謂陽一為君而兩陰之二為民以從之所謂志一則動氣故是君子之道陰二為君而兩陽之一反為民以從之所謂氣一則動志故是小人之道易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也夫心之官則思而不知思本無可思也能思無思之妙則無思無慮而殊塗同歸能達無思之思則雖一致而具足百慮思而無思所謂退藏于密屈之至也無思而思所謂感而遂通信之至也屈乃所以為信信乃所以為屈觀師所謂往復無際動靜一源肇公所謂其入離其出微皆此理耳法界離微之道豈思議之可及故曰未之或知苟證此思即無思無思而思之妙則可以窮神知化矣殊途同歸一致百慮皆所謂一君二民之道也易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶妄計心外有法而欲求其故所謂困于石也不知萬法唯心而執有差別所謂據于蒺藜也無慧故名辱無定故身危喪法身慧命故死期將至永無法喜故不見其妻此二君一民之道也易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而動者也禽喻惑器喻戒定人喻智慧解之上六獨得其正而居震體如人有慧故能以戒定斷惑也宗門云一兔橫身當古道蒼鷹才見便生擒亦是此意子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶夫戒定之器必欲其成障戒障定之惡必宜急去勿輕小罪以為無殃懲之于小則無咎釀之于終則必凶修心者所宜時時自省自改也子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而家國可保也易曰其亡其亡繫于苞桑自有因過而憬悟以進德者自有無過而托大以退道者故君子雖未必有過尤宜乾乾惕厲如否之九五可也安其位是德保其存是知有其治是力子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也欲居尊位莫若培德欲作大謀莫若拓知欲任重事莫若充力德是法身知是般若力是解脫三者缺一決不可以自利利他子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望此所謂德厚而位自尊者也十法界不出一心名之為幾知此妙幾則上合十方諸佛本妙覺心與佛如來同一慈力故上交不諂下合十方六道一切衆生與諸衆生同一悲仰故下交不瀆稱性所起始覺必能合乎本覺故為吉之先見子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祇悔元吉此所謂知大而謀自遠者也欲證知幾之神須修不遠之復天地絪縕萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也此所謂力大而任可重者也既有不遠之復須有致一之功男慧女定不使偏枯乃可以成萬德矣子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶惟仁可以安身惟知可以易語惟力可以定交仁是斷德知是智德力是利他恩德有此三者不求益而自益今危以動則德薄懼以語則知小無交而求則力小不亦傷乎子曰乾坤其易之門耶乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意耶夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨遠其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報有易理即有乾坤由乾坤即通易理如城必有門門必通城蓋乾是陽物在天曰陽在地曰剛在人曰知坤是陰物在天曰陰在地曰柔在人曰仁而陰不徒陰陰必具陽陽不徒陽陽必具陰故陰陽合德而剛柔有體即天道而為地道即地道而為人道即人道而體天地之撰通神明之德易理既然易書亦爾所以六十四卦之名雜而不越雜謂大小善惡邪正吉凶之不同不越謂總不外于陰陽二物之德然使上古之世有善無惡有正無邪則此書亦可無作今惟以衰世既有善惡邪正之殊欲即此善惡邪正仍歸于非善非惡之至善非邪非正之至正所以方作易耳是以易之為書能彰往因能察來果能以顯事會歸微理能使幽機闡成明象故以此開示天下萬世名無不當物無不辨言無不正辭無不斷也一卦止有一名故小一名具含衆義故大包盡內聖外王之學故旨遠辭不煩而意已達故文言偏而意無不圓故曲而中事定而凡情難測故肆而隱因決疑以明失得之報遂令民之蚩蚩亦可避失而趨得也易之興也其于中古乎作易者其有憂患乎言其有與民同患之深心也是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也心慈而力健故為德基內止而外順故為德柄天君為主故是德本動而深入故德可固譬如為山故為德修鼓舞振作故為德裕積而能流故為德辨入而能出故為德地遍入一切故為德制素位而行之謂履蘊高于卑之謂謙為仁由己之謂復動而有常之謂恆去惡淨盡之謂損積善圓滿之謂益歷境鍊心之謂困有源不窮之謂井無入不得之謂巽其實六十四卦無非與民同患內聖外王之學且就九卦指點者以其尤為明顯故也履和而至謙尊而光復小而辨于物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱和即兌慈至即乾健尊即山高光即坤順小即一陽而為衆陰之主入于群動故雜而不厭譬如為山方覆一簣故先難而後易鼓舞振作則自然長裕窮即澤之止水通即坎之流水由積故流猶所謂隱居求志而行義達道也井不動而澤及于物巽能遍入一切事理深奧之域故稱而隱履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權此正明九卦之用如此以此而為內聖外王之學所以能歸非善非惡之至善非邪非正之至正而聖人與民同患之線索亦盡露于此矣按此九卦亦即是以餘九法助成不思議觀之旨蓋易即不思議境之與觀也作易者有與民同患之心更設九法以接三根履是真正發菩提心上求下化謙是善巧安心止觀地中有山止中有觀也復是破法遍一陽動于五陰之下也恆是識通塞能動能入也損是道品調適能除惑也益是對治助開成事理二善也困是知次位如水有流止不可執性廢修也井是能安忍謂不動而潤物也巽是離法愛謂深入于正性也易之為書也不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明于憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行易書雖具陳天地事物之理而其實切近于日用之間故不為遠雖近在日用之間而初無死法故為道屢遷隨吾人一位一事中具有十法界之變化故變動不拘周流六虛界界互具法法互融故上下無常剛柔相易所以法法不容執著而唯變所適唯其一界出生十界十界趣入一界雖至變而各有其度故深明外內之機使知競業于一念之微又明示憂患之道及所以當憂當患之故能令讀是書者雖無師保而如臨父母可謂愛之深教之至矣是以善讀易者初但循其卦爻之辭而深度其所示之法雖云不可為典要實有一定不易之典常也然苟非其人安能讀易即悟易理全以易理而為躬行實踐自利利他之妙行哉易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利遠者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪夫離卻始終之質則無時物離卻時物亦無始終故學易者須得其大體盡其曲折乃可謂居觀象動觀變也然雖發心畢竟二不別而初則難知上則易知以二心中先心難故既發心已終當克果一本一末法如是故是以初辭擬之卒以此而成終顧為學者又不可徒恃初心已也若夫遍涉于萬事萬物之雜途而撰成其德行及深辨修行之是非則非其中之四爻不備夫事物雖有萬殊是非雖似紛糅豈真難辨也哉噫亦要歸于操存捨亡迪吉逆凶之理則所以自居者斷可知矣知者觀于彖辭提綱挈領以定大局則雖時物相雜而是非可辨思過半矣何謂是之與非且如二與四同是陰也而譽懼不同則遠近之分也三與五同是陽也而凶功不同則貴賤之分也柔宜近不宜遠四之位近君故雖多懼而其要無咎二之位遠君但用柔中故多譽也剛宜貴不宜賤五之位貴上位必須剛德乃克勝也此約時位如此若約修證者知慧宜高遠行履宜切實穩當故知內聖外王之學皆于一卦六爻中備之易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉上明質與時物且約人道言之而實三才之道無不備焉且如三畫便是三才而三才決非偏枯單獨之理當知一一才中還具兩才事理故象之以六畫而六者非他乃表一一畫中又各還具三才之道不但初二為地三四為人五上為天而已矣是故三才各有變動之道名之曰爻爻有初終中間之等故名曰物物又互相夾雜不一故名曰文文有當與不當故吉凶從此而生而所以趨吉避凶裁成輔相于天地者則其權獨歸于學易之君子矣易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也此正明學易之君子于末世中而成盛德自既挽凶為吉又能中興易道以昭示于天下萬世也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能神謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生遠近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈夫易道雖甚大而乾坤足以盡之乾易而知險坤簡而知阻惟其知險故險亦成易否則易便成險矣惟其知阻故阻亦成簡否則簡亦成阻矣悟此簡易險阻之理于心故悅知此挽回險阻以成簡易之不可草率故其慮研既悅其理又研其慮則知行合一全體乾坤之德遂可以定吉凶成亹亹也是故世間之變化云為舉凡吉事無不有祥聖人于此即象事而可以知器即占事而可以知來矣由此觀之天地一設其位易理即已昭著于中聖人不過即此以成能耳然其易理甚深奧亦甚平常以言其深奧則神謀鬼謀終不能測以言其平常則百姓何嘗不與能哉夫百姓何以與能即彼八卦未嘗不以象告即彼爻彖未嘗不以情言即彼剛柔雜居而吉凶未嘗不可見也是故易卦之變動不過以百姓之利言也易辭之吉凶不過以百姓之情令其遷善也是故百姓之愛惡相攻而吉凶生遠近相取而悔吝生情僞相感而利害生此百姓之情即易中卦爻之情也凡易之情近而相得則吉不相得則凶或害之悔且吝矣而此相得不相得之情能致吉凶悔吝者豈他人強與之哉試觀將叛者其辭慚乃至失其守者其辭屈可見一切吉凶禍福無不出于自心心外更無別法此易理所以雖至幽深實不出于百姓日用事物之間故亦可與能也說卦傳昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數觀變于陰陽而立卦發揮于剛柔而生爻和順于道德而理于義窮理盡性以至于命夫因蓍有數因數立卦因卦有爻此人所共知也借此以和順道德窮理盡性此人所未必知也且蓍之生也實由聖人幽贊于神明而生之數之倚也實參兩于天地卦之立也實觀變于陰陽爻之生也實發揮于剛柔此尤人所不知也惟其蓍從聖人幽贊生乃至爻從發揮剛柔生故即此可以和順道德使進修之義條理有章既得進修之義則理可窮性可盡而天命自我立矣作易之旨顧不深與昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也吾人自無始以來迷性命而順生死所以從一生二從二生四乃至萬有之不同今聖人作易將以逆生死流而順性命之理是以即彼自心妄現之天立其道曰陰與陽可見天不偏于陽還具易之全理所謂隨緣不變也即彼自心妄現之地立其道曰柔與剛可見地不偏于柔亦具易之全理亦隨緣不變也即彼自心妄計之人立其道曰仁與義仁則同地義則同天可見人非天地所生亦具易之全理而隨緣常不變也天具地人之兩地具天人之兩人具天地之兩故易書中以六畫成卦而表示之于陰陽中又分陰陽于柔剛中互用柔剛故易書中以六位成章而昭顯之也何謂六位成章謂天地以定其位則凡陽皆屬天凡陰皆屬地矣然山澤未始不通氣雷風未始不相薄水火相反而又未始相射也是以八卦相錯而世間文章成矣即此八卦相錯之文章若從其從一生二從二生四從四生八之往事者則是順生死流若知其八止是四四止是二二止是一一本無一之來事者則是逆生死流逆生死流則是順性命理是故作易之本意其妙在逆數也謂起震至乾乾惟一陽即表反本還源之象耳雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之先以定動猶如雷後以慧拔猶如風法性之水如雨智慧之照如日妙三昧為艮止妙總持為兌悅果上智德為乾君果上斷德為坤藏帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮帝者吾人一念之天君也不憤不啓不悱不發故出乎震既發出生死心須入法門以齊其三業三業既齊須以智慧之明見一切法既有智慧須加躬行智行兩備則得法喜樂又可說法度人說法則降魔為戰戰勝則賞賜田宅乃至解髻珠以勞之既得授記則成道而登涅槃山矣萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮萬物皆出乎震況為聖為賢成佛作祖獨不出乎震邪萬物皆齊乎巽而三業可弗齊邪萬物皆相見乎離而智慧可弗明邪萬物皆養于坤而躬行可弗履踐實地邪萬物皆說乎兌而可無法喜以自娛可無法音以令他喜悅邪陰陽相薄即表魔佛攸分萬物所歸正是勞賞有功之意自既成終則能成物之始自覺覺他之謂也約觀心者一念發心為帝一切諸心心所隨之乃至三千性相百界千如無不隨現前一念之心而出入也神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也夫神不即萬物亦不離萬物故曰妙萬物也一念菩提心能動無邊生死大海震之象也三觀破惑無不遍巽之象也慧火乾枯惑業苦水離之象也法喜辨才自利利他兌之象也法性理水潤澤一切坎之象也首楞嚴三昧究竟堅固艮之象也凡此皆乾坤之妙用也即八卦而非八卦故曰神也乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也健則可以體道順則可以致道動則可以趨道入則可以造道陷則可以養道麗則可以不違乎道止則可以安道說則可以行道此八卦之德也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊讀此方知蠢動含靈皆有佛性雖一物各象一卦而卦卦各有太極全德則馬牛等亦各有太極全德矣乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口若約我一身言之則八體各象一卦然卦卦有太極全德則體體亦各有太極全德矣又體體各有太極全德則亦各有八卦全能也又馬牛等各有首腹及與口等則馬牛等各具八卦全能尤可知也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女只此衆物各體之八卦即是天地男女之八卦可見小中現大大中現小法法平等法法互具真華嚴事事無礙法界也佛法釋者方便為父智度為母三觀皆能破一切法為長男三止皆能息一切法為長女三觀皆能統一切法為中男三止皆能統一切法為中女三觀皆能達一切法為少男三止皆能停一切法為少女乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其于人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于輿也為多眚為通為月為盜其于木也為堅多心離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其于木也為科上槁艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔啄之屬其于木也為堅多節兌為澤為少女為巫為口舌為毀折為附決其于地也為剛鹵為妾為羊此廣八卦一章尤見易理之鋪天匝地不間精粗不分貴賤不論有情無情禪門所謂青青翠竹總是真如鬱鬱黃花無非般若又云牆壁瓦礫皆是如來清淨法身又云成佛作祖猶帶汙名戴角披毛推居上位皆是此意前云乾健也坤順也乃至兌說也而此健等八德則能具造十界且如健之善者則為天為君其不善者則為瘠為駁順之善者則為地為母其不善者則為吝為黑下之六卦無不皆然可見不變之理常自隨緣習相遠也然瘠駁等仍是健德吝黑等仍是順德可見隨緣之習理元不變性相近也若以不變之體隨隨緣之用則世間但有天圜乃至木果等可指陳耳安得別有所謂乾故大佛頂經云無是見者若以隨緣之用歸不變之體則惟是一乾健之德耳豈更有天圜乃至木果之差別哉故大佛頂經云無非見者于此會得方知孔子道脈除顏子一人之外斷斷無有能會悟者故再歎曰今也則亡此中具有依正因果善惡無記煩惱業苦等一切諸法而文章錯綜變化使後世儒者無處可討線索真大聖人手筆非子夏所能措一字也歐陽腐儒乃疑非聖人所作陋矣陋矣序卦傳有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷于外者必反其家故受之以家人家道窮必乖故受之以暌暌者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兌兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉序卦一傳亦可作世間流轉門說亦可作功夫還滅門說亦可作法界緣起門說亦可作設化利生門說在儒則內聖外王之學在釋則自利利他之訣也雜卦傳剛柔合德憂樂相關與求互換見雜相循起止盛衰之變態乃至窮通消長之遞乘世法佛法無不皆然自治治人其道咸爾而錯雜說之以盡上文九翼中未盡之旨令人學此易者磕著砰著無不在易理中也筆端真有化工之妙非大聖不能有此乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著臨有能臨所臨以卦言之陽臨陰也以爻言之上臨下也觀有觀示觀瞻二陽觀示四陰則陽為能示陰為所示也四陰觀瞻二陽則陰為能瞻陽為所瞻也建侯而利居貞故見而不失其居包蒙而子克家故雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也損下益上為衰之始損上益下為盛之始時無實法而包容萬事萬物故大畜須約時言所謂多識前言往行以畜其德三大阿僧祇劫修行者是也自恃無妄則便成災所謂唯聖罔念作狂又復道箇如如早已變了萃聚而升不來也謙輕而豫怠也勞謙反得輕安豫悅反成懈怠修德者所應知噬嗑食也賁無色也有間隔而可食無采色為真賁故違境不足懼文采不足眩也兌見而巽伏也欲說法者還須入定欲達道者先須求志隨無故也蠱則飭也隨不宜無事生事蠱不妨隨壞隨修剝爛也復反也晉晝也明夷誅也爛則必反晝則必誅禍兮福所乘福兮禍所乘學易者所應觀象玩辭觀變玩占者也井通而困相遇也井不動而常通困雖窮而相遇此示人以自守之要道也咸速也恆久也速即感而遂通久即寂然不動斯為定慧之道渙離也節止也解緩也蹇難也暌外也家人內也否泰反其類也有離必有止有緩必有難有外必有內有泰必有否有否必有泰類相反而必相乘學易者不可不知大壯則止遁則退也壯即宜止遁即宜退皆思患豫防之學大有衆也同人親也革去故也鼎取新也衆必相親相親必革弊而日新其德小過過也中孚信也有過不妨相規相規乃可相信豐多故親寡旅也豐必多故旅必寡親素位而行存乎其人離上而坎下也智火高照萬法定水深澄性海小畜寡也履不處也但懿文德則其道寡雖辨定分與時變通而無定局需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也不進乃可進不親乃可親大不可過所以誡盈柔能勝剛所以成遇定必須慧故女待男養正則吉故須觀頤已定者不必言但當謀其未定者耳終則有始窮則思通凡此皆言外之旨象中之意也夬決也剛決柔也君子道長小人道憂也上云乾剛坤柔則剛柔乃二卦之德豈可以剛決柔使天下有乾無坤其可乎哉且立天之道曰陰與陽則天亦未嘗無陰也立地之道曰柔與剛則地亦未嘗無剛也今所謂剛決柔者但令以君子之剛而決小人之柔則小人可化為君子而君子道長設使以小人之剛而決君子之柔則君子被害而小人亦無以自立必終至于憂矣所以性善性惡俱不可斷而修善須滿修惡須盡也問何謂君子之剛答智慧是也何謂君子之柔答慈悲是也何謂小人之剛答瞋慢邪見是也何謂小人之柔答貪欲癡疑是也噫讀此一章尤知宣聖實承靈山密囑先來此處度生者矣不然何其微言奧旨深合于一乘若此也思之佩之易解跋憶曩歲幻遊溫陵結冬月臺有郭氏子來問易義遂舉筆屬稿先成繫辭等五傳次成上經而下經解未及半偶應紫雲法華之請旋置高閣屈指忽越三載半矣今春應留都請兵阻石城聊就濟生庵度夏日長無事為二三子商究大乘止觀法門復以餘力拈示易學始竟前稿嗟嗟從閩至吳地不過三千餘里從辛巳冬至今夏時不過一千二百餘日乃世事幻夢蓋不啻萬別千差交易耶變易耶至于歷盡萬別千差世事時地俱易而不易者依然如故吾是以知日月稽天而不歷江河競注而不流肇公非欺我也得其不易者以應其至易觀其至易者以驗其不易常與無常二鳥雙遊吾安知文王之于羑里周公之被流言孔子之息機于周流而韋編三為之絶不同感于斯旨耶豫愧無三聖之德之學而竊類三聖與民同患之時故閣筆而復為之跋時乙酉閏六月二十九日也北天目道人古吳蕅益智旭書弟子恆心募刻繫辭傳曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此河圖之數也解現繫辭上傳中此先天之數除中五天地生數以為太極本位用餘五十為揲蓍之策也五位相得者一得五而為六二得五而為七三得五而為八四得五而為九中得一二三四而為十也各有合者一合六二合七三合八四合九五合十也一與九為十二與八為十三與七為十四與六為十一二三四為十共成五十而中之五點每點含十故以中五為本數也然雖先天之數亦含後天八卦之用且如一六生水故坎居正北二七生火故離居正南三八生木故震居正東四九生金故兌居正西五十生土故土仍居中乾寄位於西北者陽位陽數之間也坤寄位於西南者陰數陰位之盡也陰陽互結而為山故艮居東北陰陽互鼓而為風故巽居東南約出世法者一是地獄之惡六是天道之善為善惡一對二是畜生之惑七是聲聞之解為解惑一對三是餓鬼之罪苦八是支佛之福田為罪福一對四是修羅之瞋恚九是菩薩之慈悲為瞋慈一對五是人道之雜十是佛界之純為純雜一對又約十度修德者一是布施六是般若此二為福慧之主如地生成萬物故居下二是持戒七是方便此二為教化之首如天普覆萬物故居上三是忍辱八是大願此能出生一切善法故居左四是精進九是十力此能成就一切善法故居右五是禪定十是種智此能統御一切諸法故居中實則界界互具度度互攝蓋世間之數以一為始以十為終華嚴以十表無盡當知始終不出一心一塵一剎那也大禹因洛書而作九疇今以一三五七九居四方及中央正位以二四六八居四維偏位又隱其十正表陽德為政而陰德輔之在人則為知及仁守之學智巧聖力之象也左右前後縱橫斜直視之皆得十五之數以表位位法法之中皆具天地之全體滿數非分天地以為諸數也物物一太極於此可見約出世法則九界皆即佛界故不別立佛界之十又九波羅蜜皆即種智故不別立種智之十蓋凡數法若至於十便是大一數故數於此終即於此始故繫辭傳曰易有太極是生兩儀兩儀生四象四象生八卦太極非動非靜雙照動靜故必具乎陰陽陽亦太極陰亦太極故皆非動非靜雙照動靜還具陰陽而成四象四象亦皆即是太極所以皆亦非動非靜雙照動靜還具陰陽而成八卦然則八卦只是四象四象只是陰陽陰陽只是太極太極本無實法故能立一切法耳若從一生二從二生四從四生八從八生六十四等是為順數若從六十四溯至八八溯至四四溯至二二溯至一一亦本無實法是為逆數順數則是流轉門逆數則是還滅門流轉從陰陽二畫出還滅從陰陽二畫入故曰乾坤其易之門聖人作易要人即流轉而悟還滅超脫生死輪回故曰易逆數也先天八卦約體言之乾南表天坤北表地離東表日坎西表月震居東北動之初也兌居東南海之象也巽居西南入之初也艮居西北山之象也須彌在此方視之則居西北日月星辰至西北皆為須彌腰所掩故妄計天缺西北也隨拈一陰一陽必還具一陰一陽故六重之而成六十四卦其實卦卦無非太極全體故得為四千九十六卦也約一天下亦以此卦圖而分布之約一省一府一縣亦各以此卦圖而分布之近約一宅亦以此卦圖而分布之即單約一房一坐具地亦以此卦圖而分布之大不礙小小不礙大大亦只是六十四卦小亦全具六十四卦一時一刻亦有此六十四卦亙古亙今亦只此六十四卦若向此處悟得便入華嚴事事無礙法界故李長者借此以明華藏世界不然豈令福建在南則有乾無坤燕都在北則有坤無乾天竺在西但為坎地支那在東惟是離方也耶男即父女即母又父只是男母只是女坤體得乾為三男有慧之定即止而觀也震為觀穿義艮為觀達義坎為不觀觀義乾體得坤為三女有定之慧即觀而止也巽為止息義兌為停止義離為不止止義震動艮靜坎能動能靜乾非偏于動也巽動兌靜離能動能靜坤非偏于靜也又震動而出巽動而入艮靜而高兌靜而深坎兼動靜而從上之下上終不窮離兼動靜而從下之上下終不盡信知一一皆法界也說卦傳曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮又曰震東方也乃至艮東北之卦也此須約觀心工夫解釋具在說卦傳解中後天八卦約用而言離表火騰故旺於南坎表水降故旺於北交發立堅濕為巨海乾為洲灘故坎雖居北而水輪含十方界坤艮之土亦遍四維火勢劣水抽為草木故有震巽木旺於春故震居東方巽亦屬木又能生火其象為風故居東南地性堅者名之為金金旺於秋故居西方乾亦屬金又表須彌是四寶所成在此地之西北也右圖說有八或與舊同或與舊異只貴遙通儒釋心要而已觀者恕之蕅益敬識
