body:
  text: 北天目道人蕅益智旭著下經之一上經始乾坤而終坎離乃天地日月之象又寂照定慧之德也是約性德之始終下經始咸恆而終既濟未濟乃感應窮通之象又機教相扣三世益物之象也是約修德之始終又上經始于乾坤之性德終于坎離之修德為自行因果具足下經始于咸恆之機教終于既濟未濟之無窮為化他能所具足此二篇之大旨也艮下兌上咸亨利貞取女吉艮得乾之上爻而為少男如初心有定之慧慧不失定者也兌得坤之上爻而為少女如初心有慧之定定不失慧者也互為能所互為感應故名為咸約世道則上下之相交約佛法則衆生諸佛之相扣約觀心則境智之相發夫有感應必有所通但感之與應皆必以正如世之取女必以其禮則正而吉矣彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸何以為感哉下卦坤體之柔上于六而成兌上卦乾體之剛下于三而成艮乃天地之二氣感應以相與也又艮止而兌說以男而下女此感應之正所以吉也約佛法者艮為生兌為佛衆生感佛既專則佛說法應之約觀心者艮為觀兌為境觀智研境既專則境諦開發而得悅矣世出世法皆以感而成事故可以見天地萬物之情象曰山上有澤咸君子以虛受人慢如高山法水不停今山上有澤豈非以其虛而能受哉初六咸其拇象曰咸其拇志在外也咸雖感而遂通須不違其寂然不動之體又須善識時位之宜倘因感而搖其主宰則反失能應之本矣大概感應之道互為能所然下三爻既居止體且在下位故皆不宜妄應于他上三爻既居悅體且在上位故皆宜善應于物今初六以陰居下而為九四所感未免腳指先動夫用行舍藏原無定局時止則止時行則行行得其當則吉不得其當則凶故未可判定是非即所謂志在外者亦自不同若志在天下不顧身家則吉若志在利名不顧心性則可羞矣六二咸其腓凶居吉象曰雖凶居吉順不害也陰柔中正而為九五所感倘躁妄欲進則凶惟安居自守則吉蓋安居自守乃順乎柔中之道而不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也以剛正居止極而為上六所感未免亟亟以利生為務不知欲利他者先須自利成就若一被順境所牽則頓失生平所養亦可羞也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也剛而不過定慧齊平得感應之正道故吉而悔亡見其己心他心互含互攝有憧憧往來之象既以心為感應之本則凡有血氣莫不尊親有朋從爾思之象惟其得感應之正雖終日感而不違其寂然不動之體故未感害也惟其悟一心之往來雖知本自何思何慮而還須精義入神以致用利用安身以崇德窮神知化以深造于不可知之域故未肯遽以現前所證為光大也九五咸其脢無悔象曰咸其脢志末也陽剛中正而居悅體如艮其背不獲其身行其庭不見其人之象乃允合于寂然不動感而遂通之妙故得毫無過失可悔而善始善終證于究竟名為志末末猶終也上六咸其輔頰舌象曰咸其輔頰舌滕口說也柔而得正為兌之主內依止德外宣四辨為咸其輔頰舌之象說法無盡誨人不倦故曰滕口說也然初之咸拇上之咸舌皆不言吉凶者以初心初步有邪有正事非一概說法利生亦有邪有正轍非一途故也觀于彖辭亨及利貞之誡則思過半矣巽下震上恆亨無咎利貞利有攸往夫感應之機不可一息有差而感應之理則亙古不變者也依常然之理而為感應故澤山得名為咸依逗機之妙而論常理故雷風得名為恆澤山名咸則常即無常雷風名恆則無常即常又咸是澤山則無常本常恆是雷風則常本無常二鳥雙遊之喻于此亦可悟矣理既有常常則必亨亦必無咎但常非一定死執之常須知有體有用體則非常非無常用則雙照常與無常悟非常非無常之體名為利貞起能常能無常之用名利有攸往也彖曰恆久也剛上而柔下雷風相與巽而動剛柔相應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣恆何以名久以其道之可久也震體本坤則剛上而主之巽體本乾則柔下而主之此剛柔相濟之常道也雷以動之風以鼓之此造物生成之常道也巽于其內動于其外此人事物理之常道也剛柔相應此安立對待之常道也久于其道即名為貞便可亨而無咎天地之道亦若是而已矣始既必終終亦必始始終相代故非常始終相續故非斷非斷非常故常與無常二義俱成天地則有成住壞空日月則有晝夜出沒四時則有乘除代謝聖道則有始終體用皆常與無常二義雙存而體則非常非無常強名為恆者也象曰雷風恆君子以立不易方方者至定而至變至變而至定者也東看則西南觀成北不亦變乎南決非北東決非西不亦定乎立不易方亦立于至變至定至定至變之道而已初六浚恆貞凶無攸利象曰浚恆之凶始求深也夫居咸者每患無主靜之操持而居恆者每患無變通之學問今初六以陰居下知死守而不知變通求之愈深愈失亨貞攸往之利故凶九二悔亡象曰九二悔亡能久中也以剛居柔且在中位不偏不倚無適無莫乃久于中道非固執不通之恆故悔亡也九三不恆其德或承之羞貞吝象曰不恆其德無所容也過剛不中以應上六未免宜久而不肯久正與初六相反然過猶不及且陽剛而反不恆尤可羞矣張慎甫曰三之不恆藉口圓融變通而失之者也九四田無禽象曰久非其位安得禽也四為震主恆于動者也動非可久之位安能得禽蓋靜方能有獲耳六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也柔中而應九二之賢似得恆之正者然大君宰化導之權乃絶無變通闔闢之用不幾為婦道乎上六振恆凶象曰振恆在上大無功也陰居動極志大而才小位尊而德薄且下應九三不恆之友其何以濟天下哉王安石方孝孺似之艮下乾上遁亨小利貞夫世間之道久則必變而後通進則必退而後久此卦剛而能止是不以進為進而正以退為進者也故亨然說一退字便有似于自利之小道矣若充此小道不幾失立人達人之弘規乎故誡以小利貞言雖示同小道而終利于大人之貞也彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉尺蠖尚屈而後申龍蛇亦蟄而後震君子之學欲自利利他者豈不以遁而得亨哉且九五剛當其位以應六二之賢乃與時偕行之道所以亨也所言小利貞者慮其陰柔自守之志漸漸浸而長也夫善遁者則退正所以為進不善遁者則退竟終于不進矣所關顧不大哉象曰天下有山遁君子以遠小人不惡而嚴外健內止未嘗有意于遠小人而小人自不能媚也以小人為用故不惡小不能擅權故而嚴約聖學者天君為主百骸聽命耳目口腹之欲不能為亂也初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也處遁之時須隨其德位以為進退方不失亨貞之道今初六陰柔居下才位俱卑惟固守為宜不可妄往以取災也此如樂正裘牧仲六二執之用黃牛之革莫之勝說象曰執用黃牛固志也柔順中正非榮名利祿之所能牽上應九五剛健中正之君以行其志國有道不變塞焉故象以執用黃牛之革此如伊尹九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也剛而得正可以有為而居止極則未免為遁之一字所係此絶人忘世之道君子之疾也然雖不能大有所為亦須厲勉其精神以畜臣妾則吉所謂不能治國亦且齊家以為天下風可也丈人現二子于子路亦是此意但無援天下之大手段耳九四好遁君子吉小人否象曰君子好遁小人否也以剛居柔上輔九五下應初六承天子之德撫天下之民休休有容君子之吉道非小人所能學也此如衛武公否本音九五嘉遁貞吉象曰嘉遁貞吉以正志也剛健中正下應六二陰柔中正之賢當此遁時雖有英明神武作略不自露其才華遁之嘉美貞而且吉者也此如湯王上九肥遁無不利象曰肥遁無不利無所疑也剛而不過尊居師保之位望隆于天下而不自伐其德故為肥遁而無不利此如太公乾下震上大壯利貞夫退養之功愈密則精神道德益壯然大者既壯不患不能致用特患恃才德而妄動耳利貞之誡深為持盈處滿者設也彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣夫人一體之中有大者有小者從其大體為大人從其小體為小人今言大壯乃是大者壯也剛則非情欲所能撓動則非舊習所能囿所以壯也言利貞者以大者本自正也不正何以稱大故正大而天地之情可見矣約佛法者天地即表理智亦表定慧象曰雷在天上大壯君子以非禮弗履非禮弗履正佛法中所謂悲體戒雷震也初九壯于趾征凶有孚象曰壯于趾其孚窮也雖云大者必正須知正者乃大若恃其大以為正正便成邪恃其壯以為大大必不久恃其正以為壯壯必有衰洪範所以有高明柔克之訓正為此耳今初九過剛不中故往則必凶以其自信自恃乃必窮之道也九二貞吉象曰九二貞吉以中也陽居陰位剛而不過又得其中得中即得正矣九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也雖本君子但好剛任壯未免同于衽金革蹈白刃暴虎馮河之小人適足取困而已何能決斯世之藩哉若真是君子則勢雖壯盛而不自恃慊然似罔也已九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也陽居陰位以柔濟剛得大壯之貞者所以削平禍亂而不損其神以此運載天下無往而不得也六五喪羊于易無悔象曰喪羊于易位不當也柔而得中故絶無剛壯喜觸之態而無悔也位不當猶所謂有天下而不與上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也質位俱柔但有壯名而無壯義故無攸利然善用柔者正不必慕大壯之虛名惟艱守其柔克之道則柔能勝剛反得吉矣此勸其不能遂則須退也坤下離上晉康侯用錫馬蕃庶晝日三接大壯而能貞則可進于自利利他之域矣當此平康之世賢侯得寵于聖君錫馬蕃庶錫之厚也晝日三接接之勤也觀心釋者妙觀察智為康侯增長稱性功德為錫馬蕃庶證見法身理體為晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也明若未出不名平康之晉時不順不麗不名晉世之賢侯不柔不進不得錫接之蕃數蓋六五之柔即坤全體坤與合德故進而上行以麗之也觀心釋者根本實智光明破無明住地而出故云明出地上定與慧俱止觀不二故云順而麗乎大明無明實性即佛性無明轉即變為明故柔進而上行是以功德智慧重重增勝也象曰明出地上晉君子以自昭明德本覺之性名為明德始覺之功名之為昭心外無法名之為自自昭明德則新民止至善在其中矣初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也晉之六爻皆應自昭明德以新民者也而時位不同所養亦異故吉凶悔吝分焉初六以陰居陽定有其慧且居順體故可進而晉如然在卦下又與鼫鼠為應非我良朋則斷不宜欲速故有阻而摧如夫晉與摧皆外境耳何與于我但當守正則吉縱令一時不足取信惟寬裕以待之終無咎矣言獨行正者自信自肯不求人知之意言未受命者猶孟子所謂命也有性焉君子不謂命也之意六二晉如愁如貞吉受茲介福于其王母象曰受茲介福以中正也柔順中正自昭明德常切望道未見之愁正而且吉者也上與六五王母合德錫以本分應得之福故名介福縱令貴極人臣非分外也六三衆允悔亡象曰衆允之志上行也以陰居陽定有其慧當晉之時而在順體之上初六所謂罔孚者裕養至此衆皆允之而悔亡矣隱居以求其志行義以達其道故曰志上行也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也君子之自昭明德也外宜晦而內宜明故暗然而日章以九居四則外剛而內柔外明而內晦者也如鼫鼠能飛不能過屋能緣不能窮木能遊不能度谷能穴不能掩身能走不能先人不亦危乎蕅益子曰豫昔初入閩中見有鬻白兔者人爭以百金買之未幾生育甚多其價漸減至一錢許好事者殺而烹之臭不可食遂無人買博古者云此非白兔乃鼫鼠耳噫本以賤鼠謬膺白兔之名無德居高位者蓋類此矣六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也以六居五定有其慧又為離明之主得中道而處天位正所謂自新新民無所不用其極者也雖俯乘鼫鼠之九四仰承晉角之上九而與坤順合德故往接三陰同成順麗大明之治則吉無不利舉世皆蒙其福慶矣又何失得之可恤哉上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也上九亦外剛而內柔外明而內晦者也而居晉極則如獸之角矣以角觸人則凶維用以自治如伐邑然則厲吉而無咎然不能自治于早至此時而方自治雖得其正不亦吝與四十五十而無聞焉斯亦不足畏也已故曰道未光也離下坤上明夷利艱貞知進而不知退則必有傷夷者傷也明入地中其光不耀知艱貞之為利乃所謂用晦而明合于文王箕子之德矣彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之文明柔順雖通指一卦之德意在六二內難正志專指六五艱貞晦明則文王箕子所同也觀心釋者煩惱惡業病患魔事上慢邪見無非圓頓止觀所行妙境象曰明入地中明夷君子以蒞衆用晦而明寧武子之愚不可及兵法之以逸待勞以靜制動以暗伺明皆明夷之用也聖學則暗然而日章初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也此如太公伯夷之避紂也先垂其翼則不露其飛之形及行之速則三日而不遑食蓋義當遠遁不欲主人知之而有言耳六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也文明中正之德當此明夷之時雖左股業已受傷猶往拯救唯馬壯故吉耳羑里既囚之後仍率三分天下之二以服事殷順而不忤誠萬古人臣之則也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也以剛居剛在離之上夜盡將旦之時也正與上六暗主為應如武王伐紂得其大惡之首然以臣伐君事不可疾當持之以貞耳象云南狩之志猶孟子所云有伊尹之志則可無伊尹之志則篡也辭義凜然六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也已居坤體入暗地矣柔而得正稍遠于上故猶可獲明夷之心而出門庭如微子抱祭器以行遁但出門庭遜于荒野非歸周也六五箕子之明夷利貞象曰箕子之貞明不可息也迫近暗君身已辱矣外柔內剛居得其中用晦而明明照萬古洪範九疇之燈誰能息之上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也以陰居陰處夷之極初稱天子後成獨夫者也蓋下五爻皆明而示晦故能用晦而明此則不明而晦故失則而終入地耳離下巽上家人利女貞欲救天下之傷莫若反求于家庭欲正家庭之化莫若致嚴于女貞牝雞之晨維家之索不可以不誡也佛法釋者觀行被魔事所擾當念唯心唯心為佛法之家仍須以定資慧以福助智以修顯性名利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣佛法釋者禪定持心則內冥法體智慧了境則外施化用修德之定慧平正本乎性德之寂照不二也在因名男女在果名父母既證果德十界歸仰故名嚴君性修不濫名父父子子真俗並照名兄兄弟弟福慧互資名夫夫婦婦一世界清淨故十方世界皆悉清淨名正家而天下定也象曰風自火出家人君子以言有物而行有恆火因風鼓而今風自火出猶家以德化而今德從家播也有物則非無實之言有恆則非設飾之行所以能刑于寡妻至于兄弟以御于家邦耳佛法亦然律儀清淨則可以攝善攝生矣初九間有家悔亡象曰間有家志未變也以剛正居有家之初即言有物行有恆以間之則可保其終不變矣佛法釋者即是增上戒學六二無攸遂在中饋貞吉象曰六二之吉順以巽也陰柔中正而為內卦之主故每事不敢自專自遂唯供其中饋之職而已佛法釋者即是增上定學九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也過剛不中似失于嚴厲者然以治家正道觀之則未失而仍吉倘畏其悔厲而從事于嘻嘻始似相安終以失家節而取吝矣佛法釋者即是增上慧學六四富家大吉象曰富家大吉順在位也陰柔得正為巽之主所謂生財有大道者也佛法釋者即緣因善心發富有萬德名為解脫九五王假有家勿恤吉象曰王假有家交相愛也假大也書云不自滿假詩云假以溢我又曰假哉皇考皆取大義九五陽剛中正而居天位以六合為一家者也大道為公何憂恤哉樂民之樂者民亦樂其樂故交相愛佛法釋者正因理心發性修交徹顯法身德上九有孚威如終吉象曰威如之吉反身之謂也剛而不過居巽之上卦之終其德可信故不猛而威如所謂其儀不忒正是四國者也佛法釋者了因慧心發稱理尊重名般若德兌下離上暌小事吉夫善修身以齊家者則六合可為一家苟齊之不得其道則一家之中暌隔生焉如火與澤同在天地之間而上下情異又如二女同一父母所生而志不同行是豈可以成大事乎姑任其火作火用澤作澤用中女適張小女適李可耳觀心者亦復如是出世禪定世間禪定一上一下所趣各自不同圓融之解未開僅可取小證也彖曰暌火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地暌而其事同也男女暌而其志通也萬物暌而其事類也暌之時用大矣哉火澤因動則上下勢暌靜則未始上下也二女因行則其志不同居則未始不同也故曰吉凶悔吝生乎動雖然世豈能有靜而無動有居而無行哉今此卦以兌說而附麗乎離明六五又以柔為離主進而上行且得中位下應九二之剛是以小事可獲吉也此亦文王曲就人情被暌所局而言之耳若充此暌之理性以盡暌之時用則天地暌而其事同男女暌而其志通萬物暌而其事類有何一法不攝于暌有何一法不從暌出哉蓋于同起暌則其吉小于暌得同則其用大也佛法釋者寂照一體名天地暌而其事同止觀雙行名男女暌而志通萬行不出正助二行二行不離性具如萬物不出陰陽二爻二爻不離太極名萬物暌而事類象曰上火下澤暌君子以同而異離得坤之中爻澤得坤之上爻其性同也火則炎上澤則潤下其相異也觀相元妄則相異而性亦似異矣觀性元真則性同而相亦本同矣惟君子知其以同而異故不以異而昧同也知異本同故六而常即不生退屈知同而異故即而常六不生上慢知異本同故冥契真源知同而異故雲興萬行知異本同故上無佛道可成下無衆生可度知同而異故恆莊嚴淨土教化諸衆生知異本同故生死及涅槃二俱不可得知同而異故或遊戲生死或示現涅槃初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也剛正無應居暌之初信此以往則無過而悔亡矣縱令喪馬不必逐之馬當自復勸其勿以得失亂吾神也縱遇惡人不妨見之可以無咎勸其勿以善惡二吾心也如孔子見季康子見南子見陽貨等皆所以辟咎耳豈真有所利之也哉蓋凡得失之念稍重善惡之心太明則同者必異異者必不可同惟率其剛正之天德則得失泯善惡融雖居暌世而悔亡矣九二遇主于巷無咎象曰遇主于巷未失道也剛而得中上應六五柔中之主而當此暌時近與六三相鄰五必疑其遇三而舍己也故須委曲明其心事如遇主于巷焉夫君臣相遇萬古常道豈以于巷而謂之失哉六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也本與上九為應而當暌之時不中不正陷于九二九四兩陽之間其跡有可疑者夫二自遇主于巷四亦自遇元夫何嘗有意汙我我無中正之德而自疑焉故妄見其輿若曳其牛若掣而不敢往從上九且自謂我之為人必當被上九之天所劓不得通其貞潔之情如此則無初矣但暌極必合心跡終必自明賴遇上九之剛後說弧以待之故有終也九四暌孤遇元夫交孚厲無咎象曰交孚無咎志行也暌必有應乃可相濟二與五應三與上應四獨無應者也故名暌孤然初九剛正在下可以濟暌當此之時同德相信互相砥礪可以行其濟暌之志而無咎矣蓋君子深知以同而異故陰與陽異而相應亦可陽與陽同而相孚亦可耳六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也六五乃九二之主也陰柔不正反疑二之遇于三焉以其居中則猜忌未深終與二合故得悔亡聖人又恐其躊蹰未決也故明目張膽而告之曰厥宗上九已說弧以待六三其相合如噬膚矣爾往從九二于巷有何咎哉孔子更為之鼓舞曰不惟無咎且君臣相合暌終得濟而有慶也上九暌孤見豕負塗載鬼一車先張之弧後說之弧匪寇婚媾往遇雨則吉象曰遇雨之吉群疑亡也上九與六三相應本非孤也暌而未合則有似乎孤矣三本不與二四相染而其跡似汙故見豕負塗也二四各自有遇本無心于染三而虛妄生疑故載鬼一車也先則甚疑故張弧而欲射之後疑稍緩故說弧而往視之逮見其果非與寇結為婚媾于是釋然如雲既雨而吉矣既不疑三亦不疑二與四故群疑亡統論六爻惟初九剛正最善濟暌餘皆不得其正故必相合乃有濟也佛法釋者惟根本正慧能達以同而異故即異而恆同否則必待定慧相資止觀雙運乃能捨異生性入同生性耳艮下坎上蹇利西南不利東北利見大人貞吉大凡乖異不合則所行必多阻難然正當阻難時豈無拯難良策哉往西南則說也順也明也拯難之要道也往東北則止也險也益其蹇而已矣惟大人能濟蹇惟正道能出蹇蹇故可以動心忍性增益其所不能而吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉愚者汩于情欲之私雖有不測之險臨其前盲無見也況能止哉能止不惟不陷于險從此必求出險之良策矣安得非智本以東北之坎艮往就西南之離兌與坤故剛柔相濟而得其中若守此東北則終于險終于止而已矣惟九五陽剛中正當大人之位以拯邦國之蹇故往見之者必有拯蹇之功然爻中獨上六明利見大人餘不言者見大人亦待其時時止則止時行則行蹇之時用即全體大易之時用也六十四卦皆爾每于人所忽者一提醒之云爾象曰山上有水蹇君子以反身修德山本育泉宜涵而不宜泛今水流于上使人不能厝足此乃山有缺陷非水之過也君子知一切險難境界惟吾心自造自現故不敢怨天尤人但反身以修其德如治山者培其缺陷則水歸澗壑而不復橫流矣初六往蹇來譽象曰往蹇來譽宜待也蹇以見險能止為知故諸爻皆誡其往而許其來來即反身修德之謂也初六見險即止知機而不犯難其反身修德功夫最早故可得譽夫豈逡巡畏縮也哉理宜修德以待時耳六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也陰柔中正反躬無怍而上應九五陽剛中正之君方居險地安得不蹇其蹇以相從事然諸爻皆以能止為知而此獨不然者正所謂事君能致其身公爾忘私故雖似冒險終無尤也易讀曰匪躬正本反身來平日能反身以體蹇才能臨時匪躬以濟蹇九三往蹇來反象曰往蹇來反內喜之也九三為艮之主剛而得正見險能止者也既知往則必蹇故來而反身修德則內二爻無不喜之六四往蹇來連象曰往蹇來連當位實也已入坎體其蹇甚矣然設能來而反身修德則猶可連于艮之三爻而獲止也陰本不實故來連于當位而實之九三也九五大蹇朋來象曰大蹇朋來以中節也居坎之中蹇之大者也剛健中正六二應之故得朋來共濟大蹇然非朋之能來助我實由我之中道足為拯蹇節則故上下諸爻皆取節則于我耳釋迦出五濁世得無上菩提為一切衆生說難信法其真能為甚難希有之事者乎上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也陰柔居險極豈可更有所往亦惟來而反身修德則碩吉耳碩者實也大也吉之所以能實大者以利見九五大人故也君子求諸己故志在內則吉輔世長民莫如德故利見為從貴此指天爵為貴非徒以人爵也須跋陀羅最後見佛得度其碩吉之謂乎坎下震上解利西南無所往其來復吉有攸往夙吉世間之局未有久蹇窒而不釋散者方其欲解則貴剛柔相濟故利西南及其既解則大局已定更何所往唯來復于常道而已設有所往皆當審之于早不審輒往凶且隨之寧得吉乎此如良將用兵秖期歸順良醫用藥秖期病除觀心修證秖期復性別無一法可取著也彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉險在前則宜止險在下則可動以免之此皆時節因緣之道不可得而強也西南為坤故往則得衆來復東北不過于柔故乃得其中早鑒事機故往可有功如天地之雷雨作亦因夙得其時故百果草木皆甲拆耳觀心釋者兼修禪定為利西南萬行顯發為往得衆不捨正觀名為來復證于法身為乃得中有攸往而利生必須夙能鑒機則吉說法不虛為往有功性修融合為天地解悲體戒雷震澍甘露法雨則世出世果三草二木各得以時生長熟脫非佛菩薩何能用此解之時哉象曰雷雨作解君子以赦過宥罪誤犯之過則直赦之令其自新輕重諸罪亦寬宥之令得末減佛法釋者即作法取相無生三種懺法令人決疑出罪又觀心釋者即是端坐念實相銷滅衆罪也初六無咎象曰剛柔之際義無咎也解則陰陽和矣而以六居初上應九四適當其際故義無咎九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也以剛中而上應六五本自無可狐疑六三不中不正意欲乘我象如三狐我田獵而獲除之得與六五柔中相合此正而吉者也黃為中色矢喻直道得其中直之道故除疑而應乎貞矣六三負且乘致寇至貞吝象曰負且乘亦可醜也自我致戎又誰咎也陰柔不中不正自無應與上思負四下欲乘二不知其非道也是故二以為狐而田之四以為拇而解之五以為小人而退之上以為隼而射之不亦至可羞乎九四解而拇朋至斯孚象曰解而拇未當位也三在四下欲負于四故四以三為拇四未當位不如九二剛中故二自能田獲三狐以從五四必待二之至始信拇之宜解也二與四皆陽類故名為朋六五君子維有解吉有孚于小人象曰君子有解小人退也六與二為正應而三且思乘二則五不能無疑于二矣賴九二之君子剛而得中決能解去六三上從于我而吉但觀六三之退則信九二之有解矣上六公用射隼于高墉之上獲之無不利象曰公用射隼以解悖也隼高飛而善摯以喻負且乘之六三也當解之時人人樂為君子獨六三悖理飛摯二雖田之四雖解之以皆各有正應不同上六之在局外又陽與陰情必相得故或以為狐或以為拇不如上六之絶無情係直以為隼且居卦終則公侯之位也柔而得正則藏器于身待時而動者也故獲之而無不利觀心釋六爻者六三即所治之惑餘五爻皆能治之法也初以有慧之定上應九四有定之慧惑不能纍故無咎九二以中道慧上應六五中道之定而六三以世間小定小慧乘其未證竊思亂之故必獵退狐疑乃得中直正道六三依于世禪資于世智起慢起見妄擬佛祖故為正道之所對治九四有定之慧固能治惑以被六三見慢所負且未達中道故必待九二中道之慧始能解此體內之惑六五以中道定下應九二中道之慧慧能斷惑則定乃契理矣上六以出世正定對治世禪世智邪慢邪見故無不利兌下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享難既解矣相安于無事必將剝民以奉君此世道之損也惑既治矣從此增道損生此觀心言損也且以世道言之凡為上者必其勞而不怨欲而不貪真足以取信于民則雖損之而元吉無咎凡為下者必以可貞之事益上勿貢諛勿獻異勿開勞民傷財種種弊端則利有攸往蓋下事上猶人事天地鬼神祖宗也享以其誠不以其物雖二簋便可用享豈以多物為敬哉觀心者信佛界即九界故元吉無咎知九界即佛界故不動九界而利往佛界不壞二諦而享于中道也彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行下濟為益上行為損此聖賢觀于天下萬世不易之道而立此名也上必有孚乃可損下而元吉無咎下必可貞乃利有攸往以益上雖二簋亦可用享蓋不過各論其時但貴與時偕行而已象曰山下有澤損君子以懲忿窒欲山下有澤則山必日損君子以為吾心之當損者莫若忿欲故懲忿則如摧山窒欲則如填壑俾復于平地而後已也初九己事遄往無咎酌損之象曰己事遄往尚合志也初與四為正應宜損我以益四者也四方陰柔有疾故宜己我之事而速往益之則得無咎然以剛益柔但使斟酌得中可耳勿令過也以剛正而應柔正故往則合志九二利貞征凶弗損益之象曰九二利貞中以為志也九二剛中而不過剛六五柔中而不過柔各守其貞可矣又何須更往益之以成過猶不及之凶哉弗損而益其益乃大故五有或益以十朋之龜者六三三人行則損一人一人行則得其友象曰一人行三則疑也六三與下二爻皆損下以益上者也初二仍陽三獨變而為陰三人行損一人矣今以一陰上行而益上九在我固為國爾亡家而上九陽剛反能以弗損之益益我不亦得其友乎所以凡事宜專一也六四損其疾使遄有喜無咎象曰損其疾亦可喜也陰柔不中疾也初九已遄來益我我但資初九以自損其疾則初有喜而我無咎矣遄指初九六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也柔中虛己以應九二九二守貞弗以有形之物益之故能使天下歸心罔不來益以重寶也蓋人君能虛心用賢則合于上天而自上祐之矣上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也上九受六三之益極矣苟不有以報之三雖無怨人必不服安能無咎安能貞吉安能利有攸往然欲益三正不必損我也蓋三之為臣固所謂國爾亡家者但深鑒其一人獨行之誠則大得其志而三以為得友矣是謂弗損益之震下巽上益利有攸往利涉大川損而有孚則與時偕行可以致益此世間盈虛消息之理也增道損生則日進于自利利他之域此觀心成益也攸往以處常涉川以處變苟得其益之道則無不利矣彖曰益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行中正指九五六二言之震巽皆屬木故其道可涉川天施故坤得其初爻而為震地生故乾得其初爻而為巽然不止于震巽而已舉凡坎離艮兌等無非天施地生之益故其益無方而與時偕行也益即全體乾坤全體太極全體易道其餘六十三卦無不皆然聖人姑舉一隅令人自得之耳佛法釋者損佛界之上以益九界之下損己利人故民說無疆本高跡下故自上下下而其道大光天行聖行名為中正梵行起于嬰病二行名為木道乃行放光現瑞以動之四辨說法以巽之開圓解以顯性德名為天施立圓行以成修德名為地生種而熟熟而脫番番四悉名為與時偕行象曰風雷益君子以見善則遷有過則改風以鼓之遷善之速也雷以動之改過之勇也陸庸成曰風之入也最微故片善不遺纖過必剔雷之發也最迅故遷無留念改無停機初九利用為大作元吉無咎象曰元吉無咎下不厚事也居益之初受上益最厚者也以下位受此厚益可安然無所事乎然剛正而為震主必能大作以致元吉則無咎矣蘇眉山曰益之初九損之上九皆正受益者也彼自損而專益我將以厚責我也我必有以塞之故損上九利有攸往益初九利用大作然上之有為也其勢易有功則其利倍有罪則其責薄下之有為也其勢難有功則利歸于上有罪則先受其責故元吉而後無咎以所居者非厚事之地也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也陰柔中正以受九五陽剛中正之益惠我以心而不惠我以物故能使天下歸心罔不來益我以重寶也為臣則永貞吉不可因天祐人助而異其心為王則用享于帝吉自新新民而其命維新象曰自外來者明其非心所期以本無計功謀利之私故也六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也不中不正居下之上而受上九之擊其擊我也正所以益我也知凶事之真能益我則無咎矣位雖不中而有孚則為中行可以告公用圭公指上九圭以通信信通則圭仍還公不取公之物益我但取公之擊以益我耳恆人每以凶事為非益故聖人特明凶事之益固有之能信凶之為益則不凶矣六四中行告公從利用為依遷國象曰告公從以益志也六四與上二爻皆損上以益下者也五上仍陽四獨變而為陰是直以身殉民豈非遷國之象豈非中行之道乎初爻既受我益剛而得正有大公之心方將利用大作以報我我即以之為依可矣由其志在益民故民皆以公心從之九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也陽剛中正應于六二真實以益下為心者也惠之以心則惠而不費天下咸被其澤其元吉何必問哉故能感六二永貞之吉大得其志而還報我以好德也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也上九本宜損己以益六三者也因六三不中不正故不與其益而反擊之三固得其凶事鉗錘之益然在上九豈可恆以此立心哉以此立心則舉凡在下者皆亦莫益于我而或擊于我矣故誡以立心勿恆恆則必凶上九不中不正不仁而在高位但思益我不料擊我思益而不得益故曰偏辭不料擊而得擊故曰自外來也弟子均華募刻
